<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word — Bible Listener</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --card: #171714;
    --border: #2a2a24;
    --gold: #c9a84c;
    --gold-dim: #7a6530;
    --text: #e8e4d8;
    --text-dim: #7a7668;
    --text-muted: #3d3d35;
    --green: #4caf7a;
    --red: #c94c4c;
    --radius: 14px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--gold);
  }

  .logo span {
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.08em;
    display: block;
    margin-top: -2px;
  }

  /* Mic button */
  #mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    flex-shrink: 0;
  }

  #mic-btn.listening {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    box-shadow: 0 0 0 0 rgba(201,168,76,0.4);
    animation: pulse-ring 1.8s ease-out infinite;
  }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.35); }
    70% { box-shadow: 0 0 0 14px rgba(201,168,76,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  }

  .mic-icon { font-size: 20px; }

  /* Status bar */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0 8px;
    flex-shrink: 0;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active { background: var(--green); animation: blink 1.2s ease-in-out infinite; }
  .status-dot.error { background: var(--red); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #status-text {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Live transcript strip */
  #transcript-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 38px;
    line-height: 1.5;
    flex-shrink: 0;
    transition: border-color 0.3s;
    font-style: italic;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #transcript-strip.active { border-color: var(--gold-dim); }
  #transcript-strip .highlight { color: var(--gold); font-style: normal; font-weight: 400; }

  /* Main verse card */
  #verse-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: none;
  }
  #verse-area::-webkit-scrollbar { display: none; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0.5;
    text-align: center;
    padding: 40px 20px;
  }

  .empty-icon {
    font-size: 48px;
    font-family: 'Cormorant Garamond', serif;
    color: var(--gold-dim);
    line-height: 1;
  }

  .empty-state p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }

  /* Verse card */
  .verse-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  .verse-card.current {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.12) inset, 0 8px 32px rgba(0,0,0,0.5);
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 0;
  }

  .verse-ref {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .current-badge {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .verse-text {
    padding: 12px 16px 16px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.75;
    color: var(--text);
    font-style: italic;
  }

  .verse-text.loading {
    color: var(--text-muted);
    font-style: normal;
    font-size: 13px;
    animation: shimmer 1.4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* Chapter nav */
  .chapter-nav {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .nav-btn {
    flex: 1;
    padding: 11px 10px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    transition: color 0.2s, background 0.2s;
    letter-spacing: 0.04em;
  }

  .nav-btn:hover, .nav-btn:active { color: var(--gold); background: rgba(201,168,76,0.06); }
  .nav-btn:disabled { opacity: 0.25; pointer-events: none; }

  .nav-divider { width: 1px; background: var(--border); align-self: stretch; }

  /* History list — older verses */
  .history-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 4px 2px;
  }

  .history-verse-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    opacity: 0.7;
    cursor: pointer;
    transition: opacity 0.2s, border-color 0.2s;
    animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
  }

  .history-verse-card:hover, .history-verse-card:active { opacity: 1; border-color: var(--gold-dim); }

  .history-ref {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold-dim);
    margin-bottom: 4px;
  }

  .history-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Bottom actions */
  #bottom-bar {
    padding: 12px 0 24px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .action-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .action-btn:hover, .action-btn:active {
    color: var(--gold);
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.06);
  }

  .action-btn.primary {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 12px;
    padding: 9px 18px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      WORD
      <span>KJV LISTENER</span>
    </div>
    <button id="mic-btn" onclick="toggleListening()" title="Toggle listening">
      <span class="mic-icon" id="mic-icon">🎙</span>
    </button>
  </header>

  <div id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div id="status-text">Tap the mic to start listening</div>
  </div>

  <div id="transcript-strip">Waiting for speech...</div>

  <div id="verse-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <p>Start listening and<br>Bible verses will appear<br>as the pastor speaks</p>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="action-btn" onclick="clearHistory()">CLEAR</button>
    <button class="action-btn primary" onclick="toggleListening()">START LISTENING</button>
    <button class="action-btn" onclick="manualSearch()">SEARCH</button>
  </div>

</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let currentVerse = null; // { book, chapter, verse }
let verseHistory = [];   // array of { book, chapter, verse, text }
let isSearching = false;

// ─── Bible Books (full names + abbreviations) ─────────────────────────────────
const BOOKS = {
  // Old Testament
  'genesis': 'Genesis', 'gen': 'Genesis',
  'exodus': 'Exodus', 'exo': 'Exodus', 'ex': 'Exodus',
  'leviticus': 'Leviticus', 'lev': 'Leviticus',
  'numbers': 'Numbers', 'num': 'Numbers', 'numb': 'Numbers',
  'deuteronomy': 'Deuteronomy', 'deut': 'Deuteronomy', 'deu': 'Deuteronomy',
  'joshua': 'Joshua', 'josh': 'Joshua',
  'judges': 'Judges', 'judg': 'Judges',
  'ruth': 'Ruth',
  'first samuel': '1Samuel', '1 samuel': '1Samuel', '1samuel': '1Samuel', 'one samuel': '1Samuel',
  'second samuel': '2Samuel', '2 samuel': '2Samuel', '2samuel': '2Samuel', 'two samuel': '2Samuel',
  'first kings': '1Kings', '1 kings': '1Kings', '1kings': '1Kings', 'one kings': '1Kings',
  'second kings': '2Kings', '2 kings': '2Kings', '2kings': '2Kings', 'two kings': '2Kings',
  'first chronicles': '1Chronicles', '1 chronicles': '1Chronicles', 'one chronicles': '1Chronicles',
  'second chronicles': '2Chronicles', '2 chronicles': '2Chronicles', 'two chronicles': '2Chronicles',
  'ezra': 'Ezra',
  'nehemiah': 'Nehemiah', 'neh': 'Nehemiah',
  'esther': 'Esther', 'est': 'Esther',
  'job': 'Job',
  'psalms': 'Psalms', 'psalm': 'Psalms', 'psa': 'Psalms', 'ps': 'Psalms',
  'proverbs': 'Proverbs', 'prov': 'Proverbs', 'pro': 'Proverbs',
  'ecclesiastes': 'Ecclesiastes', 'eccl': 'Ecclesiastes', 'ecc': 'Ecclesiastes',
  'song of solomon': 'SongOfSolomon', 'song of songs': 'SongOfSolomon', 'song': 'SongOfSolomon',
  'isaiah': 'Isaiah', 'isa': 'Isaiah',
  'jeremiah': 'Jeremiah', 'jer': 'Jeremiah',
  'lamentations': 'Lamentations', 'lam': 'Lamentations',
  'ezekiel': 'Ezekiel', 'ezek': 'Ezekiel', 'eze': 'Ezekiel',
  'daniel': 'Daniel', 'dan': 'Daniel',
  'hosea': 'Hosea', 'hos': 'Hosea',
  'joel': 'Joel',
  'amos': 'Amos',
  'obadiah': 'Obadiah', 'obad': 'Obadiah',
  'jonah': 'Jonah', 'jon': 'Jonah',
  'micah': 'Micah', 'mic': 'Micah',
  'nahum': 'Nahum', 'nah': 'Nahum',
  'habakkuk': 'Habakkuk', 'hab': 'Habakkuk',
  'zephaniah': 'Zephaniah', 'zeph': 'Zephaniah',
  'haggai': 'Haggai', 'hag': 'Haggai',
  'zechariah': 'Zechariah', 'zech': 'Zechariah',
  'malachi': 'Malachi', 'mal': 'Malachi',
  // New Testament
  'matthew': 'Matthew', 'matt': 'Matthew', 'mat': 'Matthew',
  'mark': 'Mark', 'mrk': 'Mark',
  'luke': 'Luke', 'luk': 'Luke',
  'john': 'John', 'joh': 'John',
  'acts': 'Acts', 'act': 'Acts',
  'romans': 'Romans', 'rom': 'Romans',
  'first corinthians': '1Corinthians', '1 corinthians': '1Corinthians', '1corinthians': '1Corinthians', 'one corinthians': '1Corinthians',
  'second corinthians': '2Corinthians', '2 corinthians': '2Corinthians', '2corinthians': '2Corinthians', 'two corinthians': '2Corinthians',
  'galatians': 'Galatians', 'gal': 'Galatians',
  'ephesians': 'Ephesians', 'eph': 'Ephesians',
  'philippians': 'Philippians', 'phil': 'Philippians', 'php': 'Philippians',
  'colossians': 'Colossians', 'col': 'Colossians',
  'first thessalonians': '1Thessalonians', '1 thessalonians': '1Thessalonians', 'one thessalonians': '1Thessalonians',
  'second thessalonians': '2Thessalonians', '2 thessalonians': '2Thessalonians', 'two thessalonians': '2Thessalonians',
  'first timothy': '1Timothy', '1 timothy': '1Timothy', 'one timothy': '1Timothy',
  'second timothy': '2Timothy', '2 timothy': '2Timothy', 'two timothy': '2Timothy',
  'titus': 'Titus',
  'philemon': 'Philemon', 'phlm': 'Philemon',
  'hebrews': 'Hebrews', 'heb': 'Hebrews',
  'james': 'James', 'jas': 'James',
  'first peter': '1Peter', '1 peter': '1Peter', 'one peter': '1Peter',
  'second peter': '2Peter', '2 peter': '2Peter', 'two peter': '2Peter',
  'first john': '1John', '1 john': '1John', 'one john': '1John',
  'second john': '2John', '2 john': '2John', 'two john': '2John',
  'third john': '3John', '3 john': '3John', 'three john': '3John',
  'jude': 'Jude',
  'revelation': 'Revelation', 'rev': 'Revelation', 'revelations': 'Revelation'
};

// Words → numbers
const WORD_NUMS = {
  'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,'seven':7,'eight':8,'nine':9,'ten':10,
  'eleven':11,'twelve':12,'thirteen':13,'fourteen':14,'fifteen':15,'sixteen':16,'seventeen':17,
  'eighteen':18,'nineteen':19,'twenty':20,'thirty':30,'forty':40,'fifty':50,'sixty':60,
  'seventy':70,'eighty':80,'ninety':90,'hundred':100,'one hundred':100,'a hundred':100,
  'one fifty':150,'a hundred and fifty':150
};

function wordsToNum(str) {
  str = str.trim().toLowerCase();
  if (/^\d+$/.test(str)) return parseInt(str);
  if (WORD_NUMS[str] !== undefined) return WORD_NUMS[str];
  // Handle compound like "twenty three"
  const parts = str.split(/\s+/);
  let total = 0;
  for (const p of parts) {
    if (WORD_NUMS[p] !== undefined) total += WORD_NUMS[p];
  }
  return total > 0 ? total : null;
}

// ─── Pattern Matching ─────────────────────────────────────────────────────────
function detectVerse(text) {
  const t = text.toLowerCase()
    .replace(/\bst\b/g, '') // "1st" → "1"
    .replace(/[,;.!?]/g, ' ')
    .replace(/\s+/g, ' ').trim();

  // Check "next verse" / "previous verse"
  if (/\b(next verse|verse next|go next)\b/.test(t)) return { action: 'next' };
  if (/\b(previous verse|verse before|go back|last verse|prev verse)\b/.test(t)) return { action: 'prev' };
  if (/\bnext chapter\b/.test(t)) return { action: 'nextChapter' };
  if (/\b(previous chapter|last chapter)\b/.test(t)) return { action: 'prevChapter' };

  // Build book list sorted by length desc (to match longer names first)
  const bookKeys = Object.keys(BOOKS).sort((a,b) => b.length - a.length);

  for (const key of bookKeys) {
    const idx = t.indexOf(key);
    if (idx === -1) continue;
    const book = BOOKS[key];
    const after = t.slice(idx + key.length).trim();

    // Patterns for chapter:verse
    // "john 3 16", "john 3:16", "john chapter 3 verse 16", "john three sixteen"
    const numPat = '(\\d+|' + Object.keys(WORD_NUMS).sort((a,b)=>b.length-a.length).join('|') + ')';

    const patterns = [
      // chapter:verse numeric
      new RegExp(`^\\s*:?\\s*(\\d+):(\\d+)`),
      // chapter verse numeric
      new RegExp(`^\\s*chapter?\\s*(\\d+)\\s+verse?\\s*(\\d+)`, 'i'),
      // ch N v N
      new RegExp(`^\\s*ch\\.?\\s*(\\d+)\\s+v\\.?\\s*(\\d+)`, 'i'),
      // "3 16"
      new RegExp(`^\\s*(\\d+)\\s+(\\d+)(?!\\d)`),
      // word numbers "three sixteen" or "three verse sixteen"
      new RegExp(`^\\s*(?:chapter\\s+)?([a-z ]+?)\\s+(?:verse\\s+)?([a-z]+)\\s*$`, 'i'),
    ];

    for (const pat of patterns) {
      const m = after.match(pat);
      if (m) {
        const ch = wordsToNum(m[1]);
        const vs = wordsToNum(m[2]);
        if (ch && vs) return { book, chapter: ch, verse: vs };
      }
    }

    // Only chapter mentioned?
    const chOnly = after.match(/^\s*chapter?\s*(\d+)/i) || after.match(/^\s*(\d+)\s*$/);
    if (chOnly) {
      const ch = parseInt(chOnly[1]);
      if (ch) return { book, chapter: ch, verse: 1 };
    }
  }
  return null;
}

// ─── API: bible-api.com (free, no key, KJV) ──────────────────────────────────
async function fetchVerse(book, chapter, verse) {
  const ref = `${book}+${chapter}:${verse}`;
  const url = `https://bible-api.com/${encodeURIComponent(ref)}?translation=kjv`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Verse not found');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text ? data.text.trim() : data.verses?.[0]?.text?.trim();
}

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function setStatus(msg, state = '') {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderAll() {
  const area = document.getElementById('verse-area');
  area.innerHTML = '';

  if (!currentVerse && verseHistory.length === 0) {
    area.innerHTML = `<div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <p>Start listening and<br>Bible verses will appear<br>as the pastor speaks</p>
    </div>`;
    return;
  }

  // Render current verse card
  if (currentVerse) {
    const card = document.createElement('div');
    card.className = 'verse-card current';
    card.id = 'current-card';
    const displayRef = formatRef(currentVerse);
    card.innerHTML = `
      <div class="card-header">
        <div class="verse-ref">${displayRef}</div>
        <div class="current-badge">CURRENT</div>
      </div>
      <div class="verse-text" id="current-text">${currentVerse.text || '<span class="loading">Fetching verse...</span>'}</div>
      <div class="chapter-nav">
        <button class="nav-btn" onclick="navVerse(-1)" id="btn-prev">◀ PREV</button>
        <div class="nav-divider"></div>
        <button class="nav-btn" onclick="navChapter(-1)">◀ CH</button>
        <div class="nav-divider"></div>
        <button class="nav-btn" onclick="navChapter(1)">CH ▶</button>
        <div class="nav-divider"></div>
        <button class="nav-btn" onclick="navVerse(1)" id="btn-next">NEXT ▶</button>
      </div>`;
    area.appendChild(card);
  }

  // History
  if (verseHistory.length > 0) {
    const label = document.createElement('div');
    label.className = 'history-label';
    label.textContent = 'Earlier verses';
    area.appendChild(label);

    [...verseHistory].reverse().forEach((v, i) => {
      const c = document.createElement('div');
      c.className = 'history-verse-card';
      c.innerHTML = `<div class="history-ref">${formatRef(v)}</div>
        <div class="history-text">${v.text || ''}</div>`;
      c.onclick = () => jumpToHistoryVerse(verseHistory.length - 1 - i);
      area.appendChild(c);
    });
  }

  // Scroll top
  area.scrollTop = 0;
}

function formatRef(v) {
  const bookDisplay = v.book.replace(/(\d)([A-Z])/, '$1 $2').replace(/([a-z])([A-Z])/g, '$1 $2');
  return `${bookDisplay} ${v.chapter}:${v.verse}`;
}

// ─── Verse Actions ────────────────────────────────────────────────────────────
async function goToVerse(book, chapter, verse, addHistory = true) {
  if (isSearching) return;
  isSearching = true;

  if (addHistory && currentVerse && currentVerse.text) {
    verseHistory.push({ ...currentVerse });
    if (verseHistory.length > 20) verseHistory.shift();
  }

  currentVerse = { book, chapter, verse, text: null };
  renderAll();
  setStatus(`Loading ${formatRef(currentVerse)}...`, 'active');

  try {
    const text = await fetchVerse(book, chapter, verse);
    currentVerse.text = text;
    const el = document.getElementById('current-text');
    if (el) el.innerHTML = text;
    setStatus(`📖 ${formatRef(currentVerse)}`, 'active');
    showToast(`✦ ${formatRef(currentVerse)}`);
  } catch (e) {
    currentVerse.text = 'Verse not found. Try another reference.';
    const el = document.getElementById('current-text');
    if (el) el.textContent = currentVerse.text;
    setStatus('Verse not found', 'error');
  }
  isSearching = false;
}

async function navVerse(dir) {
  if (!currentVerse) return;
  let { book, chapter, verse } = currentVerse;
  verse += dir;
  if (verse < 1) {
    chapter--;
    if (chapter < 1) { showToast('Beginning of book'); return; }
    verse = 176; // will auto-correct on 404 if needed
  }
  await goToVerse(book, chapter, verse, false);
}

async function navChapter(dir) {
  if (!currentVerse) return;
  let { book, chapter } = currentVerse;
  chapter += dir;
  if (chapter < 1) { showToast('Beginning of book'); return; }
  await goToVerse(book, chapter, 1, false);
}

function jumpToHistoryVerse(idx) {
  const v = verseHistory[idx];
  if (!v) return;
  if (currentVerse && currentVerse.text) {
    // Move current to top of history and remove the one we're jumping to
    verseHistory.push({ ...currentVerse });
    verseHistory.splice(idx, 1);
  }
  currentVerse = { ...v };
  renderAll();
  setStatus(`📖 ${formatRef(currentVerse)}`, 'active');
}

// ─── Speech Recognition ───────────────────────────────────────────────────────
function toggleListening() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setStatus('Speech not supported on this browser', 'error');
    showToast('Use Chrome or Safari');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 3;

  recognition.onstart = () => {
    isListening = true;
    setStatus('Listening...', 'active');
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-icon').textContent = '🔴';
    document.querySelector('#bottom-bar .action-btn.primary').textContent = 'STOP LISTENING';
  };

  recognition.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }

    const display = (interim || final).trim();
    updateTranscript(display);

    // Try all alternatives on final
    if (final.trim()) {
      let detected = null;
      for (let i = 0; i < event.results[event.results.length - 1].length; i++) {
        const alt = event.results[event.results.length - 1][i].transcript;
        detected = detectVerse(alt);
        if (detected) break;
      }

      if (detected) {
        handleDetected(detected);
      }
    }

    // Also check interim for navigation commands
    if (interim) {
      const nav = detectVerse(interim);
      if (nav && nav.action) handleDetected(nav);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return; // ignore silence
    if (e.error === 'not-allowed') {
      setStatus('Mic access denied', 'error');
      showToast('Allow microphone access');
      stopListening();
    }
  };

  recognition.onend = () => {
    if (isListening) {
      // Auto-restart
      try { recognition.start(); } catch(e) {}
    }
  };

  try {
    recognition.start();
  } catch(e) {
    setStatus('Could not start mic', 'error');
  }
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  setStatus('Tap mic to resume listening');
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-icon').textContent = '🎙';
  document.querySelector('#bottom-bar .action-btn.primary').textContent = 'START LISTENING';
  document.getElementById('transcript-strip').classList.remove('active');
  document.getElementById('transcript-strip').textContent = 'Waiting for speech...';
}

function updateTranscript(text) {
  const strip = document.getElementById('transcript-strip');
  strip.classList.add('active');
  // Highlight detected book names
  let html = text;
  Object.keys(BOOKS).sort((a,b)=>b.length-a.length).forEach(k => {
    const re = new RegExp(`\\b${k}\\b`, 'gi');
    html = html.replace(re, `<span class="highlight">${k}</span>`);
  });
  strip.innerHTML = html || 'Listening...';
}

function handleDetected(detected) {
  if (detected.action) {
    if (!currentVerse) return;
    if (detected.action === 'next') navVerse(1);
    else if (detected.action === 'prev') navVerse(-1);
    else if (detected.action === 'nextChapter') navChapter(1);
    else if (detected.action === 'prevChapter') navChapter(-1);
  } else {
    const { book, chapter, verse } = detected;
    // Don't re-fetch the same verse
    if (currentVerse && currentVerse.book === book && currentVerse.chapter === chapter && currentVerse.verse === verse) return;
    goToVerse(book, chapter, verse, true);
  }
}

// ─── Manual Search ────────────────────────────────────────────────────────────
function manualSearch() {
  const input = prompt('Enter a verse (e.g. John 3:16 or Romans 8:28)');
  if (!input) return;
  const detected = detectVerse(input);
  if (detected && !detected.action) {
    goToVerse(detected.book, detected.chapter, detected.verse, true);
  } else {
    showToast('Could not parse. Try "John 3:16"');
  }
}

function clearHistory() {
  verseHistory = [];
  currentVerse = null;
  renderAll();
  setStatus('Cleared — tap mic to listen');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
