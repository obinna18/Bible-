<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word — KJV Listener</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f7fc;
  --surface: #ffffff;
  --border: #dce6f5;
  --blue: #2563eb;
  --blue-light: #eff4ff;
  --blue-mid: #bfcffa;
  --blue-dark: #1e40af;
  --text: #111827;
  --text-mid: #4b5563;
  --text-dim: #9ca3af;
  --green: #16a34a;
  --red: #dc2626;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(37,99,235,0.08);
  --shadow-lg: 0 8px 32px rgba(37,99,235,0.14);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

#app {
  /* svh = small viewport height: excludes mobile browser toolbars always */
  height: 100vh;
  height: 100svh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* Desktop: show app as a centered card */
@media (min-width: 600px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #e8eef8 0%, #dce6f5 100%);
  }
  #app {
    height: min(820px, 96vh);
    height: min(820px, 96svh);
    border-radius: 28px;
    box-shadow: 0 24px 80px rgba(37,99,235,0.18), 0 4px 24px rgba(37,99,235,0.10);
    border: 1px solid var(--border);
    overflow: hidden;
  }
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo-wrap { display: flex; flex-direction: column; gap: 1px; }
.logo { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; color: var(--blue); letter-spacing: 0.01em; }
.logo-sub { font-size: 10px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

.header-actions { display: flex; align-items: center; gap: 10px; }

.icon-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.18s;
  color: var(--text-mid);
}
.icon-btn:active { transform: scale(0.93); }
.icon-btn:hover { border-color: var(--blue-mid); background: var(--blue-light); color: var(--blue); }
.icon-btn svg { width: 18px; height: 18px; }

/* ── Listening Status Bar ── */
#listen-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #d1d5db;
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.live { background: var(--green); animation: pulse-dot 1.4s ease-in-out infinite; }
.status-dot.error { background: var(--red); }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

#status-text {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-mid);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Transcript Strip ── */
#transcript-wrap {
  background: var(--blue-light);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  min-height: 42px;
  flex-shrink: 0;
  transition: background 0.3s;
  display: none;
}
#transcript-wrap.active { display: block; }

#transcript-text {
  font-size: 12.5px;
  color: var(--text-mid);
  line-height: 1.55;
  font-style: italic;
}
#transcript-text .hit { color: var(--blue); font-weight: 600; font-style: normal; }

/* ── Main Area ── */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 0;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
#main::-webkit-scrollbar { display: none; }

/* ── Empty State ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 24px;
  text-align: center;
  gap: 12px;
}

.empty-icon {
  width: 72px; height: 72px;
  background: var(--blue-light);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.empty-icon svg { width: 32px; height: 32px; color: var(--blue); }

.empty-title {
  font-family: 'Lora', serif;
  font-size: 19px;
  font-weight: 600;
  color: var(--text);
}

.empty-sub {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.65;
  max-width: 240px;
}

/* ── Verse Card ── */
.verse-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
}

.verse-card.current { border-color: var(--blue); box-shadow: var(--shadow-lg), 0 0 0 1px rgba(37,99,235,0.1); }

@keyframes slideUp {
  from { transform: translateY(16px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.card-top {
  padding: 14px 16px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.verse-ref {
  font-family: 'Lora', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--blue);
}

.badge-live {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  border-radius: 20px;
  padding: 3px 9px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-ai {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7c3aed;
  background: #f5f3ff;
  border: 1px solid #c4b5fd;
  border-radius: 20px;
  padding: 3px 9px;
  white-space: nowrap;
  flex-shrink: 0;
}

.verse-card.ai-match {
  border-color: #7c3aed;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(124,58,237,0.1);
}

.ai-status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #7c3aed;
  flex-shrink: 0;
  animation: pulse-dot 1s ease-in-out infinite;
}

.verse-body {
  padding: 10px 16px 16px;
  font-family: 'Lora', serif;
  font-size: 16px;
  font-weight: 400;
  font-style: italic;
  line-height: 1.8;
  color: var(--text);
}

.verse-body.loading { font-style: normal; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; color: var(--text-dim); animation: shimmer 1.2s ease-in-out infinite; }

@keyframes shimmer { 0%,100%{opacity:0.45} 50%{opacity:1} }

/* ── Nav row ── */
.nav-row {
  display: flex;
  border-top: 1px solid var(--border);
}
.nav-btn {
  flex: 1;
  padding: 11px 8px;
  background: none;
  border: none;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-mid);
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.18s, color 0.18s;
}
.nav-btn:hover, .nav-btn:active { background: var(--blue-light); color: var(--blue); }
.nav-sep { width: 1px; background: var(--border); }

/* ── History Cards ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 4px 4px 8px;
  margin-top: 4px;
}

.hist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.18s, box-shadow 0.18s;
  animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.hist-card:active { border-color: var(--blue-mid); box-shadow: var(--shadow); }

.hist-ref {
  font-family: 'Lora', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-mid);
  white-space: nowrap;
  flex-shrink: 0;
}

.hist-text {
  font-size: 12.5px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.5;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ── Bottom Mic Bar ── */
#bottom-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  /* Safe-area padding for iPhone home indicator + comfortable touch target */
  padding: 12px 16px env(safe-area-inset-bottom, 16px);
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* Big mic button */
#mic-btn {
  width: 58px; height: 58px;
  border-radius: 50%;
  border: none;
  background: var(--blue);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.22s;
  position: relative;
  box-shadow: 0 4px 16px rgba(37,99,235,0.35);
  touch-action: manipulation;
}
#mic-btn:active { transform: scale(0.92); }
#mic-btn.listening {
  background: var(--red);
  box-shadow: 0 4px 20px rgba(220,38,38,0.4);
  animation: mic-pulse 1.8s ease-out infinite;
}
@keyframes mic-pulse {
  0%,100% { box-shadow: 0 4px 20px rgba(220,38,38,0.4); }
  50% { box-shadow: 0 0 0 14px rgba(220,38,38,0.06), 0 4px 20px rgba(220,38,38,0.3); }
}
#mic-btn svg { width: 24px; height: 24px; }

.mic-meta { flex: 1; min-width: 0; }
.mic-label { font-size: 13px; font-weight: 600; color: var(--text); }
.mic-hint { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; line-height: 1.3; }

.bottom-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.sm-btn {
  padding: 6px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-mid);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  touch-action: manipulation;
}
.sm-btn:hover, .sm-btn:active { border-color: var(--blue-mid); color: var(--blue); background: var(--blue-light); }

/* ── Sheet (Search + Index) ── */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(17,24,39,0.35);
  z-index: 40;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  max-width: 480px;
  margin: 0 auto;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 -8px 40px rgba(37,99,235,0.1);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

.sheet-header {
  padding: 14px 20px 10px;
  flex-shrink: 0;
}

.sheet-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; color: var(--text); }

/* Search input */
.search-box {
  margin: 0 20px 12px;
  position: relative;
  flex-shrink: 0;
}
.search-box input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.18s;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-box .search-ico {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
}
.search-box .search-ico svg { width: 16px; height: 16px; }

.sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 32px;
  scrollbar-width: none;
}
.sheet-body::-webkit-scrollbar { display: none; }

/* Book index grid */
.book-section { margin-bottom: 18px; }
.book-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 8px 4px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.book-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.book-item {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.16s;
  text-align: left;
}
.book-item:active, .book-item:hover { border-color: var(--blue-mid); background: var(--blue-light); color: var(--blue); }

/* Quick search results */
#search-results { padding: 0; }
.search-result-item {
  padding: 13px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.16s;
}
.search-result-item:hover, .search-result-item:active { background: var(--blue-light); }
.sr-ref { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; color: var(--blue); }
.sr-hint { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* ── Drilldown Navigation ── */
.drilldown-tab {
  flex: 1;
  padding: 12px 4px 10px;
  background: none;
  border: none;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.18s;
  position: relative;
  bottom: -1px;
}
.drilldown-tab.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
}
.drilldown-tab:disabled { opacity: 0.4; cursor: default; }

.drill-chip {
  font-size: 12px;
  font-weight: 600;
  color: var(--blue);
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  border-radius: 20px;
  padding: 4px 12px;
  white-space: nowrap;
  cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif;
}

.number-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 4px 0 16px;
}
.number-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s;
}
.number-item:active, .number-item:hover {
  border-color: var(--blue);
  background: var(--blue-light);
  color: var(--blue);
}
.testament-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 10px 4px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.book-list-item {
  padding: 13px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s;
}
.book-list-item:hover, .book-list-item:active {
  background: var(--blue-light);
  color: var(--blue);
}

#toast {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--text);
  color: #fff;
  font-size: 12.5px;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
  max-width: 80vw;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <div class="logo">Word</div>
      <div class="logo-sub">KJV Bible Listener</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="ai-toggle-btn" onclick="toggleAi()" title="Toggle AI context detection" style="position:relative;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="18" cy="6" r="3" fill="currentColor" stroke="none" style="fill:#7c3aed"/></svg>
        <span id="ai-indicator" style="position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#7c3aed;border:1.5px solid #fff;"></span>
      </button>
      <button class="icon-btn" id="share-btn" onclick="toggleScreenShare()" title="Share screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button class="icon-btn" onclick="openIndex()" title="Bible Index">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </button>
      <button class="icon-btn" onclick="openSearch()" title="Search Verse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </header>

  <!-- Status Bar -->
  <div id="listen-bar">
    <div class="status-dot" id="status-dot"></div>
    <div id="status-text">Tap the mic to start listening</div>
  </div>

  <!-- Speaker tip — shown once when listening starts near a PA system -->
  <div id="speaker-tip" style="display:none; background:#fffbeb; border-bottom:1px solid #fde68a; padding:8px 16px; flex-shrink:0; align-items:center; gap:8px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span style="font-size:11.5px; color:#92400e; line-height:1.4;">Hold phone near the speaker or PA for best detection</span>
    <button onclick="document.getElementById('speaker-tip').style.display='none'" style="margin-left:auto; background:none; border:none; color:#d97706; font-size:16px; cursor:pointer; padding:0 2px; line-height:1;">&times;</button>
  </div>

  <!-- Transcript -->
  <div id="transcript-wrap">
    <div id="transcript-text">Listening...</div>
  </div>

  <!-- Main verse area -->
  <div id="main">
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6v12M15 6v12M3 6h18M3 12h18M3 18h18"/></svg>
      </div>
      <div class="empty-title">Ready to Listen</div>
      <div class="empty-sub">Tap the mic and the pastor's Bible references will appear here automatically.</div>
    </div>
    <div id="verse-area"></div>
  </div>

  <!-- Bottom Bar -->
  <div id="bottom-bar">
    <button id="mic-btn" onclick="toggleListening()" title="Toggle microphone">

// Check spoken text against famous quote database
function detectFromQuotes(text) {
  const t = text.toLowerCase().replace(/[^a-z\s]/g, ' ').replace(/\s+/g, ' ').trim();
  let best = null;
  let bestLen = 0;
  for (const entry of QUOTE_DB) {
    for (const key of entry.keys) {
      // Check if the key phrase appears in the text (fuzzy: allow 1-2 word gaps)
      if (t.includes(key) || partialPhraseMatch(t, key)) {
        if (key.length > bestLen) {
          bestLen = key.length;
          best = entry;
        }
      }
    }
  }
  return best ? { bookKey: best.bookKey, chapter: best.chapter, verse: best.verse, aiMatch: false } : null;
}

// Allow matching even if 1-2 short words differ or are missing
function partialPhraseMatch(text, phrase) {
  const pw = phrase.split(' ');
  if (pw.length < 4) return false; // only use partial match for longer phrases
  // Check if at least 75% of the phrase words appear in sequence in text
  const tw = text.split(' ');
  let pi = 0, matches = 0;
  for (let ti = 0; ti < tw.length && pi < pw.length; ti++) {
    if (tw[ti] === pw[pi] || similarity(tw[ti], pw[pi]) > 0.8) {
      matches++;
      pi++;
    }
  }
  return matches / pw.length >= 0.75;
}

// Levenshtein distance for fuzzy book name matching
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// How similar two strings are (0-1, higher = more similar)
function similarity(a, b) {
  if (a === b) return 1;
  const longer = Math.max(a.length, b.length);
  if (longer === 0) return 1;
  return (longer - levenshtein(a, b)) / longer;
}

// Find best matching book key from a spoken word, with fuzzy tolerance
function fuzzyBookMatch(word) {
  if (!word || word.length < 2) return null;
  word = word.toLowerCase().trim();

  // First: exact alias match
  for (const { alias, bookKey } of ALIAS_LIST) {
    if (alias === word) return { bookKey, score: 1 };
  }

  // Second: starts-with match (prefix) — catches "detomy" starting like "deut"
  for (const { alias, bookKey } of ALIAS_LIST) {
    if (alias.length >= 3 && word.length >= 3) {
      const minLen = Math.min(alias.length, word.length, 5);
      if (alias.slice(0, minLen) === word.slice(0, minLen)) {
        return { bookKey, score: 0.9 };
      }
    }
  }

  // Third: fuzzy similarity — catches "sam" for "samuel", "detomy" for "deuteronomy"
  let best = null, bestScore = 0;
  for (const { alias, bookKey } of ALIAS_LIST) {
    // Only compare against aliases of similar length or if word is prefix of alias
    if (Math.abs(alias.length - word.length) > 6) continue;
    const sim = similarity(word, alias);
    // Also check if word is contained in alias or alias starts with word
    const startBonus = alias.startsWith(word.slice(0, Math.min(word.length, 4))) ? 0.15 : 0;
    const score = sim + startBonus;
    if (score > bestScore && score > 0.55) {
      bestScore = score;
      best = { bookKey, score };
    }
  }
  return best;
}

// ────────────────────────────────────────────────────────────
function detectVerse(rawText) {
  const t = rawText.toLowerCase()
    .replace(/\b(\d+)st\b/g, '$1').replace(/\b(\d+)nd\b/g, '$1')
    .replace(/\b(\d+)rd\b/g, '$1').replace(/\b(\d+)th\b/g, '$1')
    .replace(/[,;.!?]/g, ' ').replace(/\s+/g, ' ').trim();

  // ── NAVIGATION — natural pastor language ──
  // "next verse", "go forward", "continue", "verse after", etc.
  if (/\b(next verse|verse next|go forward|go ahead|forward verse|move forward|continue to the next|following verse)\b/.test(t)) return { action: 'next' };
  if (/\b(previous verse|last verse|prev verse|go back|back to the|verse before|prior verse|take me back|step back)\b/.test(t)) return { action: 'prev' };
  if (/\bnext chapter\b/.test(t)) return { action: 'nextCh' };
  if (/\b(previous chapter|last chapter|prior chapter|go back to chapter)\b/.test(t)) return { action: 'prevCh' };

  // "go to verse 3" / "take me to verse 5" / "verse 12" / "read verse 8"
  const gotoVerseM = t.match(/\b(?:go to|take me to|read|jump to|open)?\s*verse\s+(\d+)\b/);
  if (gotoVerseM) return { action: 'gotoVerse', verse: parseInt(gotoVerseM[1]) };

  // "go to chapter 6" / "chapter 6" / "take me to chapter 4"
  const gotoChM = t.match(/\b(?:go to|take me to|jump to|open)?\s*chapter\s+(\d+)\b/);
  if (gotoChM) return { action: 'gotoChapter', chapter: parseInt(gotoChM[1]) };

  // "yes" / "yeah" — confirm top candidate
  if (/^\s*(yes|yeah|yep|correct|that'?s? (the one|it)|right|confirm)\s*$/.test(t)) return { action: 'confirm' };

  const numWord = '(?:' + Object.keys(WORD_NUMS).sort((a,b)=>b.length-a.length).join('|') + '|\\d+)';

  // ── EXACT ALIAS MATCH (original logic) ──
  for (const { alias, bookKey } of ALIAS_LIST) {
    const idx = t.indexOf(alias);
    if (idx === -1) continue;
    const before = idx > 0 ? t[idx - 1] : ' ';
    if (/[a-z]/.test(before)) continue;

    const after = t.slice(idx + alias.length).trim();
    const result = extractChapterVerse(after, numWord, bookKey);
    if (result) return result;
  }

  // ── FUZZY MATCH: try each word / bigram / trigram in the transcript ──
  const words = t.split(/\s+/);
  for (let i = 0; i < words.length; i++) {
    // Try single word, then 2-word, then 3-word combos for multi-word books
    for (let len = 1; len <= 3 && i + len <= words.length; len++) {
      const phrase = words.slice(i, i + len).join(' ');
      if (phrase.length < 2) continue;

      const match = fuzzyBookMatch(phrase);
      if (!match) continue;

      // Make sure what comes after looks like chapter:verse numbers
      const afterWords = words.slice(i + len).join(' ').trim();
      const result = extractChapterVerse(afterWords, numWord, match.bookKey);
      if (result) {
        result.fuzzy = true;
        return result;
      }
    }
  }

  return null;
}

// Extract chapter and verse from the text that follows a book name
function extractChapterVerse(after, numWord, bookKey) {
  const patterns = [
    /^(\d+)\s*:\s*(\d+)/,
    /^chapter\s+(\d+)\s+verse\s+(\d+)/i,
    /^ch\.?\s*(\d+)\s+v\.?\s*(\d+)/i,
    /^(\d+)\s+(\d+)(?!\d)/,
    new RegExp('^(' + numWord + ')\\s+(?:verse\\s+)?(' + numWord + ')\\s*', 'i'),
  ];
  for (const pat of patterns) {
    const m = after.match(pat);
    if (m) {
      const ch = wordsToNum(m[1]);
      const vs = wordsToNum(m[2]);
      if (ch && vs) return { bookKey, chapter: ch, verse: vs };
    }
  }
  // Chapter only
  const chOnly = after.match(/^(?:chapter\s+)?(\d+)(?:\s|$)/i);
  if (chOnly) {
    const ch = parseInt(chOnly[1]);
    if (ch) return { bookKey, chapter: ch, verse: 1 };
  }
  return null;
}

// ────────────────────────────────────────────────────────────
// API
// ────────────────────────────────────────────────────────────
async function fetchVerse(bookKey, chapter, verse) {
  const bookStr = BOOK_API[bookKey] || bookKey;
  const ref = `${encodeURIComponent(bookStr)}+${chapter}:${verse}`;
  const url = `https://bible-api.com/${ref}?translation=kjv`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Not found');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return (data.text || data.verses?.[0]?.text || '').trim();
}

// ────────────────────────────────────────────────────────────
// VERSE ACTIONS
// ────────────────────────────────────────────────────────────
function displayName(bookKey) {
  // Convert "1Samuel" -> "1 Samuel", "SongOfSolomon" -> "Song of Solomon"
  return bookKey
    .replace(/^(\d)/, '$1 ')
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace('Of', 'of');
}

function formatRef(v) {
  return `${displayName(v.bookKey)} ${v.chapter}:${v.verse}`;
}

async function goToVerse(bookKey, chapter, verse, addHistory = true, aiMatch = false) {
  if (isFetching) return;
  isFetching = true;

  // Dedup
  const key = `${bookKey}${chapter}:${verse}`;
  if (currentVerse && `${currentVerse.bookKey}${currentVerse.chapter}:${currentVerse.verse}` === key) {
    isFetching = false;
    return;
  }

  if (addHistory && currentVerse?.text) {
    verseHistory.push({ ...currentVerse });
    if (verseHistory.length > 25) verseHistory.shift();
  }

  currentVerse = { bookKey, chapter, verse, text: null, aiMatch };
  renderVerses();
  setStatus(`Loading ${formatRef(currentVerse)}...`, 'live');

  try {
    const text = await fetchVerse(bookKey, chapter, verse);
    currentVerse.text = text;
    const el = document.getElementById('current-text');
    if (el) { el.textContent = text; el.classList.remove('loading'); }
    setStatus(`${formatRef(currentVerse)}`, 'live');
    toast(`${formatRef(currentVerse)}`);
    saveSession();
    // Add adjacent strip now that text is loaded
    const area = document.getElementById('verse-area');
    let strip = document.getElementById('adjacent-strip');
    if (!strip) {
      strip = document.createElement('div');
      strip.id = 'adjacent-strip';
      strip.style.cssText = 'display:flex; gap:8px; margin-bottom:12px;';
      // Insert after the current card (first child)
      if (area.firstChild) area.firstChild.after(strip);
      else area.appendChild(strip);
    }
    prefetchAdjacent(bookKey, chapter, verse);
  } catch (e) {
    const msg = 'Verse not found. Try another reference.';
    currentVerse.text = msg;
    const el = document.getElementById('current-text');
    if (el) { el.textContent = msg; el.classList.remove('loading'); }
    setStatus('Verse not found', 'error');
  }

  isFetching = false;
}

async function navVerse(dir) {
  if (!currentVerse) return;
  let { bookKey, chapter, verse } = currentVerse;
  verse += dir;
  if (verse < 1) {
    chapter--;
    if (chapter < 1) { toast('Beginning of this book'); return; }
    verse = 200; // API will correct
  }
  await goToVerse(bookKey, chapter, verse, false);
}

async function navChapter(dir) {
  if (!currentVerse) return;
  let { bookKey, chapter } = currentVerse;
  chapter += dir;
  if (chapter < 1) { toast('Beginning of this book'); return; }
  await goToVerse(bookKey, chapter, 1, false);
}

function clearAll() {
  verseHistory = [];
  currentVerse = null;
  lastDetectedKey = '';
  aiBuffer = '';
  lastAiText = '';
  adjacentVerses = { prev: null, next: null };
  clearTimeout(aiDebounceTimer);
  const picker = document.getElementById('candidate-picker');
  if (picker) picker.remove();
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  renderVerses();
  setStatus('Cleared. Tap the mic to listen.');
}

// ────────────────────────────────────────────────────────────
// MEMORY (localStorage)
// ────────────────────────────────────────────────────────────
const STORAGE_KEY = 'word_kjv_session';

function saveSession() {
  try {
    const data = {
      currentVerse,
      verseHistory: verseHistory.slice(-50),
      savedAt: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    // Only restore if saved within last 24 hours
    if (Date.now() - data.savedAt > 86400000) return;
    if (data.verseHistory?.length) verseHistory = data.verseHistory;
    if (data.currentVerse?.bookKey) {
      currentVerse = data.currentVerse;
      renderVerses();
      setStatus(`Restored: ${formatRef(currentVerse)}`);
      toast(`Session restored — ${formatRef(currentVerse)}`);
    }
  } catch(e) {}
}

// ────────────────────────────────────────────────────────────
// ADJACENT VERSE CACHE (for instant preview)
// ────────────────────────────────────────────────────────────
let adjacentVerses = { prev: null, next: null }; // { text, ref }

async function prefetchAdjacent(bookKey, chapter, verse) {
  adjacentVerses = { prev: null, next: null };
  const vc = getVerseCount(bookKey, chapter);

  const tasks = [];
  // Prev
  if (verse > 1) {
    tasks.push(fetchVerse(bookKey, chapter, verse - 1).then(t => {
      adjacentVerses.prev = { bookKey, chapter, verse: verse - 1, text: t };
    }).catch(() => {}));
  }
  // Next
  if (verse < vc) {
    tasks.push(fetchVerse(bookKey, chapter, verse + 1).then(t => {
      adjacentVerses.next = { bookKey, chapter, verse: verse + 1, text: t };
    }).catch(() => {}));
  }
  await Promise.all(tasks);
  // Re-render adjacent strip if current verse is still the same
  const strip = document.getElementById('adjacent-strip');
  if (strip) renderAdjacentStrip(strip);
}

function renderAdjacentStrip(container) {
  container.innerHTML = '';
  const make = (v, label) => {
    if (!v) return;
    const el = document.createElement('div');
    el.style.cssText = `
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 10px 12px; cursor: pointer; transition: all 0.16s; flex: 1;
    `;
    el.innerHTML = `
      <div style="font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px;">${label}</div>
      <div style="font-family:'Lora',serif; font-size:12px; font-weight:600; color:var(--blue); margin-bottom:4px;">${displayName(v.bookKey)} ${v.chapter}:${v.verse}</div>
      <div style="font-size:12px; color:var(--text-mid); font-style:italic; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${v.text || ''}</div>
    `;
    el.onmouseenter = () => { el.style.borderColor = 'var(--blue-mid)'; el.style.background = 'var(--blue-light)'; };
    el.onmouseleave = () => { el.style.borderColor = 'var(--border)'; el.style.background = 'var(--bg)'; };
    el.onclick = () => goToVerse(v.bookKey, v.chapter, v.verse, true);
    container.appendChild(el);
  };
  make(adjacentVerses.prev, 'Prev verse');
  make(adjacentVerses.next, 'Next verse');
}
function renderVerses() {
  const area = document.getElementById('verse-area');
  const empty = document.getElementById('empty-state');
  area.innerHTML = '';

  if (!currentVerse && verseHistory.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  if (currentVerse) {
    const card = document.createElement('div');
    card.className = 'verse-card current';
    if (currentVerse.aiMatch) card.classList.add('ai-match');
    const ref = formatRef(currentVerse);
    const bodyContent = currentVerse.text
      ? currentVerse.text
      : '<span class="loading">Fetching verse...</span>';
    const badge = currentVerse.aiMatch
      ? `<div class="badge-ai" title="Detected from sermon context by AI">AI match</div>`
      : `<div class="badge-live">Live</div>`;
    card.innerHTML = `
      <div class="card-top">
        <div class="verse-ref">${ref}</div>
        ${badge}
      </div>
      <div class="verse-body${currentVerse.text ? '' : ' loading'}" id="current-text">${bodyContent}</div>
      <div class="nav-row">
        <button class="nav-btn" onclick="navVerse(-1)">Prev verse</button>
        <div class="nav-sep"></div>
        <button class="nav-btn" onclick="navChapter(-1)">Prev ch.</button>
        <div class="nav-sep"></div>
        <button class="nav-btn" onclick="navChapter(1)">Next ch.</button>
        <div class="nav-sep"></div>
        <button class="nav-btn" onclick="navVerse(1)">Next verse</button>
      </div>`;
    area.appendChild(card);

    // Adjacent verse preview strip
    if (currentVerse.text) {
      const strip = document.createElement('div');
      strip.id = 'adjacent-strip';
      strip.style.cssText = 'display:flex; gap:8px; margin-bottom:12px;';
      area.appendChild(strip);
      renderAdjacentStrip(strip);
    }
  }

  if (verseHistory.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Earlier in this service';
    area.appendChild(lbl);

    [...verseHistory].reverse().forEach((v, ri) => {
      const idx = verseHistory.length - 1 - ri;
      const card = document.createElement('div');
      card.className = 'hist-card';
      card.innerHTML = `<div class="hist-ref">${formatRef(v)}</div><div class="hist-text">${v.text || ''}</div>`;
      card.onclick = () => jumpToHistory(idx);
      area.appendChild(card);
    });
  }

  area.scrollTop = 0;
}

function jumpToHistory(idx) {
  const v = verseHistory[idx];
  if (!v) return;
  if (currentVerse?.text) verseHistory.push({ ...currentVerse });
  verseHistory.splice(idx, 1);
  currentVerse = { ...v };
  renderVerses();
  setStatus(`${formatRef(currentVerse)}`, 'live');
}

// ────────────────────────────────────────────────────────────
// SPEECH RECOGNITION
// ────────────────────────────────────────────────────────────
function toggleListening() {
  isListening ? stopListening() : startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('Speech recognition not supported. Use Chrome.', 'error');
    toast('Use Chrome or Safari for listening');
    return;
  }

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 5;

  recognition.onstart = () => {
    isListening = true;
    setListeningUI(true);
    // Show speaker tip once per session
    const tip = document.getElementById('speaker-tip');
    tip.style.display = 'flex';
  };

  recognition.onresult = (event) => {
    let interim = '', finalText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += t + ' ';
      else interim += t;
    }

    const display = (finalText || interim).trim();
    updateTranscript(display);

    // Try final result with all alternatives (pattern + quote matching)
    if (finalText.trim()) {
      const last = event.results[event.results.length - 1];
      let detected = null;

      // 1. Try all speech alternatives for explicit reference (e.g. "John 3:16")
      for (let i = 0; i < last.length; i++) {
        detected = detectVerse(last[i].transcript);
        if (detected) break;
      }

      // 2. If no explicit ref, try famous quote database on accumulated speech
      if (!detected) {
        // Use last few seconds of transcript for quote matching
        const recentText = (aiBuffer + ' ' + finalText).slice(-300);
        detected = detectFromQuotes(recentText);
        if (detected) toast('Quote detected');
      }

      if (detected) {
        handleDetected(detected);
      } else {
        // 3. No match — feed to AI buffer for contextual AI detection
        aiBuffer += ' ' + finalText.trim();
        if (aiBuffer.length > 500) aiBuffer = aiBuffer.slice(-500);
        scheduleAiCheck();
      }
    } else if (interim) {
      // Fast path on interim: check explicit refs + quotes
      const nav = detectVerse(interim);
      if (nav) { handleDetected(nav); return; }
      const q = detectFromQuotes(interim);
      if (q) handleDetected(q);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') {
      setStatus('Microphone access denied', 'error');
      toast('Please allow microphone access');
      stopListening();
    }
  };

  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    }
  };

  try { recognition.start(); }
  catch(e) { setStatus('Could not start microphone', 'error'); }
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  setListeningUI(false);
  document.getElementById('transcript-wrap').classList.remove('active');
  document.getElementById('speaker-tip').style.display = 'none';
  clearTimeout(aiDebounceTimer);
  aiBuffer = '';
  lastAiText = '';
  if (!currentVerse) setStatus('Tap the mic to start listening');
  else setStatus(`${formatRef(currentVerse)}`);
}

function setListeningUI(on) {
  const btn = document.getElementById('mic-btn');
  const label = document.getElementById('mic-label');
  const hint = document.getElementById('mic-hint');
  const off = document.getElementById('mic-svg-off');
  const on2 = document.getElementById('mic-svg-on');

  if (on) {
    btn.classList.add('listening');
    label.textContent = 'Listening...';
    hint.textContent = 'Tap to stop';
    off.style.display = 'none';
    on2.style.display = 'block';
    setStatus('Listening for Bible verses', 'live');
  } else {
    btn.classList.remove('listening');
    label.textContent = 'Start Listening';
    hint.textContent = 'Detects verses automatically';
    off.style.display = 'block';
    on2.style.display = 'none';
    setStatus('Tap the mic to start listening');
  }
}

function updateTranscript(text) {
  if (!text) return;
  const wrap = document.getElementById('transcript-wrap');
  const div = document.getElementById('transcript-text');
  wrap.classList.add('active');

  // Highlight detected book names
  let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  for (const { alias } of ALIAS_LIST) {
    const re = new RegExp(`\\b(${alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})\\b`, 'gi');
    html = html.replace(re, '<span class="hit">$1</span>');
  }
  div.innerHTML = html;
}

function handleDetected(detected) {
  if (detected.action) {
    if (detected.action === 'confirm') {
      // "yes" - auto-select top candidate if picker is open
      const picker = document.getElementById('candidate-picker');
      if (picker) {
        const first = picker.querySelector('button');
        if (first) first.click();
      }
      return;
    }
    if (detected.action === 'gotoVerse') {
      if (!currentVerse) return;
      goToVerse(currentVerse.bookKey, currentVerse.chapter, detected.verse, false);
      return;
    }
    if (detected.action === 'gotoChapter') {
      if (!currentVerse) return;
      goToVerse(currentVerse.bookKey, detected.chapter, 1, false);
      return;
    }
    if (!currentVerse) return;
    const actions = {
      next: () => navVerse(1),
      prev: () => navVerse(-1),
      nextCh: () => navChapter(1),
      prevCh: () => navChapter(-1)
    };
    actions[detected.action]?.();
    return;
  }

  const key = `${detected.bookKey}${detected.chapter}:${detected.verse}`;
  if (key === lastDetectedKey) return;
  lastDetectedKey = key;
  goToVerse(detected.bookKey, detected.chapter, detected.verse, true, detected.aiMatch || false);
  setTimeout(() => { if (lastDetectedKey === key) lastDetectedKey = ''; }, 4000);
}

// ────────────────────────────────────────────────────────────
// AI CONTEXT DETECTION ENGINE
// ────────────────────────────────────────────────────────────
function scheduleAiCheck() {
  if (!aiEnabled) return;
  clearTimeout(aiDebounceTimer);
  aiDebounceTimer = setTimeout(runAiDetection, 2000);
}

async function runAiDetection() {
  const text = aiBuffer.trim();
  if (!text || text === lastAiText || isAiChecking || isFetching) return;
  if (text.split(' ').length < 5) return;

  // If no proxy configured, skip AI silently
  if (!AI_PROXY_URL || AI_PROXY_URL.includes('YOUR-NAME')) return;

  isAiChecking = true;
  lastAiText = text;
  setStatus('AI scanning context...', 'live');

  try {
    const response = await fetch(AI_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!response.ok) {
      console.warn('AI proxy error:', response.status);
      setStatus(currentVerse ? formatRef(currentVerse) : 'Listening...', isListening ? 'live' : '');
      isAiChecking = false;
      return;
    }

    const data = await response.json();
    // Worker returns raw Anthropic response — parse it
    const raw = (data.content?.[0]?.text || '').trim().replace(/```json|```/g, '');

    let result;
    try { result = JSON.parse(raw); } catch { result = { found: false }; }

    if (result.found && result.matches?.length > 0) {
      const highConf = result.matches.filter(m => m.confidence === 'high');
      const final = highConf.length > 0 ? highConf : result.matches;

      if (final.length === 1) {
        const m = final[0];
        const bookKey = resolveBookKey(m.book);
        if (bookKey) handleDetected({ bookKey, chapter: m.chapter, verse: m.verse, aiMatch: true, reason: m.reason });
      } else if (final.length > 1) {
        candidateVerses = final.map(m => ({ bookKey: resolveBookKey(m.book), chapter: m.chapter, verse: m.verse, reason: m.reason })).filter(m => m.bookKey);
        if (candidateVerses.length > 0) showCandidatePicker();
      }
      aiBuffer = '';
    } else {
      setStatus(currentVerse ? formatRef(currentVerse) : 'Listening for Bible verses', isListening ? 'live' : '');
    }
  } catch (e) {
    console.warn('AI detection error:', e);
    setStatus(currentVerse ? formatRef(currentVerse) : 'Listening for Bible verses', isListening ? 'live' : '');
  }

  isAiChecking = false;
}

function resolveBookKey(bookName) {
  if (!bookName) return null;
  const normalized = bookName.toLowerCase().trim();
  // Direct key match
  for (const key of Object.keys(BOOK_API)) {
    if (key.toLowerCase() === normalized) return key;
  }
  // Alias match
  for (const { alias, bookKey } of ALIAS_LIST) {
    if (alias === normalized) return bookKey;
  }
  // Partial match on display name
  for (const key of Object.keys(BOOK_API)) {
    if (displayName(key).toLowerCase() === normalized) return key;
  }
  return null;
}

function showCandidatePicker() {
  // Remove any existing picker
  const old = document.getElementById('candidate-picker');
  if (old) old.remove();

  const picker = document.createElement('div');
  picker.id = 'candidate-picker';
  picker.style.cssText = `
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #fff; border: 2px solid var(--blue); border-radius: 18px;
    box-shadow: 0 8px 40px rgba(37,99,235,0.22); z-index: 300;
    padding: 14px 16px; min-width: 280px; max-width: 90vw;
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
  `;

  const title = document.createElement('div');
  title.style.cssText = 'font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--blue); margin-bottom:10px;';
  title.textContent = 'AI found possible matches';
  picker.appendChild(title);

  for (const cand of candidateVerses) {
    const btn = document.createElement('button');
    const ref = `${displayName(cand.bookKey)} ${cand.chapter}:${cand.verse}`;
    btn.style.cssText = `
      display:block; width:100%; text-align:left; padding:10px 12px; margin-bottom:6px;
      border-radius:12px; border:1.5px solid var(--border); background:var(--bg);
      cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.16s;
    `;
    btn.innerHTML = `<div style="font-family:'Lora',serif; font-size:15px; font-weight:600; color:var(--blue);">${ref}</div>
      <div style="font-size:11px; color:var(--text-dim); margin-top:2px; font-style:italic;">"${cand.reason || ''}"</div>`;
    btn.onmouseover = () => { btn.style.background = 'var(--blue-light)'; btn.style.borderColor = 'var(--blue-mid)'; };
    btn.onmouseout = () => { btn.style.background = 'var(--bg)'; btn.style.borderColor = 'var(--border)'; };
    btn.onclick = () => {
      picker.remove();
      handleDetected({ bookKey: cand.bookKey, chapter: cand.chapter, verse: cand.verse, aiMatch: true });
    };
    picker.appendChild(btn);
  }

  const dismiss = document.createElement('button');
  dismiss.style.cssText = `
    display:block; width:100%; text-align:center; padding:8px; margin-top:2px;
    border:none; background:none; font-size:12px; color:var(--text-dim); cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif;
  `;
  dismiss.textContent = 'Dismiss';
  dismiss.onclick = () => picker.remove();
  picker.appendChild(dismiss);

  document.body.appendChild(picker);
  // Auto-dismiss after 12 seconds
  setTimeout(() => { if (picker.parentNode) picker.remove(); }, 12000);
}

function openSearch() {
  sheetMode = 'search';
  document.getElementById('sheet-title').textContent = 'Search';
  document.getElementById('search-box-wrap').style.display = '';
  document.getElementById('search-results').innerHTML = '<div style="padding:20px 12px; color:var(--text-dim); font-size:13px;">Type a verse reference above (e.g. John 3:16)</div>';
  document.getElementById('index-content').innerHTML = '';
  openSheet();
  setTimeout(() => document.getElementById('search-input').focus(), 350);
}

function openIndex() {
  sheetMode = 'index';
  document.getElementById('sheet-title').textContent = 'Bible Books';
  document.getElementById('search-box-wrap').style.display = 'none';
  document.getElementById('search-results').innerHTML = '';
  renderIndex();
  openSheet();
}

function renderIndex() {
  const el = document.getElementById('index-content');
  const makeSection = (title, books) => {
    const sec = document.createElement('div');
    sec.className = 'book-section';
    sec.innerHTML = `<div class="book-section-title">${title}</div>`;
    const grid = document.createElement('div');
    grid.className = 'book-grid';
    for (const bk of books) {
      const btn = document.createElement('button');
      btn.className = 'book-item';
      btn.textContent = displayName(bk);
      btn.onclick = () => {
        closeSheet();
        goToVerse(bk, 1, 1, true);
      };
      grid.appendChild(btn);
    }
    sec.appendChild(grid);
    return sec;
  };
  el.innerHTML = '';
  el.appendChild(makeSection('Old Testament', OT_BOOKS));
  el.appendChild(makeSection('New Testament', NT_BOOKS));
}

function onSearchInput() {
  const val = document.getElementById('search-input').value.trim();
  const results = document.getElementById('search-results');

  if (!val) {
    results.innerHTML = '<div style="padding:20px 12px; color:var(--text-dim); font-size:13px;">Type a verse reference (e.g. John 3:16)</div>';
    return;
  }

  const detected = detectVerse(val);
  if (detected && !detected.action) {
    const ref = `${displayName(detected.bookKey)} ${detected.chapter}:${detected.verse}`;
    results.innerHTML = `
      <div class="search-result-item" onclick="doSearchGo('${detected.bookKey}',${detected.chapter},${detected.verse})">
        <div class="sr-ref">${ref}</div>
        <div class="sr-hint">Tap to open</div>
      </div>`;
  } else {
    // Book name partial match
    const q = val.toLowerCase();
    const matches = [];
    for (const bk of [...OT_BOOKS, ...NT_BOOKS]) {
      if (displayName(bk).toLowerCase().includes(q) || bk.toLowerCase().includes(q)) {
        matches.push(bk);
      }
    }
    if (matches.length > 0) {
      results.innerHTML = matches.slice(0, 8).map(bk =>
        `<div class="search-result-item" onclick="doSearchGo('${bk}',1,1)">
          <div class="sr-ref">${displayName(bk)}</div>
          <div class="sr-hint">Open chapter 1</div>
        </div>`
      ).join('');
    } else {
      results.innerHTML = `<div style="padding:20px 12px; color:var(--text-dim); font-size:13px;">No match. Try "Romans 8:28" or "Psalm 23".</div>`;
    }
  }
}

function getVerseCount(bookKey, chapter) {
  const counts = VERSE_COUNTS[bookKey];
  if (!counts) return 30;
  return counts[chapter - 1] || 30;
}

function getChapterCount(bookKey) {
  const counts = VERSE_COUNTS[bookKey];
  return counts ? counts.length : 30;
}

function openSearch() {
  drillBook = null;
  drillChapter = null;
  renderDrillTab('book');
  openSheet();
  setTimeout(() => document.getElementById('search-input').focus(), 350);
}

function openIndex() {
  openSearch();
}

function goToTab(tab) {
  if (tab === 'chapter' && !drillBook) return;
  if (tab === 'verse' && (!drillBook || !drillChapter)) return;
  renderDrillTab(tab);
}

function renderDrillTab(tab) {
  // Update tab active states
  ['book','chapter','verse'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    el.classList.toggle('active', t === tab);
    el.disabled = (t === 'chapter' && !drillBook) || (t === 'verse' && (!drillBook || !drillChapter));
  });

  // Update chips
  const chips = document.getElementById('drill-chips');
  chips.innerHTML = '';
  if (drillBook) {
    const c = document.createElement('span');
    c.className = 'drill-chip';
    c.textContent = displayName(drillBook);
    c.onclick = () => { drillChapter = null; renderDrillTab('book'); };
    chips.appendChild(c);
  }
  if (drillChapter) {
    const c = document.createElement('span');
    c.className = 'drill-chip';
    c.textContent = drillChapter;
    c.onclick = () => renderDrillTab('chapter');
    chips.appendChild(c);
  }

  // Show/hide search box
  document.getElementById('search-box-wrap').style.display = tab === 'book' ? '' : 'none';
  if (tab === 'book') document.getElementById('search-input').value = '';

  const content = document.getElementById('drill-content');
  content.innerHTML = '';

  if (tab === 'book') {
    renderBookList(content, '');
  } else if (tab === 'chapter') {
    renderChapterGrid(content);
  } else if (tab === 'verse') {
    renderVerseGrid(content);
  }
}

function renderBookList(container, filter) {
  const allBooks = [...OT_BOOKS, ...NT_BOOKS];
  const q = filter.toLowerCase();

  const filtered = q
    ? allBooks.filter(bk => displayName(bk).toLowerCase().includes(q))
    : allBooks;

  // Check if input looks like a full reference (e.g. "John 3:16")
  if (q) {
    const detected = detectVerse(filter);
    if (detected && !detected.action) {
      const refEl = document.createElement('div');
      refEl.style.cssText = 'padding:12px 8px; border-bottom:1px solid var(--border); cursor:pointer; background:var(--blue-light);';
      refEl.innerHTML = `<div style="font-family:'Lora',serif; font-size:15px; font-weight:600; color:var(--blue);">${displayName(detected.bookKey)} ${detected.chapter}:${detected.verse}</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px;">Tap to open</div>`;
      refEl.onclick = () => { closeSheet(); goToVerse(detected.bookKey, detected.chapter, detected.verse, true); };
      container.appendChild(refEl);
    }
  }

  const makeSection = (label, books) => {
    if (books.length === 0) return;
    const lbl = document.createElement('div');
    lbl.className = 'testament-label';
    lbl.textContent = label;
    container.appendChild(lbl);
    books.forEach(bk => {
      const el = document.createElement('div');
      el.className = 'book-list-item';
      el.textContent = displayName(bk);
      el.onclick = () => {
        drillBook = bk;
        drillChapter = null;
        renderDrillTab('chapter');
      };
      container.appendChild(el);
    });
  };

  if (q) {
    makeSection('Books', filtered);
  } else {
    makeSection('Old Testament', OT_BOOKS);
    makeSection('New Testament', NT_BOOKS);
  }
}

function renderChapterGrid(container) {
  const count = getChapterCount(drillBook);
  const grid = document.createElement('div');
  grid.className = 'number-grid';
  for (let i = 1; i <= count; i++) {
    const el = document.createElement('div');
    el.className = 'number-item';
    el.textContent = i;
    el.onclick = () => {
      drillChapter = i;
      renderDrillTab('verse');
    };
    grid.appendChild(el);
  }
  container.appendChild(grid);
}

function renderVerseGrid(container) {
  const count = getVerseCount(drillBook, drillChapter);
  const grid = document.createElement('div');
  grid.className = 'number-grid';
  for (let i = 1; i <= count; i++) {
    const el = document.createElement('div');
    el.className = 'number-item';
    el.textContent = i;
    el.onclick = () => {
      closeSheet();
      goToVerse(drillBook, drillChapter, i, true);
    };
    grid.appendChild(el);
  }
  container.appendChild(grid);
}

function onSearchInput() {
  const val = document.getElementById('search-input').value;
  renderBookList(document.getElementById('drill-content'), val);
}

function doSearchGo(bookKey, chapter, verse) {
  closeSheet();
  goToVerse(bookKey, chapter, verse, true);
}

function setStatus(msg, state = '') {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function toggleAi() {
  aiEnabled = !aiEnabled;
  const indicator = document.getElementById('ai-indicator');
  const btn = document.getElementById('ai-toggle-btn');
  if (aiEnabled) {
    indicator.style.background = '#7c3aed';
    btn.title = 'AI context detection ON';
    toast('AI detection ON');
  } else {
    indicator.style.background = '#d1d5db';
    btn.title = 'AI context detection OFF';
    clearTimeout(aiDebounceTimer);
    toast('AI detection OFF');
  }
}

// ────────────────────────────────────────────────────────────
// SCREEN SHARE
// ────────────────────────────────────────────────────────────
let screenStream = null;

async function toggleScreenShare() {
  const btn = document.getElementById('share-btn');

  if (screenStream) {
    // Stop sharing
    screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    btn.style.color = '';
    btn.title = 'Share screen';
    toast('Screen sharing stopped');
    return;
  }

  if (!navigator.mediaDevices?.getDisplayMedia) {
    toast('Screen share not supported on this browser/device');
    return;
  }

  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: false
    });

    btn.style.color = 'var(--blue)';
    btn.title = 'Stop sharing';
    toast('Screen sharing started');

    // Show the stream in a floating preview so user can confirm it's working
    let preview = document.getElementById('share-preview');
    if (!preview) {
      preview = document.createElement('video');
      preview.id = 'share-preview';
      preview.autoplay = true;
      preview.muted = true;
      preview.style.cssText = `
        position:fixed; bottom:100px; right:12px; width:120px; height:72px;
        border-radius:10px; border:2px solid var(--blue); object-fit:cover;
        z-index:400; box-shadow:var(--shadow-lg);
      `;
      document.body.appendChild(preview);
    }
    preview.srcObject = screenStream;

    // Clean up when user stops via browser UI
    screenStream.getVideoTracks()[0].onended = () => {
      screenStream = null;
      btn.style.color = '';
      btn.title = 'Share screen';
      const p = document.getElementById('share-preview');
      if (p) p.remove();
      toast('Screen sharing ended');
    };
  } catch (e) {
    if (e.name !== 'NotAllowedError') {
      toast('Could not start screen share');
    }
    screenStream = null;
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}
