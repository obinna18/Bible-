And take Him with you ev’ry where.`,keywords:["are you trusting the love of the saviour divine", "are you resting today neath the sheltering rock", "is there victory now where there once was defeat", "ill tell the world that im a christian"],titleWords:["tell", "somebody"]},
  106: {num:106,title:`TELL THE WHOLE WIDE WORLD`,lyrics:`1. Tell the whole wide world of Jesus,
Bear the news from shore to shore;
Telling sinners of the Saviour,
Let the light spread more and more.
Tell the world, the whole wide world;
Bear the news from shore to shore;
Tell the whole wide world of Jesus,
Praise His name for ever more !
2. Send abroad the gospel heralds,
Let them take the blessed light
Into every land of darkness,
Piercing through the shades of night.
3. Yes, we’ll send the joyful message
Over mountain, over wave,
Telling everywhere of Jesus,
And His mighty power to save.
4. While we pray for other nations,
Send them help with willing hand,
Let us not forget the home fields -
Jesus for our native land!`,keywords:["tell the whole wide world of jesus", "send abroad the gospel heralds", "yes well send the joyful message", "while we pray for other nations"],titleWords:["tell", "the", "whole", "wide", "world"]},
  107: {num:107,title:`GO AND TELL THEM`,lyrics:`1. Send the gospel of salvation,
To a world of dying men;
Tell it out to ev’ry nation,
’Till the Lord shall come again.
Go and tell them, go and tell them,
Jesus died for sinful men.
Go and tell them, go and tell them,
He is coming, He is coming,
He is coming back again.
2. ’Tis the church’s great commission,
’Tis the Master’s last command;
Christ has died for every creature,
Tell it out in every land.
3. Christ is gathering out a people,
To His name from every race;
Haste to give the invitation
Ere shall end the day of grace.
4. Give the gospel as a witness,
To a world of sinful men;
Till the Bride shall be completed,
And the Lord shall come again.`,keywords:["send the gospel of salvation", "tis the churchs great commission", "christ is gathering out a people", "give the gospel as a witness"],titleWords:["go", "and", "tell", "them"]},
  108: {num:108,title:`MUST I GO AND EMPTY-HANDED?`,lyrics:`1. “Must I go, and empty-handed,”
Thus my dear Redeemer meet?
Not one day of service give Him,
Lay no trophy at His feet?
“Must I go, and empty-handed?”
Must I meet my Saviour so?
Not one soul with which to greet Him:
Must I empty-handed go?
2. Not at death I shrink nor falter,
For my Saviour saves me now;
But to meet Him empty-handed,
Thought of that now clouds my brow.
3. O the years in sinning wasted,
Could I but recall them now,
I would give them to my Saviour,
To His will I’d gladly bow.
4. O ye saints, arouse, be earnest,
Up and work while yet ’tis day;
Ere the night of death o’er take thee,
Strive for souls while still you may.`,keywords:["must i go and emptyhanded", "not at death i shrink nor falter", "o the years in sinning wasted", "o ye saints arouse be earnest"],titleWords:["must", "i", "go", "and", "empty-handed?"]},
  109: {num:109,title:`TO THE WORK`,lyrics:`1. To the work! to the work! we are servants of God,
Let us follow the path that our Master has trod;
With the balm of His counsel our strength to renew,
Let us do with our might what our hands find to do.
Toiling on, toiling on, toiling on, toiling on;
Let us hope, Let us watch,
And labour till the Master comes.
2. To the work! to the work! let the hungry be fed,
To the fountain of life let the weary be led!
In the cross and its banner our glory shall be,
While we herald the tidings, “Salvation is free”!
3. To the work! to the work! there is labour for all,
For the kingdom of darkness and error shall fall:
And the name of Jehovah exalted shall be,
In the loud-swelling chorus, “Salvation is free”!
4. To the work! to the work! in the strength of the Lord,
And a robe and a crown shall our labour reward,
When the home of the faithful our dwelling shall be,
And we shout with the ransomed, “Salvation is free!”`,keywords:["to the work to the work we are servants of god", "to the work to the work let the hungry be fed", "to the work to the work there is labour for all", "to the work to the work in the strength of the lord"],titleWords:["to", "the", "work"]},
  110: {num:110,title:`TILL THE WHOLE WORLD KNOWS`,lyrics:`1. I’ll tell to all that God is love;
For the world has never known
The great compassion of His heart
For the wayward and the lone.
Till the whole world knows,
Till the whole world knows,
I will shout and sing
Of Christ my King,
Till the whole world knows.
2. I’ll tell of mercy’s boundless tide,
Like the waters of the sea,
That covers ev’ry sin of man;
’Tis salvation full and free.
3. I’ll tell of grace that keeps the soul,
Of abiding peace within,
Of faith that overcomes the world,
With its tumult and its din.
4. Eternal glory is the goal
That awaits the sons of light;
Eternal darkness, black as death,
For the children of the night.`,keywords:["ill tell to all that god is love", "ill tell of mercys boundless tide", "ill tell of grace that keeps the soul", "eternal glory is the goal"],titleWords:["till", "the", "whole", "world", "knows"]},
  111: {num:111,title:`RESCUE THE PERISHING`,lyrics:`1. Rescue the perishing, Care for the dying,
Snatch them in pity from sin and the grave;
Weep o’er the erring one, Lift up the fallen,
Tell them of Jesus, the Mighty to save.
Rescue the perishing,
Care for the dying;
Jesus is merciful,
Jesus will save.
2. Though they are slighting Him, Still He is waiting,
Waiting the penitent child to receive.
Plead with them earnestly, plead with them gently,
He will forgive if they only believe.
3. Down in the human heart, Crushed by the tempter,
Feelings lie buried that grace can restore;
Touched by a loving hand, Wakened by kindness,
Chords that were broken will vibrate once more.
4. Rescue the perishing, Duty demands it;
Strength for thy labour the Lord will provide;
Back to the narrow way Patiently win them;
Tell the poor wanderer a Saviour has died.`,keywords:["rescue the perishing care for the dying", "though they are slighting him still he is waiting", "down in the human heart crushed by the tempter", "rescue the perishing duty demands it"],titleWords:["rescue", "the", "perishing"]},
  112: {num:112,title:`WIN THEM ONE BY ONE`,lyrics:`1. If to Christ our only King
Men redeemed we strive to bring,
Just one way may this be done -
We must win them one by one.
So you bring the one next to you
And I’ll bring the one next to me;
In all kinds of weather,
We’ll all work together,
And see what can be done;
If you’ll bring the one next to you,
And I bring the one next to me,
In no time at all we’ll have them all,
So win them, win them, one by one.
2. Side by side we stand each day,
Saved are we, but lost are they;
They will come if we but dare
Speak a word backed up by prayer.
3. Only cowards dare refuse,
Dare this gift of God mis-use;
Ere some friend goes to his grave,
Speak a word his soul to save.
4. Not for hope of great reward
Turn men’s hearts unto the Lord;
Just to see a saved man smile
Makes the effort well worth while.`,keywords:["if to christ our only king", "side by side we stand each day", "only cowards dare refuse", "not for hope of great reward"],titleWords:["win", "them", "one", "by", "one"]},
  113: {num:113,title:`GO AND TELL THE STORY`,lyrics:`1. Go and tell the story to thy friends to-day,
How the Lord of glory met thee on thy way;
How He cleansed thy spir-it from the stain of sin,
Driving out the foes who reigned thy heart within.
Go and tell the story, tell it far and wide,
How the Lord of glory for the sinner died;
And the soul that hears it, and in faith believes,
Straightway he the cleansing from the Lord receives.
2. Go and tell the story, of His pow’r to save,
Of the sinful ‘‘legion’’ sunk beneath the wave;
Tell of His compassion, of His love so true,
Of the wondrous things the Lord hath done for you.
3. Go and tell the story, how He reigns above,
Winning men to glory thro’ His dying love;
How He waits to crown them kings forevermore,
In the home awaiting, on the other shore.`,keywords:["go and tell the story to thy friends today", "go and tell the story of his powr to save", "go and tell the story how he reigns above"],titleWords:["go", "and", "tell", "the", "story"]},
  114: {num:114,title:`BRIGHTEN THE CORNER WHERE YOU ARE`,lyrics:`1. Do not wait until some deed of greatness
you may do,
Do not wait to shed your light afar;
To the many duties ever near you now be true,
Brighten the corner where you are.
Brighten the corner where you are!
Brighten the corner where you are !
Someone far from harbor you may guide
across the bar,
Brighten the corner where you are.
2. Just above are clouded skies that you may
help to clear,
Let not narrow self your way debar;
Tho’ into one heart alone may fall your song of cheer,
Brighten the corner where you are.
3. Here for all your talent you may surely
find a need,
Here reflect the Bright and Morning Star,
Even from your humble hand the bread of life may feed,
Brighten the corner where you are.`,keywords:["do not wait until some deed of greatness", "just above are clouded skies that you may", "here for all your talent you may surely"],titleWords:["brighten", "the", "corner", "where", "you", "are"]},
  115: {num:115,title:`LIFT HIM UP`,lyrics:`1. How to reach the masses, men of every birth,
For an answer Jesus gave the key:
“And I, if I be lifted up from the earth,
Will draw all men unto Me.”
Lift Him up, . ....Lift Him up,.....
Still He speaks from eternity:
“And I, if I be lifted up from the earth,
Will draw all men unto Me.”
2. Oh! the world is hungry for the living bread,
Lift the Saviour up for them to see;
Trust Him, and do not doubt the words that He said,
“I’ll draw all men unto me.”
3. Don’t exalt the preacher, don’t exalt the pew,
Preach the Gospel simple, full and free;
Prove Him and you will find that promise is true,
“I’ll draw all men unto me.’’
4. Lift Him up by living as a Christian ought,
Let the world in you the Saviour see;
Then men will gladly follow Him who once taught,
“I’ll draw all men unto Me.”`,keywords:["how to reach the masses men of every birth", "oh the world is hungry for the living bread", "dont exalt the preacher dont exalt the pew", "lift him up by living as a christian ought"],titleWords:["lift", "him", "up"]},
  116: {num:116,title:`CARRY YOUR BIBLE`,lyrics:`1. Carry your Bible with you,
Let all its blessing outflow;
It will supply you each moment
Take it wherever you go!
Take it wherever you go, (you go,)
Take it wherever you go, (you go;)
God’s message of love
Sent down from above,
Oh, take it wherever you go!
2. Carry the word of pardon,
Sweeter each day it will grow;
Somewhere some heart will be waiting
Take it wherever you go!
3. Carry the wondrous story,
Tell it to hearts plung’d in woe;
This word of gracious redemption
Take it wherever you go!
4. Carry the word of promise,
Sinners unpardon’d may know
God’s path from sin unto safety
Take it wherever you go!`,keywords:["carry your bible with you", "carry the word of pardon", "carry the wondrous story", "carry the word of promise"],titleWords:["carry", "your", "bible"]},
  117: {num:117,title:`SHOW A LITTLE BIT OF LOVE AND KINDNESS`,lyrics:`1. Sing a song, spread some cheer,
There are sad and lonely people ev’rywhere;
Be a friend, show some love,
It will lift them from the dungeons of despair.
Show a little bit of love and kindness,
Never go along with hatred’s blindness,
Take a little time to reach for joy, and wear a
happy face;
Sing a little bit when the days are dreary,
Give a little help to a friend who’s weary-
That’s the way to make the world a happy place!
2. Offer help, bring some hope,
To the fainting and discouraged on life’s road;
See a need, lend a hand,
There are many who are crushed beneath their load.
3. Be a light, show the way,
Be a light within the night for those astray;
Speak a word, loving word,
That will bring them back to walk the narrow way.`,keywords:["sing a song spread some cheer", "offer help bring some hope", "be a light show the way"],titleWords:["show", "a", "little", "bit", "of", "love", "and", "kindness"]},
  118: {num:118,title:`I LOVE TO TELL THE STORY`,lyrics:`1. I love to tell the story of unseen things above,
Of Jesus and His glory, of Jesus and His love;
I love to tell the story because I know ’tis true,
It satisfies my longings as nothing else can do.
I love to tell the story!
’Twill be my theme in glory _
To tell the old, old story
Of Jesus and His love.
2. I love to tell the story - ’tis pleasant to repeat
What seems, each time I tell it, more wonderfully sweet;
I love to tell the story, for some have never heard
The message of salvation from God’s own holy word.
3 I love to tell the story, for those who know it best
Seem hungering and thirsting to hear it like the rest;
And when in scenes of glory, I sing the new, new song,
’Twill be the old, old story that I have love so long.`,keywords:["i love to tell the story of unseen things above", "i love to tell the story  tis pleasant to repeat"],titleWords:["i", "love", "to", "tell", "the", "story"]},
  119: {num:119,title:`DO SOMETHING FOR OTHERS`,lyrics:`1. Many a soul in the battle of life
Trembles with fear at the din and the strife,
Bearing alone, amid trial and care,
Burdens and sorrows God bids you to share.
Do something for others,
Something for others today!...
Duty demands it, and Jesus commands it!
Do something for others today.
2. Many in doubt or in fear of the way
Mutely appeal for your guidance today;
On your demeanour the choice may depend-
Are you concerned for the stranger or friend?
3. Many, disheartened by cruel deceit,
Broken and worn by the pangs of defeat,
Doubting, despairingly, helplessly stand,
Waiting, perhaps, for your strengthening hand.
4. Many are turning away from the right
Into the maze of the shadows of night;
Go to them, speak to them, over them pray,
Help them, support them-do something today.`,keywords:["many a soul in the battle of life", "many in doubt or in fear of the way", "many disheartened by cruel deceit", "many are turning away from the right"],titleWords:["do", "something", "for", "others"]},
  120: {num:120,title:`SPEAK A WORD`,lyrics:`1. Speak a word, a loving word for Jesus,
Ev’rywhere you go;
Tell poor sinners how He died to save them
From eternal woe.
Speak a word for Jesus, speak it quickly,
Swiftly glides the time away,...
Daily tell the wondrous story of the Master’s glory,
Speak a loving word today.
2. Speak a word, a tender word for Jesus,
To the sin-sick soul;
Tell him Christ, who came to save the vilest,
Waits to make him whole.
3. Speak a word, a warning word for Jesus,
Speak it day by day,
Strive to lead some weak and wand’ring brother
In the narrow way.`,keywords:["speak a word a loving word for jesus", "speak a word a tender word for jesus", "speak a word a warning word for jesus"],titleWords:["speak", "a", "word"]},
  121: {num:121,title:`SOMEBODY ELSE NEEDS HIM, TOO`,lyrics:`1. If you’ve found Jesus the Friend that you need,
If He is loving and true,
If you have found Him a Saviour indeed,
Somebody else needs Him, too...
Somebody somewhere perhaps at your side;
Someone is waiting for you;...
Say that for all Jesus suffered and died;
They-need Him, they need Him, too...
2. If you are happy, and praise fills your heart,
Trust Him to carry you through;
If He His Spirit and love can impart,
Somebody else needs Him, too...
3. If you have comfort in being God’s child,
If He is faithful to you,
Think, when you see those whom sin has defiled,
Somebody else needs Him, too....
4. When the Lord gives you His love and His care,
Something He gives you to do;
You have the gospel with others to share,
Somebody else needs Him, too...`,keywords:["if youve found jesus the friend that you need", "if you are happy and praise fills your heart", "if you have comfort in being gods child", "when the lord gives you his love and his care"],titleWords:["somebody", "else", "needs", "him,", "too"]},
  122: {num:122,title:`SOMEBODY NEEDS YOUR LOVE`,lyrics:`1. Out in the darkness of sorrow and sin,
Somebody needs your love;
Led by the Master, that soul you may win,
Somebody needs your love.
Somebody needs your love,
Somebody needs your love,...
Someone in sadness,
Yearning for gladness,
Somebody needs your love.
2. Many are helpless, and wait for your call,
Somebody needs your love;
Show them that Jesus is all and in all,
Somebody needs your love.
3. Some one is tempted to turn from the right,
Somebody needs your love;
Longing for courage and strength for the fight,
Somebody needs your love.
4. Some are down-hearted, in sorrow they roam,
Somebody needs your love;
Many are sighing for heaven and home,
Somebody needs your love.`,keywords:["out in the darkness of sorrow and sin", "many are helpless and wait for your call", "some one is tempted to turn from the right", "some are downhearted in sorrow they roam"],titleWords:["somebody", "needs", "your", "love"]},
  123: {num:123,title:`NO ONE LIKE MY SAVIOUR`,lyrics:`1. There’s no one like my Saviour;
No friend can be like Him;
My never failing sunshine
When earthly lights grow dim;
When summer flow’rs are blooming,
The brightness of my joy,
O, may His happy service
My heart and life employ.
No one, no one like my precious Saviour,
No one, no one such a friend can be;
No one, no one like my precious Saviour,
Glory, glory, Jesus cares for me.
2. There’s no one like my Saviour;
In seasons of distress,
He draws me closer to Him,
To comfort and to bless;
He gives me in temptation,
The strength of His right arm;
His angels camp around me,
To keep me from all harm.
3. There’s no one like my Saviour;
He pardons all my sin,
And gives His Holy Spirit,
A springing well within;
He leads me out to service,
With gentle touch and mild;
O, wonder of all wonders,
That I should be His child.
4. There’s no one like my Saviour,
Come now, and find it true!
He gave His life a ransom,
His blood was shed for you;
Then when we reach the city of everlasting light,
We’ll sing with saints and angels,
All honour, power and might.`,keywords:["theres no one like my saviour", "theres no one like my saviour", "theres no one like my saviour", "theres no one like my saviour"],titleWords:["no", "one", "like", "my", "saviour"]},
  124: {num:124,title:`CHRIST RECEIVETH SINFUL MEN`,lyrics:`1. Sinners Jesus will receive!
Sound this word of grace to all
Who the heav’nly pathway leave,
All who linger, all who fall!
Sing it o’er . . . and o’er again, . . .
Christ receiv . . eth sinful men; . . .
Make the mes . . . sage clear and plain: . . .
Christ receiv . . . eth sinful men. . . .
2. Come: and He will give you rest;
Trust Him; for His word is plain,
He will take the sinful-est;
Christ receiveth sinful men.
3. Now my heart condemns me not,
Pure before the law I stand;
He who cleans’d me from all spot
Satisfied its last demand.
4. Christ receiveth, sinful men;
Even me with all my sin;
Purg’d from ev’ry spot and stain,
Heav’n with Him I enter in.`,keywords:["sinners jesus will receive", "come and he will give you rest", "now my heart condemns me not", "christ receiveth sinful men"],titleWords:["christ", "receiveth", "sinful", "men"]},
  125: {num:125,title:`WONDERFUL GRACE OF JESUS`,lyrics:`1. Wonderful grace of Jesus,
Greater than all my sin;
How shall my tongue describe it,
Where shall its praise begin?
Taking away my burden,
Setting my spirit free,
For the wonderful grace of Jesus reaches me.
Wonderful the matchless grace of Jesus,
Deeper than the mighty rolling sea;
Wonderful grace all sufficient for me,
for even me
Broader than the scope of my trangressions,
Greater far than all my sin and shame, . . .
O magnify the precious name of Jesus,
Praise His name!
2. Wonderful grace of Jesus,
Reaching to all the lost,
By it I have been pardoned,
Saved to the uttermost,
Chains have been torn assunder,
Giving me liberty;
For the wonderful grace of Jesus reaches me.
3. Wonderful grace of Jesus,
Reaching the most defiled,
By its transforming power,
Making him God’s dear child,
Purchasing peace and heaven,
For all eternity;
And the wonderful grace of
Jesus reaches me.`,keywords:["wonderful grace of jesus", "wonderful grace of jesus", "wonderful grace of jesus"],titleWords:["wonderful", "grace", "of", "jesus"]},
  126: {num:126,title:`GREAT GOD OF WONDERS`,lyrics:`1. Great God of wonders! all Thy ways
Display the attributes divine;
But countless acts of pard’ning grace
Beyond Thine other wonders shine:
Who is a pard’ning God like Thee?
Or who has grace so rich and free?
2. In wonder lost, with trembling joy
We take the pardon of our God:
Pardon for crimes of deepest dye,
A pardon bought with Jesus blood.
Who is a pard’ning God like Thee?
Or who has grace so rich and free?
3. Pardon - from an offended God!
Pardon - for sins of deepest dye!
Pardon - bestowed through Jesus’ blood!
Pardon - that brings the rebel nigh!
Who is a pard’ning God like Thee?
Or who has grace so rich and free?
4. O may this strange, this matchless grace,
This God-like miracle of love,
Fill the wide earth with grateful praise,
As now it fills the choirs above!
Who is a pard’ning God like Thee?
Or who has grace so rich and free?`,keywords:["great god of wonders all thy ways", "in wonder lost with trembling joy", "pardon  from an offended god", "o may this strange this matchless grace"],titleWords:["great", "god", "of", "wonders"]},
  127: {num:127,title:`ROCK OF AGES CLEFT FOR ME`,lyrics:`1. Rock of Ages, cleft for me,
Let me hide myself in Thee!
Let the water and the blood,
From Thy riven side which flowed,
Be of sin the double cure;
Cleanse me from its guilt and power.
2. Not the labours of my hands,
Can fulfil Thy law’s demands;
Could my zeal no respite know,
Could my tears for ever flow,
All for sin could not atone;
Thou must save and Thou alone.
3. Nothing in my hand I bring,
Simply to Thy cross I cling;
Naked, come to Thee for dress;
Helpless, look to Thee for grace:
Foul, I to the fountain fly;
Wash me, Saviour, or I die.
4. While I draw this fleeting breath,
When my eyelids close in death,
When I soar to worlds unknown,
See Thee on Thy judgment throne,
Rock of Ages, cleft for me,
Let me hide myself in Thee.`,keywords:["rock of ages cleft for me", "not the labours of my hands", "nothing in my hand i bring", "while i draw this fleeting breath"],titleWords:["rock", "of", "ages", "cleft", "for", "me"]},
  128: {num:128,title:`VICTORY IN JESUS`,lyrics:`1. I heard an old, old story,
How a Saviour came from glory,
How He gave His life on Calvary
To save a wretch like me;
I heard about His groaning,
Of His precious blood’s atoning,
Then I repented of my sins
And won the victory.
O victory in Jesus, my Saviour, forever,
He sought me and bought me
With His redeeming blood;
He loved me ere I knew Him,
And all my love is due Him,
He plunged me to victory
Beneath the cleansing flood.
2. I heard about His healing,
Of His cleasing pow’r revealing,
How He made the lame to walk again
And cause the blind to see;
And then I cried, “dear Jesus
Come and heal my broken spirit,”
And somehow Jesus came and bro’t
To me the victory.
3. I heard about a mansion
He has built for me in glory,
And I heard about the streets of gold
Beyond the crystal sea;
About the angel singing
And the old redemption story,
And some sweet day I’ll sing up there
The song of victory.`,keywords:["i heard an old old story", "i heard about his healing", "i heard about a mansion"],titleWords:["victory", "in", "jesus"]},
  129: {num:129,title:`GRACE GREATER THAN OUR SIN`,lyrics:`1. Marvelous grace of our loving Lord,
Grace that exceeds our sin and our guilt,
Yonder on Calvary’s mount outpoured
There where the blood of the Lamb was spilt.
Grace, grace, God’s grace,
Grace that will pardon and cleanse within;
Grace, grace, God’s grace,
Grace that is greater than all our sin.
2. Sin and despair like the sea waves cold,
Threaten the soul with infinite loss;
Grace that is greater, yes, grace untold,
Point to the Refuge, the Mighty Cross.
3. Dark is the stain that we cannot hide,
What can avail to wash it away?
Look! there is flowing a crimson tide;
Whiter than snow you may be today.
4. Marvelous, infinite, matchless grace,
Freely bestowed on all who believe;
You that are longing to see His face,
Will you this moment His grace receive?`,keywords:["marvelous grace of our loving lord", "sin and despair like the sea waves cold", "dark is the stain that we cannot hide", "marvelous infinite matchless grace"],titleWords:["grace", "greater", "than", "our", "sin"]},
  130: {num:130,title:`JUST AS I AM, WITHOUT ONE PLEA`,lyrics:`1. Just as I am, without one plea,
But that Thy blood was shed for me,
And that Thou bidst me come to Thee,
O Lamb of God, I come, I come.
2. Just as I am, and waiting not
To rid my soul of one dark blot,
To Thee, whose blood can cleanse each spot,
O Lamb of God, I come, I come.
3. Just as I am - Though tossed about,
With many a conflict, many a doubt,
Fightings and fears within, without,
O Lamb of God, I come, I come.
4. Just as I am - poor, wretched, blind-
Sight, riches, healing of the mind,
Yea, all I need, in Thee to find,
O Lamb of God, I come, I come.
5. Just as I am, Thou wilt receive,
Wilt welcome, pardon, cleanse, relieve;
Because Thy promise I believe,
O Lamb of God, I come, I come.
6. Just as I am - Thy love unknown
Has broken every barrier, down;
Now to be Thine, yea, Thine alone,
O Lamb of God, I come, I come.
7. Just as I am, of that free love
The breadth, length, depth and height to prove,
Here for a season, then above,
O Lamb of God, I come, I come.`,keywords:["just as i am without one plea", "just as i am and waiting not", "just as i am  though tossed about", "just as i am  poor wretched blind"],titleWords:["just", "as", "i", "am,", "without", "one", "plea"]},
  131: {num:131,title:`IN TENDERNESS HE SOUGHT ME`,lyrics:`1. In tenderness He sought me,
Weary and sick with sin,
And on His shoulders brought me
Back to His fold again.
While angels in His presence sang,
Until the courts of heaven rang.
Oh, the love that sought me!
Oh, the blood that bought me!
Oh, the grace that brought me to the fold,
Wondrous grace that brought me to the fold!
2. He washed the bleeding sin-wounds,
And poured in oil and wine;
He whispered to assure me
“I’ve found thee, thou art Mine”
I never heard a sweeter voice,
It made my aching heart rejoice!
3. He pointed to the nail-prints,
For me His blood was shed,
A mocking crown so thorny,
Was placed upon His head:
I wondered what He saw in me,
To suffer such deep agony.
4. I’m sitting in His presence,
The sunshine of His face,
While with adoring wonder
His blessings I retrace.
It seems as if eternal days
Are far too short to sound His praise.
5. So while the hours are passing,
All now is perfect rest;
I’m waiting for the morning,
The brightest and the best,
When He will call us to His side,
To be with Him, His spotless bride.`,keywords:["in tenderness he sought me", "he washed the bleeding sinwounds", "he pointed to the nailprints", "im sitting in his presence"],titleWords:["in", "tenderness", "he", "sought", "me"]},
  132: {num:132,title:`RUNNING OVER`,lyrics:`1. Since the Saviour came to this heart of mine,
My cup’s fill’d and running over,
Filling my poor soul with His joy divine,
My cup’s fill’d and running over.
Ru. . . nning over,
Ru. . . nning over,
My cup’s fill’d and running over,
Since the Lord saved me,
I’m as happy as can be,
My cup’s fill’d and running over.
2. With my Lord so dear, I have naught to fear,
My cup’s fill’d and running over,
Tho’ my way be drear He is ever near,
My cup’s fill’d and running over.
3. Even tho’ I walk thro’ death’s darksome vale,
My cup’s fill’d and running over,
Christ my Lord shall be my comfort still,
My cup’s fill’d and running over.
4. Sinner, seek the Lord, trust His precious word,
While the angels round you hover,
Heaven’s bells will ring, and you then will sing,
My cup’s fill’d and running over.`,keywords:["since the saviour came to this heart of mine", "with my lord so dear i have naught to fear", "even tho i walk thro deaths darksome vale", "sinner seek the lord trust his precious word"],titleWords:["running", "over"]},
  133: {num:133,title:`OUT OF MY BONDAGE`,lyrics:`1. Out of my bondage, sorrow and night,
Jesus I come, Jesus, I come;
Into Thy freedom, gladness and light,
Jesus I come to Thee;
Out of my sickness into Thy health,
Out of my want and into Thy wealth,
Out of my sin and into Thy-self,
Jesus, I come to Thee.
2. Out of my shameful failure and loss,
Jesus, I come, Jesus, I come;
Into the glorious gain of Thy cross,
Jesus I come to Thee;
Out of earth’s sorrow into Thy balm,
Out of life’s storms and into Thy calm,
Out of distress to jubilant psalm,
Jesus, I come to Thee.
3. Out of unrest and arrogant pride,
Jesus, I come, Jesus, I come;
Into Thy blessed will to abide,
Jesus, I come to Thee;
Out of myself to dwell in Thy love,
Out of despair into raptures above,
Upward for aye on wings like a dove
Jesus, I come to Thee.
4. Out of the fear and dread of the tomb,
Jesus, I come, Jesus, I come;
Into the joy and light of my home,
Jesus, I come to Thee;
Out of the depths of ruin untold,
Into the peace of Thy sheltering fold,
Ever Thy glorious face to behold,
Jesus, I come to Thee.`,keywords:["out of my bondage sorrow and night", "out of my shameful failure and loss", "out of unrest and arrogant pride", "out of the fear and dread of the tomb"],titleWords:["out", "of", "my", "bondage"]},
  134: {num:134,title:`AND CAN IT BE THAT I SHOULD GAIN`,lyrics:`1. And can it be, that I should gain
An interest in the Saviour’s blood?
Died He for me, who caused His pain?
For me, who Him to death pursued?
Amazing love! how can it be
That Thou, my God, shouldst die for me?
2. ’Tis mystery all ! th’ Immortal dies!
Who can explore His strange design?
In vain the first born seraph tries
To sound the depth of love divine!
’Tis mercy all ! let earth adore,
Let angel-minds inquire no more.
3. He left His Father’s throne above
(So free, so infinite His grace!)
Emptied Himself of all but love,
And bled for Adam’s helpless race:
’Tis mercy all, immense and free,
For, O my God, it found out me!
4. Long my imprisoned spirit lay
Fast bound in sin and nature’s night;
Thine eye diffused a quickening ray,
I woke, the dungeon flamed with light:
My chains fell off, my heart was free,
I rose, went forth, and followed Thee.
5. No condemnation now I dread,
Jesus, and all in Him, is mine;
Alive in Him, my living Head,
And clothed in righteousness divine,
Bold I approach the eternal throne,
And claim the crown, through Christ my own.`,keywords:["and can it be that i should gain", "tis mystery all  th immortal dies", "he left his fathers throne above", "long my imprisoned spirit lay"],titleWords:["and", "can", "it", "be", "that", "i", "should", "gain"]},
  135: {num:135,title:`TELL ME THE OLD, OLD STORY`,lyrics:`1. Tell me the old, old story,
Of unseen things above,
Of Jesus and His glory,
Of Jesus and His love;
Tell me the story simply,
As to a little child,
For I am weak and weary,
And helpless and defiled.
Tell me the Old, Old Story,
Tell me the Old, Old Story,
Tell me the Old, Old Story,
Of Jesus and His love.
2. Tell me the story slowly,
That I may take it in-
That wonderful redemption,
God’s remedy for sin;
Tell me the story often,
For I forget so soon,
The “early dew” of morning
Has passed away at noon.
3. Tell me the story softly,
With earnest tones, and grave;
Remember I’m the sinner
Whom Jesus came to save;
Tell me the story always,
If you would really be,
In any time of trouble,
A comforter to me.
4. Tell me the same old story,
When you have cause to fear
That this world’s empty glory
Is costing me too dear;
Yes, and when that world’s glory
Is dawning on my soul,
Tell me the old, old story:
“Christ Jesus makes thee whole.”`,keywords:["tell me the old old story", "tell me the story slowly", "tell me the story softly", "tell me the same old story"],titleWords:["tell", "me", "the", "old,", "old", "story"]},
  136: {num:136,title:`AT CALVARY`,lyrics:`1. Years I spent in vanity and pride,
Caring not my Lord was crucified,
Knowing not it was for me He died
On Calvary.
Mercy there was great and grace was free,
Pardon there was multiplied to me;
There my burden’d soul found liberty,
At Calvary.
2. By God’s word at last my sin I learned,
Then I trembl’d at the law I’d spurn’d,
Till my guilty soul, imploring turned
To Calvary.
3. Now I’ve given to Jesus everything,
Now I gladly own Him as my King,
Now my raptured soul can only sing
Of Calvary.
4. Oh! the love that drew salvation’s plan,
Oh! the grace that brought it down to man,
Oh! the mighty gulf that God did span
At Calvary.`,keywords:["years i spent in vanity and pride", "by gods word at last my sin i learned", "now ive given to jesus everything", "oh the love that drew salvations plan"],titleWords:["at", "calvary"]},
  137: {num:137,title:`HOW BEAUTIFUL HEAVEN MUST BE`,lyrics:`1. We read of a beautiful heaven,
Prepared for the pure and the free;
These truths in God’s word He has given,
How beautiful heaven must be.
How beautiful heaven must be,
Sweet home of the happy and free;
Fair haven of rest for the weary,
How beautiful heaven must be.
2. In heaven, no drooping nor pining,
No wishing for elsewhere to be;
God’s light is forever there shining,
How beautiful heaven must be.
3. I’m longing to go to fair heaven,
To be with the happy and free;
To spend the long ages in singing,
How beautiful heaven must be .
4. The angels so sweetly are singing,
Up there by the beautiful sea;
Sweet chords from their gold harps are ringing,
How beautiful heaven must be.`,keywords:["we read of a beautiful heaven", "in heaven no drooping nor pining", "im longing to go to fair heaven", "the angels so sweetly are singing"],titleWords:["how", "beautiful", "heaven", "must", "be"]},
  138: {num:138,title:`WHEN WE ALL GET TO HEAVEN`,lyrics:`1. Sing the wondrous love of Jesus,
Sing His mercy and His grace;
In the mansion, bright and blessed,
He’ll prepare for us a place.
When we all get to heaven,
What a day of rejoicing that will be!
When we all see Jesus,
We’ll sing and shout the victory.
2. While we walk the pilgrim pathway,
Clouds will overspread the sky;
Heaven
But when trav’ling days are over,
Not a shadow, not a sigh.
3. Let us, then, be true and faithful,
Trusting, serving every day
Just one glimpse of Him in glory,
Will the toils of life repay.
4. Onward to the prize before us!
Soon His beauty we’ll behold;
Soon the pearly gates will open,
We shall tread the streets of gold.`,keywords:["sing the wondrous love of jesus", "while we walk the pilgrim pathway", "let us then be true and faithful", "onward to the prize before us"],titleWords:["when", "we", "all", "get", "to", "heaven"]},
  139: {num:139,title:`BEAUTIFUL HOME!`,lyrics:`1. There is a home eternal,
Beautiful and bright,
Where sweet joys supernal
Never are dimm’d by night;
White rob’d angels are singing
Ever around the bright throne;
When, oh, When shall I see thee,
Beautiful, beautiful Home?
Home! beautiful Home!
Bright, beautiful Home!
Bright Home of our Saviour,
Bright, beautiful Home!
2. Flowers are ever springing
In that Home so fair;
Little children singing,
Praises to Jesus there.
How they swell the glad anthem,
Ever around the bright throne!
When, oh, when shall I see thee,
Beautiful, beautiful Home?
3. Soon shall I join the ransomed,
Far beyond the sky;
Christ is my salvation,
Why should I fear to die?
Soon my eyes shall behold Him
Seated upon the bright throne;
Then, oh, then shall I see thee.
Beautiful, beautiful Home?`,keywords:["there is a home eternal", "flowers are ever springing", "soon shall i join the ransomed"],titleWords:["beautiful", "home!"]},
  140: {num:140,title:`LAYING MY TREASURE UP THERE`,lyrics:`1. On the mountain of Zion beyond the blue sky,
Stands a city so wondrous and fair;
I expect to depart for that land, by and by,-
For I’m laying my treasure up there.
I am laying my treasure up there, up there,
In that beautiful city so fair;...
When its glories unfold I’ll have riches untold,
For I’m laying my treasure up there.
2. There’s a mansion awaiting God’s people, I’m told,
Which the Saviour has gone to prepare;
There the walls are of jasper, the streets are of gold,
I am laying my treasure up there.
3. All the love of my heart, and my soul, mind and strength,
And the work that with Jesus I share,
Are but some of the riches I’ll find there at length,
For I’m laying my treasure up there.
4. So altho’ a poor pilgrim on earth I may roam,
Ever constant in watching and prayer,
Soon I’ll hear the glad summons to start for my home,
For I’m laying my treasure up there.`,keywords:["on the mountain of zion beyond the blue sky", "theres a mansion awaiting gods people im told", "all the love of my heart and my soul mind and strength", "so altho a poor pilgrim on earth i may roam"],titleWords:["laying", "my", "treasure", "up", "there"]},
  141: {num:141,title:`I SHALL SEE THE KING`,lyrics:`1. I shall see the King
Where the angels sing,
I shall see the King some day,
In the better land,
On the golden strand,
And with Him shall ever stay.
In His glory, I shall see the King,
And forever endless praises sing;
’Twas on calvary Jesus died for me;
I shall see the King some day.
2. In the land of song,
In the glory throng,
Where there never comes a night,
With my Lord once slain
I shall ever reign
In the glory-land of light.
3 I shall see the King,
All my tributes bring,
And shall look upon His face;
Then my song shall be
How He ransomed me
And has kept me by His grace.
142    ‘‘HOLY, HOLY’’ IS WHAT THE ANGELS SING
1. There is singing up in heaven
such as we have never known,
Where the angels sing the praises of the Lamb
upon the throne;
Their sweet harps are ever tuneful and their
voices alway clear,
O that we might be more like them while we
serve the Master here!
‘‘Holy, holy’’ is what the angels sing,
And I expect to help them make the courts of
heaven ring;
But when I sing redemption’s story they will
fold their wings,
For angels never felt the joys that
our salvation brings.
2. But I hear another anthem,
blending voices clear and strong,
“Unto Him who hath redeemed us
and hath bought us,’’ is the song;
We have come thru tribulations
to this land so fair and bright,
In the fountain freely flowing
He hath made our garments white.
3. Then the angels stand and listen,
for they cannot join that song,
Like the sound of many waters,
by that happy, blood washed throng;
For they sing about great trials,
battles fought and vict’ries won,
And they praise their great
Redeemer who hath said to them, “well done”.
4. So, altho’ I’m not an angel ,
yet I know that over there
I will join a blessed chorus that the angels
cannot share;
I will sing about my Saviour,
who upon dark Calvary
Freely pardoned my transgression,
died to set a sinner free.
143. THE END OF THE ROAD
1. When I come to the end of the long, long road,
The shadows will flee away,
And I’ll stand in the glorious light of God,
Where dwelleth eternal day...
When I come to the end, the end of the road,
To the land of eternity,
When I come to the end of life’s long road,
The face of my Lord I’ll see.
2. Looking back o’er the years that were hard and drear,
The hand of the Christ I’ll see;
While my heart will go forth with a song of praise,
Because of His love for me...
3. When I come to the end of the long, long, road,
And trials will all be past ,
I shall look in the face of my dearest Friend,
Safe home in His heav’n at last....
144    I WON’T HAVE TO CROSS JORDAN ALONE
1. When I come to the river at ending of day,
When the last winds of sorrow have blown;
There’ll be somebody waiting to show me the way,
I won’t have to cross Jordan alone.
I won’t have to cross Jordan alone,
Jesus died for my sins to atone;
When the darkness I see,
He’ll be waiting for me,
I won’t have to cross Jordan alone.
2 Often times I’m forsaken, and weary and sad,
When it seems that my friends have all gone;
There is one tho’t that cheers me and makes my heart glad,
I won’t have to cross Jordan alone.
3. Tho’ the billows of sorrow and trouble may sweep,
Christ the Saviour will care for His own;
Till the end of the journey, my soul He will keep,
I won’t have to cross Jordan alone.`,keywords:["i shall see the king", "in the land of song", "there is singing up in heaven", "but i hear another anthem"],titleWords:["i", "shall", "see", "the", "king"]},
  145: {num:145,title:`WHEN THEY RING THE GOLDEN BELLS`,lyrics:`1. There’s a land beyond the river,
That we call the sweet forever,
And we only reach that shore by faith’s decree;
One by one we’ll gain the portals,
There to dwell with the immortals,
When they ring the golden bells for you and me.
Don’t you hear the bells now ringing?
Don’t you here the angels singing?
’Tis the glory hallelujah Jubilee
In that far-off sweet forever,
Just beyond the shining river,
When they ring the golden bells for you and me
2 We shall know no sin or sorrow,
In that haven of tomorrow,
When our barque shall sail beyond the silver sea;
We shall only know the blessing
Of our Father’s sweet caressing,
When they ring the golden bells for you and me.
3 When our days shall know their number,
When in death we sweetly slumber,
When the King commands the spirit to be free;
Nevermore with anguish laden,
We shall reach that lovely Aiden,
When they ring the golden bells for you and me.`,keywords:["theres a land beyond the river"],titleWords:["when", "they", "ring", "the", "golden", "bells"]},
  146: {num:146,title:`FACE TO FACE`,lyrics:`1. Face to face with Christ, my Saviour,
Face to face -what will it be?
When with rapture I behold Him,
Jesus Christ who died for me!
Face to face I shall behold Him,
Far beyond the starry sky;
Face to face, in all His glory,
I shall see Him by and by!
2. Only faintly now I see Him,
With the darkling veil between;
But a blessed day is coming,
When His glory shall be seen.
3. What rejoicing in His presence,
When are banished grief and pain,
When the crooked ways are straightened
And the dark things shall be plain.
4. Face to face - O blissful moment!
Face to face to see and know;
Face to face with my Redeemer,
Jesus Christ who loves me so!`,keywords:["face to face with christ my saviour", "only faintly now i see him", "what rejoicing in his presence", "face to face  o blissful moment"],titleWords:["face", "to", "face"]},
  147: {num:147,title:`SWEET BY AND BY`,lyrics:`1. There’s a land that is fairer than day,
And by faith we can see it afar,
For the Father waits over the way
To prepare us a dwelling place there.
In the sweet by and by ,
We shall meet on that beautiful shore;
In the sweet by and by,
We shall meet on that beautiful shore.
2 We shall sing on that beautiful shore
The melodious songs of the blest;
And our spirits shall sorrow no more-
Not a sigh for the blessing of rest.
3. To our bountiful Father above
We will offer our tribute of praise,
For the glorious gift of His love
And the blessings that hallow our days.`,keywords:["theres a land that is fairer than day", "to our bountiful father above"],titleWords:["sweet", "by", "and", "by"]},
  148: {num:148,title:`NO TEARS IN HEAVEN`,lyrics:`1. No tears in heaven, no sorrows given,
All will be glory in that land;
There’ll be no sadness, all will be gladness
When we shall join that happy band.
No tears, no tears, no tears up there,
Sorrow and pain will all have flown;
No tears, no tears, no tears up there,
No tears in heaven will be known.
2. Glory is waiting, waiting up yonder,
Where we shall spend an endless day;
There with our Saviour, we’ll be forever,
Where no more sorrow can dismay.
3. Some morning yonder, we’ll cease to ponder
O’er things this life has bro’t to view;
All will be clearer, loved ones be dearer,
In heav’n where all will be made new.`,keywords:["no tears in heaven no sorrows given", "glory is waiting waiting up yonder", "some morning yonder well cease to ponder"],titleWords:["no", "tears", "in", "heaven"]},
  149: {num:149,title:`FARTHER                                  ALONG`,lyrics:`1. Tempted and tried we’re oft made to wonder
Why it should be thus all the day long,
While there are others living about us,
Never molested tho’ in the wrong.
Farther along we’ll know all about it,
Farther along we’ll understand why;
Cheer up, my brother, live in the sunshine,
We’ll understand it all by and by.
2. When death has come and taken our loved ones,
It leaves our home so lonely and drear;
Then do we wonder why others prosper,
Living so wicked year after year.
3. Faithful till death said our loving Master,
A few more days to labour and wait;
Toils of the road will then seem as nothing,
As we sweep thru the beautiful gate.
4. When we see Jesus coming in glory,
When He comes from His home in the sky;
Then we shall meet Him in that bright mansion,
We’ll understand it all by and by.`,keywords:["tempted and tried were oft made to wonder", "when death has come and taken our loved ones", "faithful till death said our loving master", "when we see jesus coming in glory"],titleWords:["farther", "along"]},
  150: {num:150,title:`PENTECOSTAL POWER`,lyrics:`1. Lord, as of old at Pentecost
Thou didst thy pow’r display,
With cleansing, purifying flame
Descend on us today.
Lord, send the old-time pow’r.
The Pentecostal pow’r!
Thy floodgates of blessing on us Throw open
wide!
Lord, send the old-time pow’r, the
pentecostal pow’r,
That sinners be converted and Thy name
glorified!
2. For mighty works for Thee prepare,
And strengthen ev’ry heart:
Come, take possession of Thine own,
And never-more depart.
3. All self consume, all sin destroy!
With earnest zeal endue
Each waiting heart to work for Thee;
O Lord, our faith renew!
4. Speak, Lord! before Thy throne we wait,
Thy promise we believe,
And will not let Thee go until
The blessing we receive!`,keywords:["lord as of old at pentecost", "for mighty works for thee prepare", "all self consume all sin destroy", "speak lord before thy throne we wait"],titleWords:["pentecostal", "power"]},
  151: {num:151,title:`THERE SHALL BE SHOWERS OF BLESSING`,lyrics:`1. “There shall be showers of blessing:”
This is the promise of love;
There shall be seasons refreshing,
Sent from the Saviour above.
Showers of blessing,
Showers of blessing we need;
Mercy drops round us are falling,
But for the showers we plead.
2. “There shall be showers of blessing:”
Precious reviving again;
Over the hills and the valleys,
Sound of abundance of rain.
3. “There shall be showers of blessing:”
Send them upon us, O Lord!
Grant to us now a refreshing;
Come, and now honour Thy Word.
4. “There shall be showers of blessing:”
Oh, that today they might fall,
Now, as to God we’re confessing,
Now as on Jesus we call!
5. “There shall be showers of blessing:”
If we but trust and obey;
There shall be seasons refreshing,
If we let God have His way.`,keywords:["there shall be showers of blessing", "there shall be showers of blessing", "there shall be showers of blessing", "there shall be showers of blessing"],titleWords:["there", "shall", "be", "showers", "of", "blessing"]},
  152: {num:152,title:`JOYS ARE FLOWING LIKE A RIVER`,lyrics:`1. Joys are flowing like a river,
Since the Comforter has come;
He abides with us for ever,
Makes the trusting heart His home.
Blessed quietness, holy quietness,
What assurance in my soul !
On the stormy sea, He speaks peace to me,
How the billows cease to roll.
2. Bringing life, and health, and gladness,
All around this heav’nly Guest;
Banish’d unbelief and sadness,
Chang’d our weariness to rest.
3. Like the rain that falls from heaven,
Like the sunlight from the sky,
So the Holy Ghost is given,
Coming on us from on high.
4. What a wonderful salvation,
Where we always see His face;
What a perfect habitation,
What a quiet resting-place.`,keywords:["joys are flowing like a river", "bringing life and health and gladness", "like the rain that falls from heaven", "what a wonderful salvation"],titleWords:["joys", "are", "flowing", "like", "a", "river"]},
  153: {num:153,title:`WITH SIGNS FOLLOWING`,lyrics:`1. When first the risen Lord of pow’r
His chosen ones sent forth,
A charge He gave, that solemn hour,
To preach His saving worth.
“Go ye,’’ said He, “to all mankind;
Declare My Word, and ye shall find:
These signs shall surely follow them
Who on My Name believe.’’
2. “No demons shall before them stand,
No poison do them harm;
Nor subtle serpent in their hand
Cause pain or dread alarm.”
For Satan’s kingdom He o’ercame,
To give His people right to claim:
“These signs shall surely follow them
Who on My Name believe.”
3. “They shall with other tongues declare
The wonders of their God:
The sick beneath their hands, by prayer,
Shall rise, to prove My Word,”
So let it be ! Firm as His Throne
Stands this clear promise to His own:
“These signs shall surely follow them
Who on My Name believe.”
4. Crowned with the flame of Pentecost,
A faithful, fearless band
Proclaimed His Name: a ransomed host
Arose from every land.
The Lord worked with them from on High,
His proven Word could none deny:
“These signs shall surely follow them
Who on My Name believe.”
5. No word of Thine is void of power;
No promise, Lord, is vain.
Be this a Pentecostal hour -
Confirm Thy Word again!
Nor can’st Thou fail! Thou art the same
As when of old Thou did’st proclaim:
“These signs shall surely follow them
Who on My Name believe.”`,keywords:["when first the risen lord of powr", "no demons shall before them stand", "they shall with other tongues declare", "crowned with the flame of pentecost"],titleWords:["with", "signs", "following"]},
  154: {num:154,title:`GIVE ME A DOUBLE PORTION`,lyrics:`1. Long ago in days of old, stood a man of God we’re told,
As he talked to Elijah that day;
His request he did repeat, standing at Elijah’s feet,
“A double portion” I can hear him say.
Give me, Lord, a double portion,
pour Thy Spirit on me,
Thru eyes of faith Thy wondrous works I can see;
But I need Thy helping hand,
In this troubled, sinful land,
Give me, Lord, a double portion from Thee.
2. As Elijah stood that day, to Elisha he did say,
“Ask me what I shall do unto thee”
And Elisha then replied, walking at Elijah’s side,
“A double portion, let it fall on me.”
3. Lord, I always to Thee pray, just for strength from day to day,
But I see there’s so much to be done,
That I have to kneel a new and this favour ask of You,
A double portion this fight must be won.`,keywords:["long ago in days of old stood a man of god were told", "as elijah stood that day to elisha he did say", "lord i always to thee pray just for strength from day to day"],titleWords:["give", "me", "a", "double", "portion"]},
  155: {num:155,title:`LET JESUS COME INTO YOUR HEART`,lyrics:`1. If you are tired of the load of your sin,
Let Jesus come into your heart;
If you desire a new life to begin,
Let Jesus come into your heart.
Just now, your doubtings give o’er;
Just now, reject Him no more;
Just now, throw open the door;
Let Jesus come into your heart.
2. If ’tis for purity now that you sigh,
Let Jesus come into your heart;
Fountains for cleansing are flowing nearby,
Let Jesus come into your heart.
3. If there’s a temptest your voice cannot still,
Let Jesus come into your heart;
If there’s a void this world never can fill,
Let Jesus come into your heart.
4. If you would join the glad songs of the blest,
Let Jesus come into your heart;
If you would enter the mansions of rest,
Let Jesus come into your heart.`,keywords:["if you are tired of the load of your sin", "if tis for purity now that you sigh", "if theres a temptest your voice cannot still", "if you would join the glad songs of the blest"],titleWords:["let", "jesus", "come", "into", "your", "heart"]},
  156: {num:156,title:`ROOM AT THE CROSS FOR YOU`,lyrics:`1. The cross upon which Jesus died
Is a shelter in which we can hide,
“And its grace so free is sufficient for me,”
And deep is its fountain; as wide as the sea.
There’s room at the cross for you,
There’s room at the cross for you,
Tho’ millions have come
There’s still room for one ,
Yes, there’s room at the cross for you.
2. Tho’ millions have found Him a Friend
And have turned from the sins they have sinned,
The Saviour still waits to open the gates,
And welcome a sinner before it’s too late.
3. The hand of my Saviour is strong,
And the love of my Saviour is long,
Through sunshine or rain through loss or in gain,
The blood flows from Calv’ry to cleanse ev’ry stain.`,keywords:["the cross upon which jesus died", "tho millions have found him a friend", "the hand of my saviour is strong"],titleWords:["room", "at", "the", "cross", "for", "you"]},
  157: {num:157,title:`WANDERING CHILD, O COME HOME`,lyrics:`1. Have you wandered away from your Father’s care,
Heavy-hearted and sad do you roam?
There’s a sweet gentle voice calling now to you -
Wand’ring child, wand’ring child, O, come home.
Child, come home, child, come home,
Wand’ring child, why longer roam?
’Tis thy Father entreats,
Wand’ring child, O, come home.
2. Is your frail bark adrift on life’s raging sea,
Are you tossed on its billows and foam?
There’s a safe harbour home, waiting now for you -
Wand’ring child, wand’ring child, O, come home.
3. He is pleading today, heed His gentle voice,
As He bids you no longer to roam,
To that dear Father’s house haste without delay -
Wand’ring child, wand’ring child, O, come home.`,keywords:["have you wandered away from your fathers care", "is your frail bark adrift on lifes raging sea", "he is pleading today heed his gentle voice"],titleWords:["wandering", "child,", "o", "come", "home"]},
  158: {num:158,title:`COME BELIEVING`,lyrics:`1. Once again the Gospel message,
From the Saviour you have heard;
Will you heed the invitation?
Will you turn and seek the Lord?
Come believing! come believing!
Come to Jesus! look and live!...
Come believing! come believing!
Come to Jesus! look and live!
2. Many summers you have wasted,
Ripen’d harvests you have seen;
Winter snows by Spring have melted:
Yet you linger in your sin.
3. Jesus for your choice is waiting;
Tarry not: at once decide!
While the Spirit now is striving,
Yield, and seek the Saviour’s side.
4. Cease of fitness to be thinking;
Do not longer try to feel !
It is trusting, and not feeling,
That will give the Spirit’s seal.
5. Let your will to God be given,
Trust in Christ’s atoning blood;
Look to Jesus now in heaven,
Rest on His unchanging word.`,keywords:["once again the gospel message", "many summers you have wasted", "jesus for your choice is waiting", "cease of fitness to be thinking"],titleWords:["come", "believing"]},
  159: {num:159,title:`WHY DO YOU WAIT?`,lyrics:`1. Why do you wait, dear brother,
Oh, why do you tarry so long?
Your Saviour is waiting to give you
A place in His sanctified throng.
Why not? Why not?
Why not come to Him now? (2ce).
2. What do you hope, dear brother,
To gain by a further delay?
There’s no one to save you but Jesus,
There’s no other way but His way.
3. Do you not feel, dear brother,
His Spirit now striving within?
Oh, why not accept His salvation,
And throw off your burden of sin?
4. Why do you wait, dear brother?
The harvest is passing away;
Your Saviour is longing to bless you,
There’s danger and death in delay!`,keywords:["why do you wait dear brother", "what do you hope dear brother", "do you not feel dear brother", "why do you wait dear brother"],titleWords:["why", "do", "you", "wait?"]},
  160: {num:160,title:`THE SHEPHERD OF LOVE`,lyrics:`1. The Shepherd of Love is seeking the lost
In paths that are rough and steep;
He’s calling the lambs that have gone astray,
He’s calling, calling His sheep.
Out of your darkness of sin and shame,
Into His love, forever the same;
Come to Him now, believe on His name,
O answer the call today.
2. The Shepherd of Love knows His sheep by name,
And tenderly leads the way;
O weary one, come to the Shepherd’s fold,
He’s calling, calling today.
3. The Shepherd of Love our ransom hath paid,
And offers salvation free;
He’s patiently waiting for thee to come,
He’s calling, calling for thee.
4. The Shepherd of Love now seeketh His sheep,
He seeketh whate’er the cost;
Behold, He is calling the wand’rer home,
He’s calling, calling the lost.
161. WHO’LL BE THE NEXT?
1. Who’ll be the next to follow Jesus?
Who’ll be the next His cross to bear?
Someone is ready, someone is waiting,
Who’ll be the next a crown to wear?
Who’ll be the next, who’ll be the next,
Who’ll be the next to follow Jesus?
Who’ll be the next to follow Jesus now? -
Follow Jesus now?
2. Who’ll be the next to follow Jesus?
Come and bow at His precious feet.
Who’ll be the next to lay every burden
Down at the Father’s Mercy seat?
3. Who’ll be the next to follow Jesus?
Who’ll be the next to praise His name?
Who’ll swell the chorus of free redemption,
Sing, Hallelujah! Praise the Lamb?`,keywords:["the shepherd of love is seeking the lost", "the shepherd of love knows his sheep by name", "the shepherd of love our ransom hath paid", "the shepherd of love now seeketh his sheep"],titleWords:["the", "shepherd", "of", "love"]},
  162: {num:162,title:`ALMOST PERSUADED`,lyrics:`1. “Almost persuaded:” now to believe;
“Almost persuaded:” Christ to receive;
Seems now some soul to say,
“Go, Spirit, go Thy way:
Some more convenient day
On Thee I’ll call.’’
2. “Almost persuaded:” come, come today!
“Almost persuaded:” turn not away!
Jesus invites you here,
Angels are lingering near,
Prayers rise from heart so dear,
O wanderer, come!
3. “Almost persuaded:’’ harvest is past!
“Almost persuaded:’’ doom comes at last!
“Almost’’ cannot avail;
“Almost’’ is but to fail:
Sad, sad, that bitter wail -
“Almost’’ - but lost!`,keywords:["almost persuaded now to believe", "almost persuaded come come today", "almost persuaded harvest is past"],titleWords:["almost", "persuaded"]},
  163: {num:163,title:`MY GOD, IS ANY HOUR SO SWEET?`,lyrics:`1. My God, is any hour so sweet,
From blush of morn to evening star,
As that which calls me to Thy feet,
The hour of prayer?.
2. Blest be that tranquil hour of morn,
And blest that hour of solemn eve,
When, on the wings of prayer upborne,
The world I leave.
3. For then a day-spring shines on me,
Brighter than morn’s ethereal glow;
And richer dews descend from Thee
Than earth can know.
4. Then is my strength by Thee renewed;
Then are my sins by Thee forgiven;
Then dost Thou cheer my solitude
With hope of heaven.
5. No word can tell what blest relief,
There for my every want I find;
What strength for warfare, balm for grief;
What peace of mind.
6. Hushed is each doubt, gone every fear;
My spirit seems in heaven to stay;
And even the penitential tear
Is wiped away.
7. Lord, till I reach Your blissful shore,
No privilege so dear shall be,
As thus my inmost soul to pour
In prayer to Thee.
164    PRAYER IS THE SOUL’S SINCERE DESIRE
1. Prayer is the soul’s sincere desire,
Uttered or unexpressed!
The motion of a hidden fire
That trembles in the breast.
2. Prayer is the burden of a sigh,
The falling of a tear,
The upward glancing of an eye,
When none but God is near.
3. Prayer is the simplest form of speech
That infant lips can try;
Prayer the sublimest strains that reach
The majesty on high.
4. Prayer is the contrite sinner’s voice
Returning from his ways
While angels in their songs rejoice,
And cry; Behold he prays!
5. Prayer is the Christian’s vital breath,
The Christian’s native air,
His watchword at the gates of death;
He enters heaven with prayer.
6. O Thou by whom we come to God,
The Life, the Truth, the Way!
The path of prayer Thyself has trod:
Lord! teach us how to pray.`,keywords:["my god is any hour so sweet", "blest be that tranquil hour of morn", "for then a dayspring shines on me", "then is my strength by thee renewed"],titleWords:["my", "god,", "is", "any", "hour", "so", "sweet?"]},
  165: {num:165,title:`GUIDE ME, O THOU GREAT JEHOVAH`,lyrics:`1. Guide me, O Thou Great Jehovah!
Pilgrim thro’ this barren land;
I am weak, but Thou art mighty,
Hold me with Thy pow’rful hand:
Bread of heaven! (2ce)
Feed me now and ever more. (2ce)
2. Open now, the crystal fountain,
Whence the healing stream doth flow:
Let the fiery, cloudy pillar
Lead me all my journey through:
Strong Deliverer! (2ce)
Be Thou still my strength and shield.(2ce)
3. If I tread the verge of Jordan,
Bid my anxious fears subside:
Bear me through the swelling torrent,
Land me safe on Canaan’s side:
Songs of praises! (2ce)
I will ever give to Thee. (2ce)
4. Saviour, come! we long to see Thee,
Long to dwell with Thee above;
And to know in full communion,
All the sweetness of Thy love.
Come, Lord Jesus! (2ce)
Take Thy waiting people home.(2ce)`,keywords:["guide me o thou great jehovah", "open now the crystal fountain", "if i tread the verge of jordan", "saviour come we long to see thee"],titleWords:["guide", "me,", "o", "thou", "great", "jehovah"]},
  166: {num:166,title:`DID YOU THINK TO PRAY?`,lyrics:`1. Ere you left your room this morning
Did you think to pray?
In the name of Christ, our Saviour,
Did you sue for loving favour,
As a shield today?
O how praying rests the weary!
Prayer will change the night to day,
So, when life seems dark and dreary,
Don’t forget to pray.
2. When you met with great temptation
Did you think to pray?
By His dying love and merit
Did you claim the Holy Spirit
As your guide and stay?
3. When your heart was overburdened
Did you think to pray?
Did you plead for grace, my brother,
That you might forgive another
Who had crossed your way?
4. When sore trials came upon you
Did you think to pray?
When your soul was bowed in sorrow,
Balm of Gilead did you borrow
At the gates today?`,keywords:["ere you left your room this morning", "when you met with great temptation", "when your heart was overburdened", "when sore trials came upon you"],titleWords:["did", "you", "think", "to", "pray?"]},
  167: {num:167,title:`I MUST TELL JESUS`,lyrics:`1. I must tell Jesus all of my trials;
I cannot bear these burdens alone;
In my distress He kindly will help me;
He ever loves and cares for His own.
I must tell Jesus! I must tell Jesus!
I cannot bear my burdens alone:
I must tell Jesus! I must tell Jesus!
Jesus can help me, Jesus alone.
2. I must tell Jesus all of my troubles;
He is a kind, compassionate Friend;
If I but ask Him, He will deliver,
Make of my troubles quickly an end.
3. Tempted and tried I need a great Saviour,
One who can help my burdens to bear;
I must tell Jesus, I must tell Jesus;
He all my cares and sorrows will share.
4. O how the world to evil allures me!
O how my heart is tempted to sin!
I must tell Jesus, and He will help me
Over the world the vict’ry to win.`,keywords:["i must tell jesus all of my trials", "i must tell jesus all of my troubles", "tempted and tried i need a great saviour", "o how the world to evil allures me"],titleWords:["i", "must", "tell", "jesus"]},
  168: {num:168,title:`I NEED THEE EVERY HOUR`,lyrics:`1. I need Thee ev’ry hour,
Most gracious Lord;
No tender voice like Thine
Can peace afford.
I need Thee, oh, I need Thee,
Ev’ry hour I need Thee;
Oh, bless me now, my Saviour,
I come to Thee!
2. I need Thee every hour,
Stay Thou near by;
Temptations lose their power
When Thou art nigh.
3. I need Thee every hour,
In joy or pain;
Come quickly and abide,
Or life is vain.
4. I need Thee every hour,
Teach me Thy will;
And Thy rich promises
In me fulfil.
5. I need Thee every hour,
Most Holy One;
Oh, make me Thine indeed,
Thou blessed Son!`,keywords:["i need thee evry hour", "i need thee every hour", "i need thee every hour", "i need thee every hour"],titleWords:["i", "need", "thee", "every", "hour"]},
  169: {num:169,title:`WHAT A FRIEND WE HAVE IN JESUS`,lyrics:`1. What a Friend we have in Jesus,
All our sins and griefs to bear;
What a privilege to carry
Ev’rything to God in prayer.
Oh, what peace we often forfeit,
Oh, what needless pain we bear -
All because we do not carry
Ev’rything to God in prayer.
2. Have we trials and temptations?
Is there trouble anywhere?
We should never be discouraged,
Take it to the Lord in prayer.
Can we find a Friend so faithful,
Who will all our sorrows share?
Jesus knows our every weakness,
Take it to the Lord in prayer.
3. Are we weak and heavy laden,
Cumbered with a load of care?
Precious Saviour, still our refuge, -
Take it to the Lord in prayer.
Do thy friends despise, forsake thee?
Take it to the Lord in prayer;
In His arms He’ll take and shield thee,
Thou wilt find a solace there.`,keywords:["what a friend we have in jesus", "have we trials and temptations", "are we weak and heavy laden"],titleWords:["what", "a", "friend", "we", "have", "in", "jesus"]},
  170: {num:170,title:`SWEET HOUR OF PRAYER`,lyrics:`1. Sweet hour of prayer! sweet hour of prayer!
That calls me from a world of care
And bids me at my Father’s throne
Make all my wants and wishes known;
In seasons of distress and grief,
My soul has often found relief,
And oft escaped the tempter’s snare
By thy return, sweet hour of prayer.
2. Sweet hour of prayer! sweet hour of prayer!
Thy wings shall my petition bear
To Him whose truth and faithfulness
Engage the waiting soul to bless;
And since He bids me seek His face,
Believe His Word and trust His grace,
I’ll cast on Him my every care,
And wait for thee, sweet hour of prayer.
3. Sweet hour of prayer! sweet hour of prayer!
May I thy consolation share,
Till, from Mount Pisgah’s lofty height,
I view my home, and take my flight:
This robe of flesh I’ll drop, and rise
To seize the everlasting prize;
And shout, while passing through the air,
Farewell, farewell, sweet hour of prayer.`,keywords:["sweet hour of prayer sweet hour of prayer", "sweet hour of prayer sweet hour of prayer", "sweet hour of prayer sweet hour of prayer"],titleWords:["sweet", "hour", "of", "prayer"]},
  171: {num:171,title:`PASS ME NOT`,lyrics:`1. Pass me not, O gentle Saviour,
Hear my humble cry;
While on others Thou art calling,
Do not pass me by.
Saviour, Saviour,
Hear my humble cry;
While on others Thou art calling,
Do not pass me by.
2. Let me at Thy throne of mercy,
Find a sweet relief;
Kneeling there in deep contrition,
Help my unbelief.
3. Trusting only in Thy merit,
Would I seek Thy face;
Heal my wounded, broken spirit,
Save me by Thy grace.
4. Thou the spring of all my comfort,
More than life to me,
Whom have I on earth beside Thee?
Whom in heaven but Thee?`,keywords:["pass me not o gentle saviour", "let me at thy throne of mercy", "trusting only in thy merit", "thou the spring of all my comfort"],titleWords:["pass", "me", "not"]},
  172: {num:172,title:`WHEN THE ROLL IS CALLED UP YONDER`,lyrics:`1. When the trumpet of the Lord shall sound,
and time shall be no more,
And the morning breaks, eternal, bright and fair;
When the saved of earth shall gather over on the
other shore,
And the roll is called up yonder, I’ll be there.
When the roll... is called up yon... der,
When the roll....... is called up yon... der,
When the roll... is called up yon... der,
When the roll is called up yonder, I’ll be there.
2. On that bright and cloudless morning
when the dead in Christ shall rise,
And the glory of His resurrection share;
When His chosen ones shall gather to their
home beyond the skies,
And the roll is called up yonder, I’ll be there.
3. Let us labour for the Master from the dawn
till setting sun,
Let us talk of all His wondrous love and care,
Then, when all of life is over, and our work
on earth is done,
And the roll is called up yonder, I’ll be there.`,keywords:["when the trumpet of the lord shall sound", "on that bright and cloudless morning", "let us labour for the master from the dawn"],titleWords:["when", "the", "roll", "is", "called", "up", "yonder"]},
  173: {num:173,title:`IS IT THE CROWNING DAY?`,lyrics:`1. Jesus may come today, Glad day! Glad day!
And I would see my Friend;
Dangers and troubles would end
If Jesus should come today.
Glad day! Glad day!
Is it the crowning day?
I’ll live for today, nor anxious be,
Jesus, my Lord, I soon shall see;
Glad day! Glad day!
Is it the crowning day?
2. I may go home today, Glad day! Glad day!
Seemeth I hear their song;
Hail to the radiant throng!
If I should go home today.
3. Why should I anxious be? Glad day! Glad day!
Lights appear on the shore,
Storms will affright nevermore,
For He is ‘‘at hand” today.
4. Faithful I’ll be today, Glad day! Glad day!
And I will freely tell
Why I should love Him so well,
For He is my all today.`,keywords:["jesus may come today glad day glad day", "i may go home today glad day glad day", "why should i anxious be glad day glad day", "faithful ill be today glad day glad day"],titleWords:["is", "it", "the", "crowning", "day?"]},
  174: {num:174,title:`JESUS IS COMING AGAIN`,lyrics:`1. Marvelous message we bring,
Glorious carol we sing,
Wonderful word of the King:
Jesus is coming again!...
Coming again, coming again;
May be morning, may be noon,
May be evening and may be soon!
Coming again, coming again;
O what a wonderful day it will be!
Jesus is coming again!
2. Forest and flower exclaim,
Mountain and meadow the same,
All earth and heaven proclaim:
Jesus is coming again!...
3. Standing before Him at last,
Trial and trouble all past,
Crowns at His feet we will cast:
Jesus is coming again!...`,keywords:["marvelous message we bring", "forest and flower exclaim", "standing before him at last"],titleWords:["jesus", "is", "coming", "again"]},
  175: {num:175,title:`HE IS COMING AGAIN`,lyrics:`1. Lift up your heads, pilgrims aweary,
See day’s approach now crimson the sky;
Night shadows flee, and your Beloved,
Awaited with longing, at last draweth nigh.
He is coming again, He is coming again,
The very same Jesus, rejected of men;
He is coming again, He is coming again,
With pow’r and great glory, He is coming again!
2. Dark was the night, sin warred against us!
Heavy the load of sorrow we bore;
But now we see signs of His coming; -
Our hearts glow within us, joy’s cup runneth o’er!
3. O blessed hope! O blissful promise!
Filling our hearts with rapture divine;
O day of days! hail Thy appearing!
Thy transcendent glory forever shall shine!
4. Even so, come, precious Lord Jesus;
Creation waits redemption to see;
Caught up in clouds, soon we shall meet Thee;
O blessed assurance, forever with Thee!`,keywords:["lift up your heads pilgrims aweary", "dark was the night sin warred against us", "o blessed hope o blissful promise", "even so come precious lord jesus"],titleWords:["he", "is", "coming", "again"]},
  176: {num:176,title:`CHRIST RETURNETH`,lyrics:`1. It may be at morn, when the day is awaking,
When sunlight thro’ darkness and shadow is breaking,
That Jesus will come in the fulness of glory,
To receive from the world “His own.”
O Lord Jesus, how long, how long,
Ere we shout the glad song,
Christ returneth!
Hallelujah! hallelujah! Amen,
Hallelujah! Amen.
2. It may be at mid-day, it may be at twilight,
It may be, per chance, that the blackness of midnight
Will burst into light in the blaze of His glory,
When Jesus receives “His own.”
3. While its hosts cry Hosanna, from heaven descending,
With glorified saints and the angels attending,
With grace on His brow, like a halo of glory,
Will Jesus receive “His own.”
4. Oh, joy! oh, delight! should we go without dying,
No sickness, no sadness, no dread and no crying,
Caught up thro’ the clouds with our Lord into glory,
When Jesus receives “His own.”`,keywords:["it may be at morn when the day is awaking", "it may be at midday it may be at twilight", "while its hosts cry hosanna from heaven descending", "oh joy oh delight should we go without dying"],titleWords:["christ", "returneth"]},
  177: {num:177,title:`SEARCH ME, O GOD`,lyrics:`1. Search me, O God, and know my heart today;
Try me, O Lord, and know my thoughts I pray;
See if there be some wicked way in me,
Cleanse me from ev’ry sin and set me free.
2. I praise Thee, Lord for cleansing me from sin;
Fulfil Thy Word, and make me pure within;
Fill me with fire, where once I burned with shame
Grant my desire to magnify Thy name.
3. Lord, take my life, and make it wholly Thine;
Fill my poor heart with Thy great love divine;
Take all my will, my passion, self and pride;
I now surrender - Lord, in me abide.
4. O Holy Ghost, revival comes from Thee;
Send a revival - start the work in me:
Thy Word declares Thou wilt supply our need;
For blessing now, O Lord, I humbly plead.`,keywords:["search me o god and know my heart today", "i praise thee lord for cleansing me from sin", "lord take my life and make it wholly thine", "o holy ghost revival comes from thee"],titleWords:["search", "me,", "o", "god"]},
  178: {num:178,title:`FILL MY CUP, LORD`,lyrics:`1. Like the woman at the well I was seeking
For things that could not satisfy;
And then I heard my Saviour speaking:
“Draw from My well that never shall run dry.”
Fill my cup, Lord, - I lift it up, Lord!
Come and quench this thirsting of my soul;
Bread of heaven, feed me till I want no more -
Fill my cup, fill it up and make me whole!
2. There are millions in this world who are craving
The pleasure earthly things afford;
But none can match the wondrous treasure
That I find in Jesus Christ my Lord.
3. So, my brother, if the things this world gave you
Leave hungers that won’t pass away;
My blessed Lord will come and save you,
If you kneel to Him and humbly pray:`,keywords:["like the woman at the well i was seeking", "there are millions in this world who are craving", "so my brother if the things this world gave you"],titleWords:["fill", "my", "cup,", "lord"]},
  179: {num:179,title:`HIGHER GROUND`,lyrics:`1. I’m pressing on the upward way,
New heights I’m gaining ev’ry day;
Still praying as I onward bound,
“Lord, plant my feet on higher ground.”
Lord, lift me up and let me stand,
By faith, on heaven’s table-land;
Where love, and joy, and light abound,
Lord, plant my feet on higher ground.
2. My heart has no desire to stay
Where doubts arise, and fears dismay;
Though some may dwell where these abound,
My constant aim is higher ground.
3. Beyond the mist I fain would rise,
To rest beneath unclouded skies,
Above earth’s turmoil peace is found,
By those who dwell on higher ground.
4. I long to scale the utmost height,
Though rough the way, and hard the fight,
My song, while climbing, shall resound,
Lord, lead me on to higher ground.
5. Lord, lead me up the mountain side,
I dare not climb without my Guide;
And, heaven gained, I’ll gaze around,
With grateful heart from higher ground.`,keywords:["im pressing on the upward way", "my heart has no desire to stay", "beyond the mist i fain would rise", "i long to scale the utmost height"],titleWords:["higher", "ground"]},
  180: {num:180,title:`SINCE THE SON HATH MADE ME FREE`,lyrics:`1. Since the Son hath made me free,
Let me taste my liberty;
Thee behold with open face,
Triumph in Thy saving grace,
Thy great will delight to prove,
Glory in Thy perfect love.
2. Abba, Father, hear Thy child,
Late in Jesus reconciled;
Hear, and all the graces shower,
All the joy, and peace, and power,
All my Saviour asks above,
All the life and heaven of love.
3. Heavenly Adam, Life divine,
Change my nature into Thine;
Move and spread throughout my soul,
Actuate and fill the whole;
Be it I no longer now
Living in the flesh, but Thou.
4. Holy Ghost, no more delay;
Come, and in Thy temple stay;
Now Thine inward witness bear,
Strong, and permanent, and clear;
Spring of life, Thyself impart,
Rise eternal in my heart.
Amen.`,keywords:["since the son hath made me free", "abba father hear thy child", "heavenly adam life divine", "holy ghost no more delay"],titleWords:["since", "the", "son", "hath", "made", "me", "free"]},
  181: {num:181,title:`ALL THINGS ARE POSSIBLE`,lyrics:`1. All things are possible to him
That can in Jesus’ name believe;
Lord, I no more Thy name blaspheme,
Thy truth I lovingly receive.
I can, I do believe in Thee;
All things are possible to me.
2. ’Twas most impossible of all
That here sin’s reign in me should cease;
Yet shall it be, I know it shall;
Jesus, I trust Thy faithfulness!
If nothing is too hard for Thee,
All things are possible to me.
3. Though earth and hell the Word gainsay,
The Word of God shall never fail;
The Lord can break sin’s iron sway;
’Tis certain, though impossible.
The thing impossible shall be,
All things are possible to me.
4. All things are possible to God;
To Christ, the power of God in man;
To me when I am all renewed,
In Christ am fully formed again.
And from the reign of sin set free, -
All things are possible to me.
5. All things are possible to God;
To Christ, the power of God in me;
Now shed Thy mighty Self abroad,
Let me no longer live, but Thee;
Give me this hour in Thee to prove
The sweet omnipotence of love.`,keywords:["all things are possible to him", "twas most impossible of all", "though earth and hell the word gainsay", "all things are possible to god"],titleWords:["all", "things", "are", "possible"]},
  182: {num:182,title:`BLESSED ARE THE PURE IN HEART`,lyrics:`1. Blessed are the pure in heart,
They have learned the angel art,
While on earth in heaven to be,
God, by sense unseen, to see.
Cleansed from sin’s offensive stain,
Fellowship with Him they gain;
Nearness, likeness to their Lord,
Their exceeding great reward.
2. Worshipping in spirit now,
In His inner court they bow-
Bow before the brightening veil,
God’s own radiance through it hail.
Serious, simple of intent,
Teachably intelligent,
Rapt, they search the written Word
Till His very voice is heard.
3. In creation Him they own,
Meet Him in its haunts, alone;
Most amidst its Sabbath calm,
Morning light and evening balm.
Him they still through busier life
Trust in pain, and care, and strife;
These, like clouds, o’er noontide blaze,
Temper, not conceal, His rays.
4. Hallowed thus their every breath:
Dying, they shall not see death,
With the Lord in paradise,
Till, like His, their bodies rise.
Nearer than the seraphim
In their flesh shall saints see Him,
With the Father, in the Son,
Through the Spirit, ever one.`,keywords:["blessed are the pure in heart", "worshipping in spirit now", "in creation him they own", "hallowed thus their every breath"],titleWords:["blessed", "are", "the", "pure", "in", "heart"]},
  183: {num:183,title:`COME, O MY GOD, THE PROMISE SEAL`,lyrics:`1. Come, O my God, the promise seal,
This mountain, sin, remove;
Now in my fainting soul reveal
The virtue of Thy love.
2. I want Thy life, Thy purity,
Thy righteousness brought in;
I ask, desire, and trust in Thee,
To be redeemed from sin.
3. Anger and sloth, desire and pride,
This moment be subdued;
Be cast into the crimson tide
Of my Redeemer’s blood!
4. Saviour, to Thee my soul looks up,
My present Saviour Thou!
In all the confidence of hope,
I claim the blessing now.
5. ’Tis done! Thou does this moment
With full salvation bless;
Redemption through Thy blood I have,
Save, and spotless love and peace.`,keywords:["come o my god the promise seal", "i want thy life thy purity", "anger and sloth desire and pride", "saviour to thee my soul looks up"],titleWords:["come,", "o", "my", "god,", "the", "promise", "seal"]},
  184: {num:184,title:`SAVIOUR FROM SIN, I WAIT TO PROVE`,lyrics:`1. Saviour from sin, I wait to prove
That Jesus is Thy healing name;
To lose, when perfected in love,
Whate’er I have, or can, or am
I stay me on Thy faithful word:
The servant shall be as his Lord.
2. Answer that gracious end in me
For which Thy precious life was given;
Redeem from all iniquity;
Restore, and make me meet for heaven:
Unless Thou purge my every stain,
Thy suffering and my faith are vain.
3. Didst Thou not die that I might live
No longer to myself, but Thee,
Might body, soul, and spirit give
To Him who gave Himself for me?
Come then, my Master and my God,
Take the dear purchase of Thy blood.
4. Thy own peculiar servant claim,
For Thy own truth and mercy’s sake;
Hallow in me Thy glorious name;
Me for Thine own this moment take,
And change, and throughly purify;
