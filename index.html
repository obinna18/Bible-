Thine only may I live and die.`,keywords:["saviour from sin i wait to prove", "answer that gracious end in me", "didst thou not die that i might live", "thy own peculiar servant claim"],titleWords:["saviour", "from", "sin,", "i", "wait", "to", "prove"]},
  185: {num:185,title:`THE THING MY GOD DOTH HATE`,lyrics:`1. The thing my God doth hate
That I no more may do,
Thy creature, Lord, again create,
And all my soul renew.
2. My soul shall then, like Thine,
Abhor the thing unclean,
And, sanctified by love divine,
For ever cease from sin.
3. That blessed law of Thine,
Jesus, to me impart;
The Spirit’s law of life divine,
O write it in my heart!
4. Implant it deep within,
Whence it may ne’er remove,
The law of liberty from sin,
The                 perfect             law     of   love.
5. Thy nature be my law,
Thy spotless sanctity,
And sweetly every moment draw
My happy soul to Thee.
6. Soul of my life remain!
Who didst for all fulfil,
In me, O Lord, fulfil again
Thy heavenly Father’s will!
186. GOD OF ALL POWER, AND TRUTH, & GRACE
1. God of all power, and truth, and grace,
Which shall from age to age endure,
Whose word, when heaven and earth shall pass,
Remains and stands for ever sure.
2. That I Thy mercy may proclaim,
That all mankind Thy truth may see,
Hallow Thy great and glorious name,
And perfect holiness in me.
3. Purge me from every evil blot;
My idols all be cast aside;
Cleanse me from every sinful thought,
From all the filth of self and pride.
4. Give me a new, a perfect heart,
From doubt, and fear, and sorrow free;
The mind which was in Christ impart,
And let my spirit cleave to Thee.
5. O that I now, from sin released,
Thy word may to the utmost prove,
Enter into the promised rest,
The Canaan of Thy perfect love! Amen.
187.   JESUS, ALL-ATONING LAMB
1. Jesus, all-atoning Lamb,
Thine, and only Thine, I am:
Take my body, spirit, soul;
Only Thou possess the whole.
2. Thou my one thing needful be;
Let me ever cleave to Thee;
Let me choose the better part;
Let me give Thee all my heart.
3. Fairer than the sons of men,
Do not let me turn again,
Leave the fountain-head of bliss,
Stoop to creature-happiness.
4. Whom have I on earth below?
Thee, and only Thee, I know;
Whom have I in heaven but Thee?
Thou art all in all to me.
5. All my treasure is above,
All my riches is Thy love:
Who the worth of love can tell?
Infinite, unsearchable.
188.   O LORD, HOW HAPPY SHOULD WE BE
1. O Lord, how happy should we be
If we could cast our care on Thee,
If we from self could rest,
And feel at heart that One above,
In perfect wisdom, perfect love
Is working for the best.
2. How far from this our daily life,
Ever disturbed by anxious strife,
By sudden wild alarms.
O could we but relinquish all
Our earthly props, and simply fall
On Thine almighty arms.
3. Could we but kneel and cast our load,
E’en while we pray, upon our God,
Then rise with lightened cheer,
Sure that the Father, who is nigh
To still the famished raven’s cry,
Will hear, in that we fear.
4. Lord, make these faithless hearts of ours
Thy lessons learn from birds and flowers:
Make them from self to cease,
Leave all things to a Father’s will,
And taste, before Him lying still,
E’en in affliction, peace.
189.   TAKE TIME TO BE HOLY
1. Take time to be holy, speak oft with thy Lord;
Abide in Him always, and feed on His Word;
Make friends of God’s children help those who are weak;
Forgetting in nothing, His blessing to seek.
2. Take time to be holy, the world rushes on;
Spend much time in secret with Jesus alone-
By looking to Jesus, like him thou shalt be;
Thy friends in thy conduct His likeness shall see.
3. Take time to be holy, let Him be thy Guide;
And run not before Him, whatever betide;
In joy or in sorrow still follow thy Lord,
And, looking to Jesus, still trust in His word.
4. Take time to be holy, be calm in thy soul;
Each thought and each temper beneath His control:
Thus led by His Spirit to fountains of love,
Thou soon shalt be fitted for service above.
190 . “CALLED UNTO HOLINESS”
1. “Called unto holiness,” Church of our God,
Purchased of Jesus, redeemed by His blood;
Called from the world and its idols to flee,
Called from the bondage of sin to be free.
“Holiness unto the Lord,” is our
watchword and song,
“Holiness unto the Lord,” as we’re
marching along:
Sing. . . it, shout it, loud . . .and long,
“Holiness unto the Lord,” now and for ever.
2. “Called unto holiness,” children of Light,
Walking with Jesus in garments of white;
Raiment unsullied, nor tarnished with sin,
God’s Holy Spirit abiding within.
3. “Called unto holiness,” praise His dear name,
This blessed secret to faith now made plain,
Not our own righteousness, but Christ within,
Living and reigning, and saving from sin.
4. “Called unto holiness,” glorious thought!
Up from the wilderness wanderings brought
Out from the shadows and darkness of night
Into the Canaan of perfect delight.
5. “Called unto holiness,” Bride of the Lamb,
Waiting the Bridegroom’s returning again;
Lift up your heads, for the day draweth near.
When in His beauty the King shall appear.
191.   COME, HOLY GHOST, ALL-QUICKENING FIRE!
1. Come Holy Ghost, all-quickening fire!
Come, and my hallowed heart inspire,
Sprinkled with the atoning blood;
Now to my soul Thyself reveal,
Thy mighty working let me feel,
And know that I am born of God.
2. Humble, and teachable, and mild,
O may I, as a little child,
My lowly Master’s steps pursue!
Be anger to my soul unknown,
Hate, envy, jealousy, be gone;
In love create Thou all things new.
3. Let earth no more my heart divide,
With Christ may I be crucified,
To Thee with my whole soul aspire;
Dead to the world and all its toys,
Its idle pomp, and fading joys,
Be Thou alone my one desire.
4. My will be swallowed up in Thee;
Light in Thy light still may I see,
Beholding Thee with open face,
Called the full power of faith to prove,
Let all my hallowed heart be love,
And all my spotless life be praise.
192.   O FOR A HEART TO PRAISE MY GOD
1. O for a heart to praise my God,
A heart from sin set free,
A heart that always feels Thy blood
So freely spilt for me.
2. A heart resigned, submissive, meek,
My great Redeemer’s throne,
Where only Christ is heard to speak,
Where Jesus reigns alone.
3. A humble, lowly, contrite heart,
Believing, true, and clean;
Which neither life nor death can part
From Him that dwells within.
4. A heart in every thought renewed,
And full of love divine;
Perfect, and right, and pure, and good,
A copy, Lord, of Thine.
5. Thy nature, gracious Lord, impart;
Come quickly from above,
Write Thy new name upon my heart,
Thy new, best name of love. Amen.
193.   ANOTHER YEAR
1. Another year is dawning-
A path unknown, untried,
’Twould fill me with foreboding,
Had I no hand to guide;
But He who walked beside me
All through the yesteryear,
Whatever may betide me,
Has promised to be near.
2. Another year with Jesus!
Ah, then, no dread I know.
His love is ever precious,
Howe’er the winds may blow.
E’en when the storm is fiercest,
In Him my soul may rest,
And find sweet peace and comfort
Upon his loving breast.
3. Another year to trust Him -
Yes, I can trust Him still,
Who never yet has failed me
As I have sought His will.
His rod and staff He giveth
To be my strength and stay,
And tenderly He leadeth
Along the homeward way.
4. Another year to serve Him,
To labour for Him here,
E’en while the shadows lengthen
And night is drawing near.
I know not when He’ll call me
To lay my sickle by-
Oh, may I then be faithful,
While now the moments fly!
5. Another year to love Him,
Whom I have loved so long;
Another year to praise Him
In glad triumphant song.
Whate’er the future holdeth,
Of sorrow, toil, or pain;
His precious Love endureth
Forevermore the same.
6. Another year with Jesus!
I thank Thee, Lord, today
For Thy unfailing presence
Along life’s rugged way.
Guide me, O blest Redeemer,
Teach me to do Thy will,
And Thy own perfect purpose
In me each day fulfil.
194.   O DAY OF REST AND GLADNESS
1. O day of rest and gladness,
O day of joy and light,
O balm of care and sadness,
Most beautiful, most bright!
On thee the high and lowly,
Through ages joined in tune,
Sing: holy, holy, holy,
To the great God Triune.
2. On thee, at the creation,
The light first had its birth;
On thee, for our salvation,
Christ rose from depths of earth;
On thee, our Lord victorious
The Spirit sent from Heaven:
And thus on thee most glorious
A triple light was given.
3. Thou art a port protected
From storms that round us rise;
A garden intersected
With streams of paradise;
Thou art a cooling fountain
In life’s dry dreary sand;
From thee, like Pisgah’s mountain,
We view our promised land.
4. Thou art a holy ladder,
Where angels go and come;
Each Sunday finds us gladder,
Nearer to heaven, our home;
A day of sweet reflection,
Thou art a day of love;
A day of resurrection
From earth to things above.
5. Today on weary nations
The heavenly manna falls;
To holy convocations
The silver trumpet calls,
Where gospel light is glowing
With pure and radiant beams.
And living water flowing
With soul-refreshing streams.
6. New graces ever gaining,
From, this our day of rest,
We reach the rest remaining
To spirits of the blest.
To Holy Ghost be praises,
To Father, and to Son;
The church her voice upraises
To Thee, blest Three in One.
195.   ANOTHER YEAR IS DAWNING
1. Another year is dawning!
Dear Father, let it be,
In working or in waiting,
Another year with Thee;
Another year of progress,
Another year of praise,
Another year of proving,
Thy presence all the days.
2. Another year of mercies,
Of faithfulness and grace;
Another year of gladness
The glory of Thy face;
Another year of leaning
Upon Thy loving breast;
Another year of trusting,
Of quiet, happy rest;
3. Another year of service,
Of witness for Thy love;
Another year of training
For holier work above.
Another year is dawning!
Dear Father, let it be,
On earth, or else in heaven,
Another year for Thee.
196.   DOES JESUS CARE?
1. Does Jesus care when my heart is pained
Too deeply for mirth and song;
As the burdens press, and the cares distress,
And the way grows weary and long?
O yes, He cares, I know He cares!
His heart is touched with my grief;
When the days are weary, the long nights dreary,
I know my Saviour cares.
2. Does Jesus care when my way is dark
With a nameless dread and fear?
As the daylight fades into deep night shades,
Does He care enough to be near?
3. Does Jesus care when I’ve tried and failed
To resist some temptation strong;
When for my deep grief I find no relief,
Tho’ my tears flow all the night long?
4. Does Jesus care when I’ve said goodbye
To the dearest on earth to me,
And my sad heart aches till it nearly breaks,
Is it aught to Him, does He see?
197.   LOVE FOUND A WAY
1. Wonderful love that rescued me,
Sunk deep in sin,
Guilty and vile as I could be -
No hope within;
When ev’ry ray of light had fled,
O glorious day!
Raising my soul from out the dead,
Love found a way.
Love found a way.... to redeem my soul,...
Love found a way ... that could make me whole;...
Love sent my Lord ... to the cross of shame,
Love found a way, O praise His holy name!
2. Love bro’t my Saviour here to die
On Calvary,
For such a sinful wretch as I,
How can it be?
Love bridged the gulf ’twixt me and heav’n,
Taught me to pray;
I am redeemed, set free, forgiv’n,
Love found a way.
3. Love opened wide the gates of light
To heav’n’s domain,
Where in eternal pow’r and might
Jesus shall reign;
Love lifted me from depths of woe
To endless day,
There was no help in earth below,
Love found a way.
198.   HIS LOVE CAN NEVER FAIL
1. I do not ask to see the way
My feet will have to tread;
But only that my soul may feed
Upon the living Bread.
’Tis better far that I should walk
By faith close to His side -
I may not know the way I go,
But oh, I know my Guide.
His love ..... can never fail,
His love ..... can never fail;
My soul is satisfied to know
His love can never fail.
2. And if my feet would go astray,
They cannot, for I know,
That Jesus guides my falt’ring steps.
As joyfully I go,
And tho’ I may not see His face,
My faith is strong and clear,
That in each hour of sore distress
My Saviour will be near.
3. I will not fear, tho’ darkness come
Abroad o’er all the land,
If I may only feel the touch
Of His own loving hand.
And tho’ I tremble when I think
How weak I am, how frail,
My soul is satisfied to know
His love can never fail.
199.   RESTING IN HIS LOVE
1. God has shown His loving face
From His throne in heav’n above:
And I’ve found a resting-place,
In the shelter of His love.
I am resting, resting,
Resting sweetly resting in His love;
I am resting in His love,
Resting in the shelter of His love.
2. When the cares of life oppress,
When the sky is dark above;
I can always find a rest,
In the shelter of His love.
3. O, if you were never blest,
With this peace from heav’n above;
There’s for you a wondrous rest,
In the shelter of His love.
200.   THE NINETY AND NINE
1. There were ninety and nine that safely lay
In the shelter of the fold,
But one was out on the hills away,
Far off from the gates of gold -
Away on the mountains wild and bare,
Away from the tender Shepherd’s care,
Away from the tender Shepherd’s care.
2. “Lord, Thou hast here Thy ninety and nine;
Are they not enough for Thee?”
But the Shepherd made answer:
“This of Mine has wandered away from Me;
And although the road be rough and steep,
I go to the desert to find My sheep,
I go to the desert to find My sheep.”
3. But none of the ransomed ever knew
How deep were the waters crossed;
Nor how dark was the night that the Lord passed thro’
Ere He found His sheep that was lost;
Out in the desert He heard its cry -
Sick and helpless, and ready to die,
Sick and helpless, and ready to die.
4. “Lord, whence are those blood-drops all the way
That mark out the mountain’s track?”
“They were shed for one who had gone astray
Ere the Shepherd could bring him back.”
“Lord, whence are Thy hands so rent and torn?”
“They’re pierced tonight by many a thorn;
They’re pireced tonight by many a thorn.”
5. But all thro’ the mountains, thunder-riven,
And up from the rocky steep.
There arose a glad cry to the gate of heaven,
“Rejoice! I have found my sheep!”
And the angels echoed around the throne,
“Rejoice, for the Lord brings back His own!
Rejoice, for the Lord brings back His own.”
201 . LOVE LIFTED ME
1. I was sinking deep in sin,
Far from the peaceful shore,
Very deeply stained within,
Sinking to rise no more;
But the Master of the sea
Heard my despairing cry,
From the waters lifted me,
Now safe am I.
Love lifted me! Love lifted me!
When nothing else could help, Love lifted me.
Love lifted me! Love lifted me!
When nothing else could help, Love lifted me.
2. All my heart to Him I give,
Ever to Him I’ll cling,
In His blessed presence live,
Ever His praises sing.
Love so mighty and so true
Merits my soul’s best songs;
Faithful, loving service, too,
To Him belongs.
3. Souls in danger, look above,
Jesus completely saves;
He will lift you by His love
Out of the angry waves.
He’s the Master of the sea,
Billows His will obey;
He your Saviour wants to be -
Be saved today.
202 . WONDERFUL STORY OF LOVE
1. Wonderful story of love; tell it to me again;
Wonderful story of love; wake the immortal strain!
Angels with rapture announce it,
Shepherds with wonder receive it;
Sinner, O won’t you believe it?
Wonderful story of love.
Won. . . . der . . .. ful!
Won. . . . der . . .. ful!
Won. . . . der . . .. ful!
Wonderful story of love!
2. Wonderful story of love; though you are far away;
Wonderful story of love; still He doth call to-day;
Calling from Calvary’s mountain,
Down from the crystal bright fountain,
E’en from the dawn of creation,
Wonderful story of love.
3. Wonderful story of love; Jesus provides a rest;
Wonderful story of love; for all the pure and blest,
Rest in those mansions above us,
With those who’ve gone on before us,
Singing the rapturous chorus,
Wonderful story of love.
203 . THERE IS NO LOVE LIKE THE LOVE OF JESUS
1. There is no love like the love of Jesus -
Never to fade or fall,
Till into the fold of the peace of God
He has gather’d us all.
Jesus’ love, precious love,
Boundless and pure and free;
Oh, turn to that love, weary wand’ring soul:
Jesus pleadeth with thee!
2. There is no eye like the eye of Jesus,
Piercing so far away;
Ne’er out of the sight of its tender light
Can the wanderer stray.
3. There is no voice like the voice of Jesus.
Tender and sweet its chime,
Like musical ring of a flowing spring,
In the bright summer time.
4. There is no heart like the heart of Jesus,
Filled with a tender love:
No throb nor throe that our hearts can know,
But He feels it above.
204 . YE MUST BE BORN AGAIN
1. A ruler once came to Jesus by night,
To ask Him the way of salvation and light;
The Master made answer in words true and plain,
“Ye must be born again!”
“Ye must be born again!”
“Ye must be born again!”
I verily, verily say unto thee -
“Ye must be born again!”
2. Ye children of men attend to the word
So solemnly uttered by Jesus the Lord,
And let not this message to you be in vain,
“Ye must be born again!”
3. O ye who would enter that glorious rest,
And sing with the ransomed the song of the blest;
The life everlasting if ye would obtain,
“Ye must be born again.”
4. A dear one in heaven thy heart yearns to see,
At the beautiful gates may be watching for thee;
Then list to the note of this solemn refrain,
“Ye must be born again.”
205.   HAVE YOU COUNTED THE COST?
1. There’s a line that is drawn by rejecting our Lord,
Where the call of His Spirit is lost,...
And you hurry along with the pleasure-mad throng -
Have you counted, have you counted the cost?
Have you counted the cost, if your soul should be lost,
Tho’ you gain the whole world for your own? ...
Even now it may be that the line you have crossed,
Have you counted, have you counted the cost?
2. You may barter your hope of eternity’s morn,
For a moment of joy at the most,...
For the glitter of sin and the things it will win-
Have you counted, have you counted the cost?
3. While the door of His mercy is open to you,
Ere the depth of His love you exhaust,...
Won’t you come and be healed, won’t you whisper, I yield -
I have counted, I have counted, the cost.
206.   WHERE WILL YOU SPEND ETERNITY?
1. Where will you spend eternity?
This question comes to you and me!
Tell me, what shall your answer be?
Where will you spend, eternity?
Eternity! Eternity!
Where will you spend, eternity?
2. Many are choosing Christ today,
Turning from all their sins away;
Heav’n shall their happy portion be;
Where will you spend eternity?
Eternity! Eternity!
Where will you spend eternity?
3. Leaving the strait and narrow way,
Going the downward road today,
Sad will their final ending be,
Lost thro’ a long eternity!
Eternity! Eternity!
Lost through a long eternity!
4. Repent, believe, this very hour,
Trust in the Saviour’s grace and power;
Then will your joyous answer be,
Saved through a long eternity!
Eternity! Eternity!
Saved through a long eternity!
207 . THERE’S A GREAT DAY COMING
1. There’s a great day coming,
A great day coming,
There’s a great day coming by and by;
When the saints and the sinners shall be
parted right and left,
Are you ready for that day to come?
Are you ready? Are you ready?
Are you ready for the judgment day?
Are you ready? Are you ready?
For the judgment day?
2. There’s a bright day coming,
A bright day coming,
There’s a bright day coming by and by;
But its brightness shall only come
to them that love the Lord,
Are you ready for that day to come?
3. There’s a sad day coming,
A sad day coming,
There’s a sad day coming by and by;
When the sinner shall hear his doom
“Depart, I know ye not,”
Are you ready for that day to come?
208.   THE GREAT JUDGMENT MORNING
1. I dreamed that the great judgment morning
Had dawned and the trumpet had blown;
I dreamed that the nations had gathered
To judgment before the white throne;
From the throne came a bright shining angel,
And stood on the land and the sea,
And swore with his hand raised to heaven,
That time was no longer to be.
And O, what a weeping and wailing,
As the lost were told of their fate;
They cried for the rocks and the mountains,
They prayed, but their prayer was too late.
2. The rich man was there, but his money
Had melted and vanished away;
A pauper he stood in the judgment,
His debts were too heavy to pay;
The great man was there, but his greatness,
When death came, was left far behind!
The angel that opened the records,
Not a trace of his greatness could find.
3. The widow was there with the orphans,
God heard and remembered their cries;
No sorrow in heaven for ever,
God wiped all the tears from their eyes;
The gambler was there and the drunkard,
And the man that had sold them the drink,
With the people who gave him the license,
Together in hell they did sink.
4. The moral man came to the judgment,
But his self-righteous rags would not do;
The men who had crucified Jesus
Had passed off as moral men, too;
The soul that had put off salvation,
“Not tonight; I’ll get saved by and by,
No time now to think of religion!”
At last they had found time to die.
209.   I WILL NOT FORGET THEE
1. Sweet is the promise “I will not forget thee,”
Nothing can molest or turn my soul away;
E’en though the night be dark within the valley,
Just beyond is shining an eternal day.
I...will not forget thee or leave thee;
In My hands I’ll hold thee, in My arms I’ll fold thee;
I... will not forget thee or leave thee-
I am thy Redeemer, I will care for thee.
2. How can I show my gratitude to Jesus,
For His love unfailing and His tender care?
I will proclaim to others His salvation,
That they may accept Him and His promise share.
3. Trusting the promise “I will not forget thee,”
Onward will I go with songs of joy and praise;
Tho’ earth despise me, tho’ my friends forsake me,
Jesus will be near me gladdening my days.
4. When at the golden portals I am standing,
All my tribulations, all my sorrows past,
How sweet to hear the blessed proclamation:
“Enter, faithful servant, welcome home at last!”
210 . OPEN MY EYES THAT I MAY SEE
1. Open my eyes, that I may see
Glimpses of truth Thou hast for me;
Place in my hands the wonderful key
That shall unclasp and set me free,
Silently now I wait for Thee,
Ready, my God, Thy will to see;
Open my eyes, illumine me,
Spirit Divine!
2. Open my ears, that I may hear
Voices of truth Thou sendest clear;
And while the wave-notes fall on my ear,
Everything false will disappear.
Silently now I wait for Thee,
Ready, my God, Thy will to see;
Open my ears, illumine me,
Spirit Divine!
3. Open my mouth, and let me bear
Gladly the warm truth everywhere,
Open my heart and let me prepare,
Love with Thy children thus to share,
Silently now I wait for Thee,
Ready, my God, Thy will to see;
Open my heart, illumine me,
Spirit Divine!
4. Open my mind, that I may read
More of Thy love in word and deed;
What shall I fear while yet Thou dost lead?
Only for light from Thee I plead,
Silently now I wait for Thee,
Ready, my God, Thy will to see;
Open my mind, illumine me,
Spirit Divine!
5. Open my way, that I may bring
Trophies of grace to Thee, my King;
Echoed in love Thy word shall out ring
Sweet as the note that angels sing,
Silently now I wait for Thee,
Ready, my God, Thy will to see;
Open my way, illumine me,
Spirit Divine!
211 . CROWN HIM WITH MANY CROWNS
1. Crown Him with many crowns,
The Lamb upon His Throne;
Hark! how the heav’nly anthem drowns
All music but its own:
Awake, my soul, and sing
Of Him who died for thee;
And hail Him as thy matchless King
Through all eternity.
2. Crown Him the Virgin’s Son,
The God incarnate born,
Whose arm those crimson trophies won
Which now His brow adorn;
Fruit of the mystic Rose,
As of that Rose the Stem;
The Root whence mercy ever flows,
The Babe of Bethlehem.
3. Crown Him the Lord of love:
Behold His hands and side,
Those wounds yet visible above
In beauty glorified:
No angel in the sky
Can fully bear that sight,
But downward bends His burning eye
At mysteries so bright.
4. Crown Him the Lord of life,
Who triumphed o’er the grave,
And rose victorious in the strife
For those He came to save:
His glories now we sing,
Who died, and rose on high;
Who died, eternal life to bring,
And lives, that death may die.
5. Crown Him the Lord of peace,
Whose power a sceptre sways
From pole to pole, that wars may cease,
And all be prayer and praise:
His reign shall know no end,
And round His pierced feet
Fair flowers of Paradise extend
Their fragrance ever sweet.
6. Crown Him the Lord of years,
The Potentate of time,
Creator of the rolling spheres,
Ineffably sublime:
All hail, Redeemer, hail !
For Thou hast died for me;
Thy praise shall never, never fail
Throughout eternity.
212 . JESUS SHALL REIGN WHERE’ER THE SUN
1. Jesus shall reign where’er the sun
Doth his successive journeys run;
His kingdom stretch from shore to shore,
Till sun shall rise and set no more.
2. For Him shall endless prayer be made,
And praises throng to crown His head;
His name like sweet perfume shall rise
With every morning sacrifice.
3. People and realms of every tongue
Dwell on His love with sweetest song;
And infant voices shall proclaim
Their young hosannas to His name.
4. Blessings abound where’er He reigns;
The prisoner leaps to lose his chains;
The weary find eternal rest;
And all the sons of want are blest.
5. Where He displays His healing power;
Death and the curse are known no more,
In Him the tribes of Adam boast
More blessings than their father lost.
6. Let every creature rise and bring,
Its greatest honours to our King;
Angels descend with songs again,
And earth prolong the joyful strain.
213 . REJOICE, THE LORD IS KING!
1. Rejoice, the Lord is King!
Your Lord and King adore;
Mortals, give thanks and sing,
And triumph evermore;
Lift up your heart, lift up your voice,
Rejoice, again I say, rejoice!
2. Jesus the Saviour reigns,
The God of truth and love;
When He had purged our stains,
He took His seat above;
Lift up your heart, lift up your voice,
Rejoice, again I say, rejoice!
3. His kingdom cannot fail;
He rules o’er earth and heaven;
The keys of death and hell
Are to our Saviour given;
Lift up your heart, lift up your voice,
Rejoice, again I say, rejoice!
4. Rejoice in glorious hope;
Jesus the Judge shall come,
And take His servants up
To their eternal home;
We soon shall hear th’archangel’s voice;
The trump of God shall sound, rejoice!
214.   ALL HAIL THE POWER OF JESUS’ NAME!
1. All hail the power of Jesus’ name!
Let angels prostrate fall;
Bring forth the royal diadem,
And crown Him Lord of all.
2. Crown Him, ye martyrs of our God,
Who from His altar call;
Extol the stem of Jesse’s rod,
And crown Him Lord of all.
3. Ye chosen seed of Israel’s race,
A remnant weak and small,
Hail Him who saves you by His grace,
And crown Him Lord of all.
4. Ye Gentile sinners, ne’er forget
The wormwood and the gall;
Go, spread your trophies at His feet,
And crown Him Lord of all.
5. Let every kindred, every tribe,
On this terrestrial ball,
To Him all majesty ascribe,
And crown Him Lord of all.
6. O that with yonder sacred throng
We at His feet may fall,
Join in the everlasting song,
And crown Him Lord of all.
215 . O HAPPY DAY, THAT FIXED MY CHOICE
1. O happy day, that fixed my choice,
On Thee, my Saviour and my God!
Well may this glowing heart rejoice,
And tell its raptures all abroad.
Happy day, happy day,
When Jesus washed my sins away!
He taught me how to watch and pray,
And live rejoicing ev’ry day,
Happy day, happy day,
When Jesus washed my sins away!
2. ‘‘Tis done, the great transactions done!
I am my Lord’s and He is mine:
He drew me and I followed on,
Charmed to confess the voice divine.
3. Now rest, my long-divided heart,
Fixed on this blissful centre, rest:
Nor ever from thy Lord depart,
With Him of every good possessed.
4. High heaven, that heard the solemn vow,
That vow renewed shall daily hear,
Till in life’s latest hour I bow,
And bless in death a bond so dear.
216 . MORE ABOUT JESUS WOULD I KNOW
1. More about Jesus would I know,
More of His grace to others show;
More of His saving fulness see,
More of His love who died for me.
More, more about Jesus,
More, more about Jesus:
More of His saving fulness see,
More of His love who died for me.
2. More about Jesus let me learn,
More of His holy will discern;
Spirit of God, my Teacher be,
Showing the things of Christ to me.
3. More about Jesus, in His Word,
Holding communion with my Lord;
Hearing His voice in every line,
Making each faithful saying mine.
4. More about Jesus, on His throne,
Riches in glory all His own:
More of His kingdom’s sure increase;
More of His coming, Prince of Peace.
217 . O PERFECT LOVE, ALL HUMAN
THOUGHT TRANSCENDING
1. O perfect Love, all human thought transcending,
Lowly we kneel in prayer before Thy throne,
That theirs may be the love which knows no ending
Whom Thou for evermore dost join in one.
2. O perfect Life, be Thou their full assurance,
Of tender charity and steadfast faith,
Of patient hope, and quiet brave endurance.
With childlike trust that fears no pain nor death.
3. Grant them the joy which brightens earthly sorrow,
Grant them the peace which calms all earthly strife;
And to life’s day the glorious unknown morrow
That dawns upon eternal love and life.
218 . LOVE DIVINE, ALL LOVES EXCELLING
1. Love divine, all loves excelling,
Joy of heav’n, to earth come down!
Fix in us Thy humble dwelling;
All Thy faithful mercies crown.
Jesus, Thou art all compassion,
Pure, unbounded love Thou art;
Visit us with Thy salvation;
Enter every trembling heart.
2. Breathe, O, breathe Thy loving Spirit
Into every troubled breast!
Let us all in Thee inherit,
Let us find that second rest.
Take away our bent to sinning;
Alpha and Omega be;
End of faith, as its beginning,
Set our hearts at liberty.
3. Come, Almighty to deliver,
Let us all Thy life receive;
Suddenly return, and never,
Never more Thy temples leave:
Thee we would be always blessing,
Serve Thee as Thy hosts above.
Pray, and praise Thee without ceasing,
Glory in thy perfect love.
4. Finish then Thy new creation,
Pure and spotless may we be;
Let us see our whole salvation,
Perfectly secured by Thee:
Changed from glory into glory,
Till in heaven we take our place,
Till we cast our crowns before Thee,
Lost in wonder, love, and praise.
219 . MORE HOLINESS GIVE ME, MORE STRIVING WITHIN
1. More holiness give me, More striving within;
More patience in suffering, More sorrow for sin;
More faith in my Saviour, More sense of His care;
More joy in His service, More purpose in prayer.
2. More gratitude give me, More trust in the Lord;
More pride in His glory, More hope in His Word;
More tears for His sorrows, More pain at His grief;
More meekness in trial, More praise for relief.
3. More purity give me, More strength to o’ercome;
More freedom from earth-stains, More longings for home;
More fit for the kingdom, More used would I be;
More blessed and holy, More, Saviour, like Thee.
220 .. WHEN I SAW THE CLEANSING FOUNTAIN
1. When I saw the cleansing fountain
Open wide for all my sin,
I obeyed the Spirit’s wooing
When He said “Wilt thou be clean?”
I will praise Him, I will praise Him, praise Him,
Praise the Lamb for sinners slain:...
Give Him glory all ye people,
For His blood has washed away my stain.
2. Though the way seemed straight and narrow,
All I claimed was swept away;
My ambition, plans and wishes,
At my feet in ashes lay.
3. Then God’s fire upon the altar
Of my heart was set aflame;
I shall never cease to praise Him,
Glory! glory! to His name.
4. Blessed be the name of Jesus,
I’m so glad He took me in;
He has pardoned my transgressions,
He has cleansed my heart from sin.
221 .. LET NOT THY HANDS BE SLACK
1. “Let not thy hands be slack,”
Live not in vain;
Out on life’s lonely track
Men toil in pain.
Play thou a brother’s part,
Strength, love, and hope impart,
Bid thou the fainting heart
Look up again!
2. “Let not thy hands be slack,”
Grip thou thy sword!
Why should’st thou courage lack?
Think of thy Lord.
Did He not fight for thee?
Stronger than all is He,
And He thy strength will be,
Rest on His word.
3. “Let not thy hands be slack,”
Haste to the fray!
Dream not of turning back:
Life is not play!
Gird thou thy armour on,
Fight till the battle’s won,
Then shall thy Lord’s “Well done!”
More than repay!
4. “Let not thy hands be slack!
Fear not! Be strong!”
Cease not to make attack
On every wrong.
Press on for truth and right,
Hold high the Gospel light
Expel the dirge of night
With heaven’s song!
5. “Let not thy hands be slack,”
The days fly fast.
Lost moments come not back
From the dark past.
Then be not slack of hand!
Help thou the weak to stand!
To God and Fatherland
Give all thou hast!
222 .. SPEED THY SERVANTS, SAVIOUR, SPEED THEM
1. Speed Thy servants, Saviour, speed them;
Thou art Lord of winds and waves;
They were bound, but Thou hast freed them,
Now they go to free the slaves.
Be Thou with them,
’Tis Thine arm alone that saves.
2. Friends, and home, and all forsaking,
Lord, they go at Thy command;
As their stay Thy promise taking,
While they traverse sea and land:
O, be with them,
Lead them safely by the hand!
3. When no fruit appears to cheer them,
And they seem to toil in vain,
Then in mercy, Lord, draw near them,
Then their sinking hopes sustain;
Thus supported,
Let their zeal revive again.
4. In the midst of opposition,
Let them trust, O Lord, in Thee:
When success attends their mission,
Let Thy servants humble be;
Never leave them,
Till Thy face in heaven they see:
5. There to reap in joy for ever
Fruit that grows from seed here sown,
There to be with Him, who never
Ceases to preserve His own,
And with gladness
Give the praise to Him alone.
223.. I GAVE MY LIFE FOR THEE
1. I gave my life for thee,
My precious blood I shed,
That thou might’st ransomed be,
And quickened from the dead;
I gave, I gave My life for thee,
What hast thou giv’n for Me?
2. I spent long years for thee
In weariness and woe,
That an eternity
Of joy thou mightest know:
I spent, I spent long years for thee;
Hast thou spent one for Me?
3. My Father’s home of light,
My glory-circled throne
I left for earthly night
For wand’rings sad and lone;
I left, I left it all for thee,
Hast thou left aught for Me?
4. I suffered much for thee,
More than thy tongue can tell,
Of bitt’rest agony -
To rescue thee from hell;
I’ve borne, I’ve borne it all for thee,
What hast thou borne for Me?
5. Lord, let my life be given,
And every moment spent,
For God, for souls, for heaven,
And all earth’s ties be rent
Thou gav’st, Thou gav’st Thyself for me,
Now I give all for Thee.
224.. OH, THE BITTER SHAME AND SORROW
1. Oh, the bitter shame and sorrow,
That a time could ever be,
When I let the Saviour’s pity
Plead in vain, and proudly answered,
“All of self, and none of Thee!”
2. Yet He found me; I beheld Him
Bleeding on the accursed tree,
Heard Him pray, “Forgive them, Father!”
And my wistful heart said faintly-
“Some of self, and some of Thee.”
3. Day by day His tender mercy,
Healing, helping, full, and free,
Sweet and strong, and, ah! so patient,
Brought me lower, while I whispered,
“Less of self, and more of Thee.”
4. Higher than the highest heavens,
Deeper than the deepest sea,
Lord, Thy love at last has conquered;
Grant me now my supplication -
“None of self, and all of Thee.”
225.. BURN, FIRE OF GOD!
1. Burn, fire of God! my ransomed soul possessing;
Pure fire Thou art, and I would dwell in Thee.
Light of my life, true source of ev’ry blessing,
Grant all my days one holy flame to be.
2. Burn, fire of God! Thy grace and glory knowing,
My cleansed heart shall be all fire within:
Love all-constraining, tenderness o’erflowing,
One kindling passion other lives to win.
3. Burn, fire of God! Thy cloven tongue bestowing,
Baptizing me with heavenly energy.
Touched with live coals from off Thine altar glowing,
My purged lips shall speak alone of Thee.
4. Burn, fire of God! with seven-fold refining,
Till mirrored from my deeps Thine eyes shall see.
In purest gold Thy perfect image shining:
Thy Christ revealed in clear irradiancy.
5. Burn, fire of God! by Thine own love transcending,
Let all I hold be Thine, and Thine alone!
Heart, mind and will, a sacrifice ascending,
Consumed by fire from out Thy fiery Throne.
226 THY BLESSED WILL DIVINE
1. I want my life to be all filled with praise to Thee,
My precious Lord divine who died for me,
Let all my will be Thine, controlled by love divine,
Live out in me Thy life, O mighty Saviour.
Thy blessed will divine, with joy I make it mine
My heart shall be Thy throne, and Thine alone,
Choose Thou the path I tread and whither I am led,
Help me to follow on, O mighty Saviour.
2. A pilgrim born anew, a stranger going through,
Not of this world am I, since I am Thine.
Weaned from its passing show, transformed Thy love to know,
Hold Thou my hand in Thine, O mighty Saviour.
3. When evil foes assail and almost would prevail,
In that dark hour be Thou my strength and shield.
Lend then Thy strong embrace, uphold me by Thy grace,
In weakness be my strength, O mighty Saviour.
4. Yea, choose the path for me, although I may not see
The reason Thou dost will to lead me so.
I know the toilsome way will lead to realms of day.
Where I shall dwell with Thee, O mighty Saviour.
227.. NEARER, MY GOD TO THEE
1. Nearer, my God, to Thee, nearer to Thee!
E’en though it be a cross that raiseth me;
Still all my song shall be,
Nearer, my God, to Thee, nearer to Thee!
2. Though like the wanderer, the sun gone down,
Darkness be over me, my rest a stone,
Yet in my dreams I’d be
Nearer, my God, to Thee, nearer to Thee!
3. There let the way appear, steps unto heaven;
All that Thou sendest me, in mercy giv’n:
Angels to beckon me
Nearer, my God, to Thee, nearer to Thee!
4. Then with my waking thoughts, bright with Thy praise,
Out of my stony griefs, Bethel I’ll raise;
So by my woes to be
Nearer, my God, to Thee, nearer to Thee!
5. Or if on joyful wing, cleaving the sky,
Sun, moon, and stars forgot, upward I fly,
Still all my song shall be,
Nearer, my God, to Thee, nearer to Thee!
228 .. O WHY NOT TONIGHT?
1. O do not let the word depart,
And close thine eyes against the light;
Poor sinner, harden not your heart,
Be saved, O tonight
O why not to-night? O why not to-night?
Wilt thou be saved?
Then why not to-night?
2. Tomorrow’s sun may never rise,
To bless thy long deluded sight;
This is the time, O then be wise,
Be saved, O tonight.
3. Our Lord in pity lingers still,
And with thou thus His love requite?
Renounce at once thy stubborn will,
Be saved, O tonight.
4. Our blessed Lord refuses none
Who would to Him their souls unite;
Believe, obey, the work is done,
Be saved, O tonight.
229.. HOLD THE FORT
1. Ho, my comrades! see the signal
Waving in the sky!
Reinforcements now appearing,
Victory is nigh.
“Hold the fort, for I am coming,”
Jesus signals still;
Wave the answer back to heaven ,
“By Thy grace we will.”
2. See the mighty host advancing,
Satan leading on:
Mighty men around us falling,
Courage almost gone!
3. See the glorious banner waving!
Hear the trumpet blow!
In our Leader’s name we’ll triumph
Over every foe!
4. Fierce and long the battle rages,
But our help is near:
Onward comes our great Commander,
Cheer, my comrades, cheer!
230.. BRING YOUR VESSELS NOT A FEW
1. Are you looking for the fullness of blessing
of the Lord
In your heart and life today?
Claim the promise of your Father,
come according to His word,
In the blessed old-time way.
He will fill your heart today to overflowing,
As the Lord commandeth you,
“Bring your vessels, not a few;”
He will fill your heart today to overflowing
With the Holy Ghost and power.
2. Bring your empty earthen vessels, clean thro’
Jesus’ precious blood,
And in human consecration wait before the
throne of God,
Till the Holy Ghost shall fall.
3. Like the cruse of oil unfailing is His grace
forever more,
And His love unchanging still;
And according to His promise with the
Holy Ghost and power,
He will every vessel fill.
231.. SEND THE LIGHT
1. There’s a call comes ringing o’er the restless wave,
Send the light!... Send the light!
There are souls to rescue, there are souls to save,
Send the light!... Send the light!...
Send the light!... the blessed gospel light,
Let it shine... from shore to shore!...
Send the light!... and let its radiant beams,
Light the world... forevermore...
2. We have heard the Macedonian call today,
Send the light!... Send the light!
And a golden off’ring at the cross we lay,
Send the light!... Send the light!...
3. Let us pray that grace may everywhere abound,
Send the light!... Send the light!
And a Christ-like spirit everywhere be found,
Send the light! Send the light!...
4. Let us not grow weary in the work of love,
Send the light!... Send the light!
Let us gather jewels for a crown above,
Send the light!... Send the light!...`,keywords:["the thing my god doth hate", "my soul shall then like thine", "that blessed law of thine", "implant it deep within"],titleWords:["the", "thing", "my", "god", "doth", "hate"]},
  232: {num:232,title:`BLEST BE THE TIE THAT BINDS`,lyrics:`1. Blest be the tie that binds
Our hearts in Christian love;
The fellowship of kindred minds
Is like to that above.
2. Before our Father’s throne,
We pour our ardent prayers;
Our fears, our hopes, our aims are one,
Our comforts and our cares.
3. We share our mutual woes,
Our mutual burdens bear;
And often for each other flows
The sympathizing tear.
4. When we asunder part,
It gives us inward pain:
But we shall still be joined in heart,
And hope to meet again.`,keywords:["blest be the tie that binds", "before our fathers throne", "we share our mutual woes", "when we asunder part"],titleWords:["blest", "be", "the", "tie", "that", "binds"]},
  233: {num:233,title:`STAND UP, STAND UP FOR JESUS`,lyrics:`1. Stand up! stand up for Jesus!
Ye soldiers of the cross;
Lift high His royal banner,
It must not suffer loss:
From vict’ry unto vict’ry
His army shall He lead,
Till every foe is vanquished
And Christ is Lord indeed.
2. Stand up! stand up for Jesus!
The trumpet call obey;
Forth to the mighty conflict,
In this His glorious day:
Ye that are men now serve Him
Against unnumbered foes;
Let courage rise with danger,
And strength to strength oppose.
3. Stand up! stand up for Jesus!
Stand in His strength alone;
The arm of flesh will fail you,
Ye dare not trust your own:
Put on the gospel armour,
And watching unto prayer;
Where duty calls, or danger,
Be never wanting there.
4. Stand up! stand up for Jesus!
The strife will not be long;
This day the noise of battle,
The next the victor’s song:
To him that overcometh,
A crown of life shall be;
He with the King of glory
Shall reign eternally.
234    O LORD, “WITH ONE ACCORD”.
1. O Lord, “with one accord,”
We gather round Thy Throne,
To hear Thy holy Word,
To worship Thee alone.
Now send from heaven the Holy Ghost,
Be this another Pentecost!
2. We have no strength to meet
The storms that round us lower,
Keep Thou our trembling feet
In every trying hour;
More than victorious shall we be
If girded with Thy panoply.
3. Where is the mighty wind
That shook the holy place,
That gladdened every mind,
And brightened every face?
And where the cloven tongues of flame
That marked each follower of the Lamb?
4. There is no change in Thee,
Lord God the Holy Ghost,
Thy glorious majesty
Is as at Pentecost!
O may our loosened tongues proclaim,
That Thou, our God, art still the same.
5. And may that living wave,
That issues from on high,
Whose golden waters lave
Thy throne eternally:
Flow down in power on us to-day,
And none shall go unblessed away!
6. Anoint us with Thy grace,
To yield ourselves to Thee;
To run our daily race,
With joy and energy,
Until we hear the Bridegroom say,
“Rise up my love, and come away”.
235    THE HOLY SPIRIT’S POWER
1. “The Holy Spirit’s power
Ye need,” the Master said;
“So wait till comes the hour
When on you He is shed.”
So praise did all their souls employ
As tarried they with fervent joy.
2. And when ten days were passed
With one accord were they,
Heaven’s windows long closed fast,
Were opened on that day;
With rushing mighty wind and flame,
The promised Holy Spirit came.
3. Their loosened tongues were filled
With strange and wondrous words;
Heaven’s life their hearts had thrilled,
God’s goodness they declared;
“And unto all,” th’ Apostle said,
“Is the like gift, since Christ has bled.”
4. Come now, ye sons of men,
This message now receive,
The Holy Spirit’s given
To all who will believe;
Ye, too, may know His mighty power,
And speak with tongues this very hour.
5. Then charity divine,
Your yearning hearts shall fill
T’wards those who now repine,
Held in sin’s bondage still;
For these your zeal shall never tire
To snatch them from th’ e’erlasting fire.`,keywords:["stand up stand up for jesus", "stand up stand up for jesus", "stand up stand up for jesus", "stand up stand up for jesus"],titleWords:["stand", "up,", "stand", "up", "for", "jesus"]},
  236: {num:236,title:`LORD GOD, THE HOLY GHOST`,lyrics:`1. Lord God, the Holy Ghost,
In this accepted hour,
As on the day of Pentecost,
Descend in all Thy power!
2. We meet with one accord
In our appointed place,
And wait the promise of our Lord,
The Spirit of all grace.
3. Like mighty rushing wind
Upon the waves beneath,
Move with one impulse every mind,
One soul, one feeling breathe.
4. The young, the old, inspire
With wisdom from above,
And give us hearts and tongues of fire
To pray, and praise, and love.
5. Spirit of Light, explore
And chase our gloom away,
With lustre shining more and more
Unto the perfect day!
6. Spirit of Truth, be Thou
In life and death our Guide!
O Spirit of Adoption, now
May we be sanctified.`,keywords:["lord god the holy ghost", "we meet with one accord", "like mighty rushing wind", "the young the old inspire"],titleWords:["lord", "god,", "the", "holy", "ghost"]},
  237: {num:237,title:`PEACE! PERFECT PEACE!`,lyrics:`1. Peace, perfect peace, in this dark world of sin?
The blood of Jesus whispers peace within.
2. Peace, perfect peace, by thronging duties pressed?
To do the will of Jesus, this is rest.
3. Peace, perfect peace, with sorrows surging round?
On Jesus’ bosom naught but calm is found.
4. Peace, perfect peace, with loved ones far away?
In Jesus’ keeping we are safe and they.
5. Peace, perfect peace, our future all unknown?
Jesus we know, and He is on the throne.
6. Peace, perfect peace, death shadowing us and ours?
Jesus has vanquished death and all its powers.
7. It is enough; earth’s struggles soon shall cease,
And Jesus call to heaven’s perfect peace.`,keywords:["peace perfect peace in this dark world of sin", "peace perfect peace by thronging duties pressed", "peace perfect peace with sorrows surging round", "peace perfect peace with loved ones far away"],titleWords:["peace!", "perfect", "peace!"]},
  238: {num:238,title:`THOU HIDDEN SOURCE OF CALM REPOSE`,lyrics:`1. Thou hidden Source of calm repose,
Thou all sufficient love divine;
My help and refuge from my foes,
Secure I am, if Thou art mine,
From sin and grief, from guilt and shame:
I hide me, Jesus, in Thy name.
2. Thy mighty Name salvation is,
And keeps my happy soul above;
Comfort it brings, and power and peace,
And joy and everlasting love;
To me, with Thy dear Name, are given
Pardon and holiness and heaven.
3. Jesus, my all in all Thou art,
My rest in toil, mine ease in pain;
The med’cine of my broken heart;
In war, my peace; in loss, my gain:
My smile beneath the tyrant’s frown;
In shame, my glory and my crown.
4. In want, my plentiful supply;
In weakness, mine almighty power;
In bonds, my perfect liberty;
My light in Satan’s darkest hour;
In grief, my joy unspeakable;
My life in death; my heaven, my all.`,keywords:["thou hidden source of calm repose", "thy mighty name salvation is", "jesus my all in all thou art", "in want my plentiful supply"],titleWords:["thou", "hidden", "source", "of", "calm", "repose"]},
  239: {num:239,title:`ONE THERE IS ABOVE ALL OTHERS`,lyrics:`1. One there is above all others,
Well deserves the name of Friend;
His is love beyond a brother’s,
Costly, free, and knows no end:
They who once His kindness prove,
Find it everlasting love.
2. Which of all our friends, to save us,
Could or would have shed his blood?
But our Jesus died to have us
Reconciled in Him to God:
This was boundless love indeed;
Jesus is a Friend in need.
3. When He lived on earth abased
“Friend of sinners” was His name;
Now above all glories raised,
He rejoices in the same;
Still He calls them brethren, friends,
And to all their wants attends.
4. O, for grace our hearts to soften!
Teach us, Lord, at length to love;
We, alas! forget too often
What a Friend we have above;
But when home our souls are brought
We shall love Thee as we ought.`,keywords:["one there is above all others", "which of all our friends to save us", "when he lived on earth abased", "o for grace our hearts to soften"],titleWords:["one", "there", "is", "above", "all", "others"]},
  240: {num:240,title:`JESUS IS THE SAME FOREVER`,lyrics:`1. Jesus is the same for ever,
As of old, so now today;
All the hosts of hell endeavour
Vainly to obstruct His sway.
In His people’s hearts He reigneth,
Finishes what He begins;
Jesus still “all power” retaineth,
Saves His people from their sins.
2. Jesus is the same for ever;
Yes, He heals the sick to-day.
As of old, so now, He never
Turns one suffering child away.
He can cure the worst diseases,
For He understands our frame;
Bore our griefs, and so releases
All who dare their rights to claim.
3. Jesus is the same for ever;
Still He says “In Me abide.”
From His love no power can sever
Those who in their Lord confide,
Sweetly from all care He frees us,
Ours the comfort -His the shame,
Blessed Saviour; precious Jesus
There’s no music like Thy name.
241    I’VE FOUND THE “PEARL OF GREATESTPRICE”
1. I’ve found the “Pearl of greatest price,”
My heart doth sing of joy,
And sing I must, for Christ I have
Oh, what a Christ have I!
2. My Christ, He is “the Lord of lords,”
The Sovereign “King of kings,”
The risen “Sun of Righteousness,
With healing in His wings.”
3. My Christ, He is “the Tree of Life,”
That in God’s Eden grows;
The living “clear as crystal” stream
Whence life for ever flows.
4. Christ is my Meat, Christ is my Drink,
My Medicine, and my Health;
My Portion, mine Inheritance,
Yea, all my boundless Wealth.`,keywords:["jesus is the same for ever", "jesus is the same for ever", "jesus is the same for ever", "ive found the pearl of greatest price"],titleWords:["jesus", "is", "the", "same", "forever"]},
  242: {num:242,title:`A GOOD HIGH PRIEST IS COME`,lyrics:`1. A Good High Priest is come,
Supplying Aaron’s place,
And taking up his room,
Dispensing life and grace,
The law of Aaron’s priesthood came,
But grace and truth by Jesus’ name.
2. He once temptations knew,
And woes of every kind,
That He might succour show
To every tempted mind;
In every point the Lamb was tried
Like us, and then for us He died.
3. He died, but lives again,
And by the altar stands;
There shows how, He was slain,
Opening His pierced hands;
Our Priest abides, and pleads our cause,
Transgressors of His righteous laws.
4. I other priests disclaim,
Their laws and offerings too;
None but the bleeding Lamb
The mighty work can do;
He shall have all the praise, for He
Hath loved and lived and died for me.`,keywords:["a good high priest is come", "he once temptations knew", "he died but lives again", "i other priests disclaim"],titleWords:["a", "good", "high", "priest", "is", "come"]},
  243: {num:243,title:`STANDING ON THE PROMISES`,lyrics:`1. Standing on the promises of Christ my King,
Thru’ eternal ages let His praises ring;
Glory in the highest I will shout and sing,
Standing on the promises of God.
Stand...ing, stand...ing,
Standing on the promises of God my Saviour;
Stand...ing, stand...ing,
I’m standing on the promises of God.
2. Standing on the promises that cannot fail,
When the howling storms of doubt and fear assail,
By the living Word of God I shall prevail,
Standing on the promises of God.
3. Standing on the promises I now can see,
Perfect, present cleansing in the blood for me;
Standing in the liberty where Christ makes free,
Standing on the promises of God.
4. Standing on the promises of Christ the Lord,
Bound to Him eternally by love’s strong cord,
Overcoming daily with the Spirit’s sword,
Standing on the promises of God.
5. Standing on the promises I cannot fall,
List’ning ev’ry moment to the Spirit’s call,
Resting in my Saviour, as my all in all,
Standing on the promises of God.`,keywords:["standing on the promises of christ my king", "standing on the promises that cannot fail", "standing on the promises i now can see", "standing on the promises of christ the lord"],titleWords:["standing", "on", "the", "promises"]},
  244: {num:244,title:`ALL THINGS IN JESUS`,lyrics:`Friends all around me are trying to find
What the heart yearns for, by sin undermined;
I have the secret, I know where ’tis found:
Only true pleasures in Jesus abound.
All that I want is in Je...sus,
He satisfies,... joy He supplies;...
Life would be worthless without... Him,...
All things in Jesus I find.
2. Some carry burdens whose weight has for years
Crushed them with sorrow and blinded with tears,
Yet One stands ready to help them just now,
If they will humbly in penitence bow.
3. No other name thrills the joy-chords within,
And thro’ none else is remission of sin;
He knows the pain of the heart sorely tried,
Both need and want will by Him be supplied.
4. Jesus is all this poor world needs today,
Blindly they strive, for sin darkens their way;
O to draw back the grim curtains of night,
One glimpse of Jesus and all will be bright!`,keywords:["friends all around me are trying to find", "some carry burdens whose weight has for years", "no other name thrills the joychords within", "jesus is all this poor world needs today"],titleWords:["all", "things", "in", "jesus"]},
  245: {num:245,title:`IS YOUR LIFE A CHANNEL OF BLESSING?`,lyrics:`1. Is your life a channel of blessing?
Is the love of God flowing thro’ you?
Are you telling the lost of the Saviour?
Are you ready His service to do?
Make me a channel of blessing today,
Make me a channel of blessing, I pray;
My life possessing, My service blessing,
Make me a channel of blessing today.
2. Is your life a channel of blessing?
Are you burdened for those that are lost?
Have you urged upon those who are straying,
The Saviour who died on the cross?
3. Is your life a channel of blessing?
Is it daily telling for Him?
Have you spoken the word of salvation
To those who are dying in sin?
4. We cannot be channels of blessing
If our lives are not free from all sin;
We will barriers be and a hindrance
To those we are trying to win.
246    O BROTHER, LIFE’S JOURNEY BEGINNING
1. O brother, life’s journey beginning,
With courage and firmness arise!
Look well to the course thou art choosing;
Be earnest, be watchful, and wise!
Remember-two paths are before thee,
And both thy attention invite;
But one leadeth on to destruction,
The other to joy and delight.
God help you to follow His banner,
And serve Him wherever you go;
And when you are tempted, my brother,
God give you the grace to say “No!”
2. O brother, yield not to the tempter,
No matter what others may do;
Stand firm in the strength of the Master,
Be loyal, be faithful, and true!
Each trial will make you the stronger,
If you, in the name of the Lord,
Fight manfully under your Leader
Obeying the voice of His word.
3. O brother, the Saviour is calling!
Beware of the danger of sin;
Resist not the voice of the Spirit,
That whispers so gently within.
God calls you to enter His service -
To live for Him here, day by day;
And share by and by in the glory
That never shall vanish away.
247   ’TIS FINISHED, THE MESSIAH DIES
1. ‘Tis finished! the Messiah dies;
Cut off for sins, but not His own:
Accomplished is the sacrifice,
The great redeeming work is done.
2. ‘Tis finished! all the debt is paid;
Justice divine is satisfied:
The grand and full atonement made;
God for a guilty world hath died.
3. The veil is rent in Christ alone;
The living way to heaven is seen:
The middle wall is broken down;
And all mankind may enter in.
4. The types and figures are fulfilled;
Exacted is the legal pain:
The precious promises are sealed;
The spotless Lamb of God is slain.
5. The reign of sin and death is o’er;
And all may live from sin set free:
Satan hath lost his mortal power;
‘Tis swallowed up in victory.
6. Saved from the legal curse I am;
My Saviour hangs on yonder tree:
See there the meek, expiring Lamb!
‘Tis finished! He expires for me.
7. Accepted in the well-beloved;
And clothed in righteousness divine:
I see the bar to heaven removed;
And all Thy merits, Lord, are mine.
8. Death, hell, and sin are now subdued;
All grace is now to sinners given:
And lo, I plead the atoning blood,
And in Thy right I claim Thy heaven.`,keywords:["is your life a channel of blessing", "is your life a channel of blessing", "is your life a channel of blessing", "we cannot be channels of blessing"],titleWords:["is", "your", "life", "a", "channel", "of", "blessing?"]},
  248: {num:248,title:`THE MERCY SEAT`,lyrics:`1. From ev’ry stormy wind that blows
From ev’ry swell-ing tide of woes;
There is a calm, a sure retreat;
‘Tis found beneath the mercy seat.
2. There is a place where Jesus sheds
The oil of gladness on our heads;
A place than all beside more sweet;
It is the blood-stained mercy seat.
3. There is a scene where spirits blend
And friend holds fellowship with friend,
Though sundered far, by faith we meet;
Around one common mercy seat.
4. There, there on eagle wing we soar
And time and sense seem all no more;
And heaven comes down our souls to greet;
And glory crowns the mercy seat.`,keywords:["from evry stormy wind that blows", "there is a place where jesus sheds", "there is a scene where spirits blend", "there there on eagle wing we soar"],titleWords:["the", "mercy", "seat"]},
  249: {num:249,title:`COME SING THE PRAISE OF JESUS`,lyrics:`1. Come sing the praise of Jesus,
Sing His love with hearts aflame,
Sing His wondrous birth of Mary,
When to save the world He came;
Tell the life He lived for others,
And His mighty deeds proclaim,
For Jesus Christ is King.
Praise and glory be to Jesus,
Praise and glory be to Jesus,
Praise and glory be to Jesus,
For Jesus Christ is King!
2. When foes arose and slew Him,
He was victor in the fight;
Over death and hell He triumphed
In His resurrection might;
He has raised our fallen manhood
And enthroned it in the height,
For Jesus Christ is King.
3. There’s joy for all who serve Him,
More than human tongue can say;
There is pardon for the sinner,
And the night is turned to day;
There is healing for our sorrows,
There is music all the way,
For Jesus Christ is King.
4. We witness to His beauty,
And we spread His love abroad;
And we cleave the host of darkness,
With the Spirit’s piercing sword;
We will lead the souls in prison
To the freedom of the Lord,
For Jesus Christ is King.
5. To Jesus be the glory,
The dominion, and the praise;
He is Lord of all creation,
He is Guide of all our ways
And the world shall be His empire
In the fulness of the days
For Jesus Christ is King.
250   FOR MY SAKE AND THE GOSPEL’S GO
1. “For My sake and the Gospel’s, go
And tell Redemption’s story;”
His heralds answer, “Be it so,
And Thine, Lord, all the glory!”
They preach His birth, His life,
His cross, The love of His atonement,
For whom they count the world but loss,
His Easter, His enthronement.
2. Hark, hark, the trump of Jubilee
Proclaims to every nation,
From pole to pole, by land and sea,
Glad tidings of salvation:
As nearer draws the day of doom,
While still the battle rages,
The heavenly dayspring, through the gloom
Breaks on the night of ages.
3. Still on and on the anthems spread
Of Hallelujah voices,
In concert with he holy dead
The Warrior-Church rejoices;
Their snow-white robes are washed in blood,
Their golden harps are ringing;
Earth, and the Paradise of God,
One triumph-song are singing.
4. He comes, whose Advent Trumpet drown
The last of Time’s evangels-
Emmanuel crowned with many crowns,
The Lord of saints and angels:
O Life, Light, Love, the Great I AM,
Triune, who changest never;
The throne of God and of the Lamb
Is Thine, and Thine for ever!`,keywords:["come sing the praise of jesus", "when foes arose and slew him", "theres joy for all who serve him", "we witness to his beauty"],titleWords:["come", "sing", "the", "praise", "of", "jesus"]},
  251: {num:251,title:`ONLY REMEMBERED`,lyrics:`1. Fading away like the stars of the morning,

// Parse a hymn's lyrics into verse/chorus blocks
function parseHymnVerses(lyrics) {
  const blocks = [];
  // Split on verse numbers like "1." or "2." — also detect CHORUS/REFRAIN lines
  const parts = lyrics.split(/\n(?=\d+\.\s)/);
  for (const part of parts) {
    const trimmed = part.trim();
    if (!trimmed) continue;
    // Check if it starts with a verse number
    const vm = trimmed.match(/^(\d+)\.\s*([\s\S]+)/);
    if (vm) {
      const text = vm[2].trim();
      // Separate chorus if it appears inside the verse
      const chorusIdx = text.search(/\n(?:chorus|refrain)[:\s]/i);
      if (chorusIdx > -1) {
        blocks.push({ type: 'verse', num: parseInt(vm[1]), text: text.slice(0, chorusIdx).trim() });
        blocks.push({ type: 'chorus', text: text.slice(chorusIdx).replace(/^(chorus|refrain)[:\s]*/i, '').trim() });
      } else {
        blocks.push({ type: 'verse', num: parseInt(vm[1]), text });
      }
    } else if (/^(chorus|refrain)/i.test(trimmed)) {
      blocks.push({ type: 'chorus', text: trimmed.replace(/^(chorus|refrain)[:\s]*/i, '').trim() });
    }
  }
  if (blocks.length === 0) blocks.push({ type: 'verse', num: 1, text: lyrics.trim() });
  return blocks;
}

function detectGHS(text) {
  const t = text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();

  // 1. Explicit number: "GHS 5", "GHS5", "hymn 12", "song 3", "number 42"
  const numPatterns = [
    /\bghs\s*(\d{1,3})\b/,
    /\bhymn\s+(?:number\s+)?(\d{1,3})\b/,
    /\bsong\s+(?:number\s+)?(\d{1,3})\b/,
    /\bnumber\s+(\d{1,3})\b/,
  ];
  for (const pat of numPatterns) {
    const m = t.match(pat);
    if (m) {
      const num = parseInt(m[1]);
      if (GHS_DATA[num]) return { ghsNum: num };
    }
  }

  // 2. Title word match — "all your anxiety", "great is thy faithfulness"
  const words = t.split(' ');
  let best = null, bestScore = 0;
  for (const [num, hymn] of Object.entries(GHS_DATA)) {
    const tw = hymn.titleWords;
    if (tw.length < 2) continue;
    // How many title words appear in the transcript?
    let matches = 0;
    for (const w of tw) {
      if (words.some(tw2 => tw2 === w || similarity(tw2, w) > 0.85)) matches++;
    }
    const score = matches / tw.length;
    if (score >= 0.6 && matches >= 2 && score > bestScore) {
      bestScore = score;
      best = parseInt(num);
    }
  }
  if (best) return { ghsNum: best };

  // 3. First-line keyword match
  for (const [num, hymn] of Object.entries(GHS_DATA)) {
    for (const kw of hymn.keywords) {
      if (kw.length > 8 && (t.includes(kw) || partialPhraseMatch(t, kw))) {
        return { ghsNum: parseInt(num) };
      }
    }
  }

  return null;
}

function openHymn(num, addHistory = true) {
  const hymn = GHS_DATA[num];
  if (!hymn) { toast(`GHS ${num} not found`); return; }

  if (addHistory && currentHymn) {
    hymnHistory.push({ ...currentHymn });
    if (hymnHistory.length > 20) hymnHistory.shift();
  }

  const verses = parseHymnVerses(hymn.lyrics);
  currentHymn = { num: hymn.num, title: hymn.title, lyrics: hymn.lyrics, verses, activeVerse: 0 };
  renderMain();
  setStatus(`GHS ${num}: ${hymn.title}`, 'live');
  toast(`GHS ${num} — ${hymn.title}`);
  saveSession();
}

function setActiveVerse(idx) {
  if (!currentHymn) return;
  currentHymn.activeVerse = Math.max(0, Math.min(idx, currentHymn.verses.length - 1));
  renderMain();
  // Scroll to active verse
  setTimeout(() => {
    const el = document.querySelector('.ghs-verse-block.active-verse');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function nextHymnVerse() {
  if (!currentHymn) return;
  if (currentHymn.activeVerse < currentHymn.verses.length - 1) {
    setActiveVerse(currentHymn.activeVerse + 1);
  } else {
    toast('Last verse');
  }
}

function prevHymnVerse() {
  if (!currentHymn) return;
  if (currentHymn.activeVerse > 0) {
    setActiveVerse(currentHymn.activeVerse - 1);
  } else {
    toast('First verse');
  }
}

function nextHymn() {
  if (!currentHymn) return;
  const next = currentHymn.num + 1;
  if (GHS_DATA[next]) openHymn(next);
  else toast('No more hymns');
}

function prevHymn() {
  if (!currentHymn) return;
  const prev = currentHymn.num - 1;
  if (GHS_DATA[prev]) openHymn(prev);
  else toast('First hymn');
}

function renderMain() {
  if (appMode === 'ghs') renderGHS();
  else renderVerses();
}

function renderGHS() {
  const area = document.getElementById('verse-area');
  const empty = document.getElementById('empty-state');
  area.innerHTML = '';

  if (!currentHymn && hymnHistory.length === 0) {
    empty.style.display = 'flex'; return;
  }
  empty.style.display = 'none';

  if (currentHymn) {
    const card = document.createElement('div');
    card.className = 'ghs-card';

    const header = `
      <div class="ghs-number">GHS ${currentHymn.num}</div>
      <div class="ghs-title">${currentHymn.title}</div>`;

    let versesHTML = '';
    currentHymn.verses.forEach((v, i) => {
      const isActive = i === currentHymn.activeVerse;
      const label = v.type === 'chorus' ? 'Chorus' : `Verse ${v.num}`;
      const labelClass = v.type === 'chorus' ? 'ghs-verse-label chorus' : 'ghs-verse-label';
      versesHTML += `<div class="ghs-verse-block${isActive ? ' active-verse' : ''}" onclick="setActiveVerse(${i})">
        <div class="${labelClass}">${label}</div>
        <div class="ghs-verse-text">${v.text}</div>
      </div>`;
    });

    const navRow = `
      <div class="ghs-nav-row">
        <button class="ghs-nav-btn" onclick="prevHymnVerse()">Prev verse</button>
        <button class="ghs-nav-btn" onclick="nextHymnVerse()">Next verse</button>
        <button class="ghs-nav-btn" onclick="prevHymn()">Prev GHS</button>
        <button class="ghs-nav-btn" onclick="nextHymn()">Next GHS</button>
      </div>`;

    card.innerHTML = header + versesHTML + navRow;
    area.appendChild(card);
  }

  // History
  if (hymnHistory.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Earlier in this service';
    area.appendChild(lbl);
    [...hymnHistory].reverse().forEach((h, ri) => {
      const idx = hymnHistory.length - 1 - ri;
      const el = document.createElement('div');
      el.className = 'hist-card';
      el.innerHTML = `<div class="hist-ref">GHS ${h.num}</div><div class="hist-text">${h.title}</div>`;
      el.onclick = () => {
        currentHymn = { ...h };
        hymnHistory.splice(idx, 1);
        renderGHS();
      };
      area.appendChild(el);
    });
  }
  area.scrollTop = 0;
}

  'ninety':90,'hundred':100,'a hundred':100,'one hundred':100,'one fifty':150
};

function wordsToNum(s) {
  s = s.trim().toLowerCase();
  if (/^\d+$/.test(s)) return parseInt(s);
  if (WORD_NUMS[s] !== undefined) return WORD_NUMS[s];
  const parts = s.split(/\s+/);
  let total = 0;
  for (const p of parts) { if (WORD_NUMS[p]) total += WORD_NUMS[p]; }
  return total > 0 ? total : null;
}

// Check spoken text against famous quote database
function detectFromQuotes(text) {
  const t = text.toLowerCase().replace(/[^a-z\s]/g, ' ').replace(/\s+/g, ' ').trim();
  let best = null;
  let bestLen = 0;
  for (const entry of QUOTE_DB) {
    for (const key of entry.keys) {
      // Check if the key phrase appears in the text (fuzzy: allow 1-2 word gaps)
      if (t.includes(key) || partialPhraseMatch(t, key)) {
        if (key.length > bestLen) {
          bestLen = key.length;
          best = entry;
        }
      }
    }
  }
  return best ? { bookKey: best.bookKey, chapter: best.chapter, verse: best.verse, aiMatch: false } : null;
}

// Allow matching even if 1-2 short words differ or are missing
function partialPhraseMatch(text, phrase) {
  const pw = phrase.split(' ');
  if (pw.length < 4) return false; // only use partial match for longer phrases
  // Check if at least 75% of the phrase words appear in sequence in text
  const tw = text.split(' ');
  let pi = 0, matches = 0;
  for (let ti = 0; ti < tw.length && pi < pw.length; ti++) {
    if (tw[ti] === pw[pi] || similarity(tw[ti], pw[pi]) > 0.8) {
      matches++;
      pi++;
    }
  }
  return matches / pw.length >= 0.75;
}

// Levenshtein distance for fuzzy book name matching
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// How similar two strings are (0-1, higher = more similar)
function similarity(a, b) {
  if (a === b) return 1;
  const longer = Math.max(a.length, b.length);
  if (longer === 0) return 1;
  return (longer - levenshtein(a, b)) / longer;
}

// Find best matching book key from a spoken word, with fuzzy tolerance
function fuzzyBookMatch(word) {
  if (!word || word.length < 2) return null;
  word = word.toLowerCase().trim();

  // First: exact alias match
  for (const { alias, bookKey } of ALIAS_LIST) {
    if (alias === word) return { bookKey, score: 1 };
  }

  // Second: starts-with match (prefix) — catches "detomy" starting like "deut"
  for (const { alias, bookKey } of ALIAS_LIST) {
    if (alias.length >= 3 && word.length >= 3) {
      const minLen = Math.min(alias.length, word.length, 5);
      if (alias.slice(0, minLen) === word.slice(0, minLen)) {
        return { bookKey, score: 0.9 };
      }
    }
  }

  // Third: fuzzy similarity — catches "sam" for "samuel", "detomy" for "deuteronomy"
  let best = null, bestScore = 0;
  for (const { alias, bookKey } of ALIAS_LIST) {
    // Only compare against aliases of similar length or if word is prefix of alias
    if (Math.abs(alias.length - word.length) > 6) continue;
    const sim = similarity(word, alias);
    // Also check if word is contained in alias or alias starts with word
    const startBonus = alias.startsWith(word.slice(0, Math.min(word.length, 4))) ? 0.15 : 0;
    const score = sim + startBonus;
    if (score > bestScore && score > 0.55) {
      bestScore = score;
      best = { bookKey, score };
    }
  }
  return best;
}

// ────────────────────────────────────────────────────────────
// DETECTION ENGINE (with fuzzy matching)
// ────────────────────────────────────────────────────────────
function detectVerse(rawText) {
  const t = rawText.toLowerCase()
    .replace(/\b(\d+)st\b/g, '$1').replace(/\b(\d+)nd\b/g, '$1')
    .replace(/\b(\d+)rd\b/g, '$1').replace(/\b(\d+)th\b/g, '$1')
    .replace(/[,;.!?]/g, ' ').replace(/\s+/g, ' ').trim();

  // ── NAVIGATION — natural pastor language ──
  // "next verse", "go forward", "continue", "verse after", etc.
  if (/\b(next verse|verse next|go forward|go ahead|forward verse|move forward|continue to the next|following verse)\b/.test(t)) return { action: 'next' };
  if (/\b(previous verse|last verse|prev verse|go back|back to the|verse before|prior verse|take me back|step back)\b/.test(t)) return { action: 'prev' };
  if (/\bnext chapter\b/.test(t)) return { action: 'nextCh' };
  if (/\b(previous chapter|last chapter|prior chapter|go back to chapter)\b/.test(t)) return { action: 'prevCh' };

  // "go to verse 3" / "take me to verse 5" / "verse 12" / "read verse 8"
  const gotoVerseM = t.match(/\b(?:go to|take me to|read|jump to|open)?\s*verse\s+(\d+)\b/);
  if (gotoVerseM) return { action: 'gotoVerse', verse: parseInt(gotoVerseM[1]) };

  // "go to chapter 6" / "chapter 6" / "take me to chapter 4"
  const gotoChM = t.match(/\b(?:go to|take me to|jump to|open)?\s*chapter\s+(\d+)\b/);
  if (gotoChM) return { action: 'gotoChapter', chapter: parseInt(gotoChM[1]) };

  // "yes" / "yeah" — confirm top candidate
  if (/^\s*(yes|yeah|yep|correct|that'?s? (the one|it)|right|confirm)\s*$/.test(t)) return { action: 'confirm' };

  const numWord = '(?:' + Object.keys(WORD_NUMS).sort((a,b)=>b.length-a.length).join('|') + '|\\d+)';

  // ── EXACT ALIAS MATCH (original logic) ──
  for (const { alias, bookKey } of ALIAS_LIST) {
    const idx = t.indexOf(alias);
    if (idx === -1) continue;
    const before = idx > 0 ? t[idx - 1] : ' ';
    if (/[a-z]/.test(before)) continue;

    const after = t.slice(idx + alias.length).trim();
    const result = extractChapterVerse(after, numWord, bookKey);
    if (result) return result;
  }

  // ── FUZZY MATCH: try each word / bigram / trigram in the transcript ──
  const words = t.split(/\s+/);
  for (let i = 0; i < words.length; i++) {
    // Try single word, then 2-word, then 3-word combos for multi-word books
    for (let len = 1; len <= 3 && i + len <= words.length; len++) {
      const phrase = words.slice(i, i + len).join(' ');
      if (phrase.length < 2) continue;

      const match = fuzzyBookMatch(phrase);
      if (!match) continue;

      // Make sure what comes after looks like chapter:verse numbers
      const afterWords = words.slice(i + len).join(' ').trim();
      const result = extractChapterVerse(afterWords, numWord, match.bookKey);
      if (result) {
        result.fuzzy = true;
        return result;
      }
    }
  }

  return null;
}

// Extract chapter and verse from the text that follows a book name
function extractChapterVerse(after, numWord, bookKey) {
  const patterns = [
    /^(\d+)\s*:\s*(\d+)/,
    /^chapter\s+(\d+)\s+verse\s+(\d+)/i,
    /^ch\.?\s*(\d+)\s+v\.?\s*(\d+)/i,
    /^(\d+)\s+(\d+)(?!\d)/,
    new RegExp('^(' + numWord + ')\\s+(?:verse\\s+)?(' + numWord + ')\\s*', 'i'),
  ];
  for (const pat of patterns) {
    const m = after.match(pat);
    if (m) {
      const ch = wordsToNum(m[1]);
      const vs = wordsToNum(m[2]);
      if (ch && vs) return { bookKey, chapter: ch, verse: vs };
    }
  }
  // Chapter only
  const chOnly = after.match(/^(?:chapter\s+)?(\d+)(?:\s|$)/i);
  if (chOnly) {
    const ch = parseInt(chOnly[1]);
    if (ch) return { bookKey, chapter: ch, verse: 1 };
  }
  return null;
}

// API
// ────────────────────────────────────────────────────────────
async function fetchVerse(bookKey, chapter, verse) {
  const bookStr = BOOK_API[bookKey] || bookKey;
  const ref = `${encodeURIComponent(bookStr)}+${chapter}:${verse}`;
  const url = `https://bible-api.com/${ref}?translation=kjv`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Not found');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return (data.text || data.verses?.[0]?.text || '').trim();
}
